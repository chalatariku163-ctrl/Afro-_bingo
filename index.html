<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>GADAA BINGO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#101827;
    color:white;
    padding:12px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    color:#00e5ff;
    margin:8px 0 15px;
}

/* GAME INFORMATION */

.game-info{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    background:#1b2638;
    border-radius:12px;
    padding:8px;
    margin-bottom:12px;
    text-align:center;
}

.game-info-item{
    background:#27364d;
    border-radius:8px;
    padding:8px 4px;
    min-width:0;
}

.game-info-label{
    display:block;
    color:#9aa8bb;
    font-size:10px;
    margin-bottom:4px;
}

.game-info-value{
    display:block;
    color:#00e5ff;
    font-size:13px;
    font-weight:bold;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

/* ENTRY PANEL */

#gameEntryPanel{
    background:#1b2638;
    border-radius:15px;
    padding:20px;
    text-align:center;
    margin-bottom:15px;
}

#gameEntryPanel h2{
    color:#00e5ff;
    margin-top:0;
}

#gameEntryPanel p{
    color:#aaa;
}

.entry-btn{
    width:100%;
    margin:8px 0;
    color:white;
}

.entry-btn.buy10{
    background:#16c784;
}

.entry-btn.buy20{
    background:#ff9800;
}

/* GAME SCREEN */

#gameScreen{
    display:none;
}

.status-box{
    background:#1b2638;
    border-radius:12px;
    padding:15px;
    margin-bottom:12px;
    text-align:center;
}

#gameStatus{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

#timer{
    color:#ffd54a;
    font-size:16px;
}

/* AUTO MODE */

.auto-panel{
    background:#1b2638;
    border-radius:12px;
    padding:10px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
}

.auto-panel span{
    color:#aaa;
    font-size:12px;
    font-weight:bold;
}

.auto-btn{
    border:none;
    border-radius:8px;
    padding:8px 13px;
    font-size:12px;
    font-weight:bold;
    background:#27364d;
    color:white;
}

.auto-btn.active{
    background:#16c784;
    color:white;
}

/* WINNER SCREEN */

#winnerScreen{
    display:none;
    background:#123d29;
    border:2px solid #16c784;
    border-radius:15px;
    padding:18px;
    margin-bottom:15px;
    text-align:center;
    box-shadow:0 0 20px #16c78488;
}

#winnerScreen.show{
    display:block;
}

.winner-title{
    color:#4cff9b;
    font-size:25px;
    font-weight:bold;
    margin-bottom:10px;
}

.winner-info{
    color:white;
    font-size:16px;
    line-height:1.8;
}

.winner-card{
    color:#ffd54a;
    font-size:20px;
    font-weight:bold;
}

/* CURRENT NUMBER */

.current-number{
    background:#0b1220;
    border:2px solid #00e5ff;
    border-radius:15px;
    padding:15px;
    text-align:center;
    margin-bottom:12px;
}

.current-number h3{
    margin:0 0 8px;
    color:#aaa;
}

#currentNumber{
    font-size:42px;
    font-weight:bold;
    color:#00e5ff;
}

/* BUTTONS */

.buttons{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

button{
    border:none;
    border-radius:10px;
    padding:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

#buy10Btn{
    flex:1;
    background:#16c784;
    color:white;
}

#buy20Btn{
    flex:1;
    background:#ff9800;
    color:white;
}

/* MESSAGE */

.message{
    min-height:20px;
    margin:8px 0;
    padding:8px;
    border-radius:8px;
    text-align:center;
}

.message.success{
    background:#123d29;
    color:#4cff9b;
}

.message.error{
    background:#481b1b;
    color:#ff7777;
}

/* CARD ID */

#cardIdPanel{
    background:#1b2638;
    border-radius:12px;
    padding:12px;
    margin-bottom:15px;
}

#cardIdPanel h3{
    text-align:center;
    margin-top:0;
}

#cardIdGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
    gap:6px;
    max-height:350px;
    overflow-y:auto;
}

.card-id{
    background:#27364d;
    padding:10px 3px;
    text-align:center;
    border-radius:7px;
    cursor:pointer;
    font-weight:bold;
}

.card-id:hover{
    background:#405775;
}

.card-id.selected{
    background:#00a8ff;
    color:white;
}

.card-id.my-card{
    background:#e53935;
    color:white;
    border:2px solid #ffb3b3;
}

/* LAYOUT */

.game-layout{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:15px;
    align-items:start;
}

.left-side,
.right-side{
    min-width:0;
}

/* CALLED NUMBERS */

.called-box{
    background:#1b2638;
    border-radius:12px;
    padding:12px;
    margin-bottom:15px;
}

.called-box h3{
    text-align:center;
    margin-top:0;
}

#calledNumbers{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
}

.called-number{
    background:#27364d;
    padding:8px 2px;
    text-align:center;
    border-radius:6px;
    font-size:12px;
    min-height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.called-number.header{
    background:#00a8ff;
    font-weight:bold;
    font-size:15px;
}

.called-number.active{
    background:#16c784;
    color:white;
    font-weight:bold;
    box-shadow:0 0 8px #16c784;
}

/* USER CARD */

#myCardBox{
    display:none;
}

.user-card-panel{
    background:#1b2638;
    border-radius:15px;
    padding:12px;
    margin-bottom:15px;
    box-shadow:0 4px 15px #0005;
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    padding:10px;
    background:#0b1220;
    border-radius:10px;
}

.card-number{
    color:#00e5ff;
    font-size:18px;
    font-weight:bold;
}

.card-type{
    color:#ffd54a;
    font-weight:bold;
}

.bingo-card{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

.bingo-card th{
    background:#00a8ff;
    padding:10px;
    font-size:18px;
}

.bingo-card td{
    background:#27364d;
    border:2px solid #101827;
    text-align:center;
    height:52px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.bingo-card td.marked{
    background:#16c784;
    color:white;
    font-weight:bold;
    box-shadow:0 0 8px #16c784;
}

.bingo-card td.free{
    background:#9c27b0;
    color:white;
}

.bingo-card.winner-card-table{
    border:3px solid #ffd54a;
}

.btn-bingo{
    width:100%;
    margin-top:10px;
    background:#e91e63;
    color:white;
}

/* MOBILE */

@media(max-width:700px){

    .game-layout{
        grid-template-columns:minmax(0,1fr) minmax(0,1fr);
        gap:8px;
    }

    .called-box{
        padding:6px;
    }

    .called-box h3{
        font-size:12px;
    }

    .called-number{
        font-size:10px;
        min-height:27px;
        padding:5px 1px;
    }

    .called-number.header{
        font-size:12px;
    }

    .user-card-panel{
        padding:6px;
    }

    .card-header{
        display:block;
        text-align:center;
        padding:7px;
    }

    .card-number{
        font-size:13px;
    }

    .card-type{
        font-size:11px;
        margin-top:5px;
    }

    .bingo-card th{
        padding:5px;
        font-size:13px;
    }

    .bingo-card td{
        height:38px;
        font-size:11px;
    }

    .btn-bingo{
        font-size:11px;
        padding:8px 3px;
    }

}

@media(max-width:600px){

    body{
        padding:8px;
    }

    .game-info{
        gap:3px;
        padding:5px;
    }

    .game-info-item{
        padding:6px 2px;
    }

    .game-info-label{
        font-size:8px;
    }

    .game-info-value{
        font-size:10px;
    }

    #currentNumber{
        font-size:35px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>🎱 GADAA BINGO</h1>


<!-- GAME INFORMATION -->

<div class="game-info">

    <div class="game-info-item">

        <span class="game-info-label">
            BALANCE
        </span>

        <span class="game-info-value"
              id="balanceValue">

            0 Birr

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            GAME ID
        </span>

        <span class="game-info-value"
              id="gameIdValue">

            --

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            DERASH
        </span>

        <span class="game-info-value"
              id="derashValue">

            --

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            PLAYER
        </span>

        <span class="game-info-value"
              id="playerValue">

            0

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            CALLED
        </span>

        <span class="game-info-value"
              id="calledValue">

            0

        </span>

    </div>

</div>


<!-- FIRST SCREEN -->

<div id="gameEntryPanel">

    <h2>🎮 PLAY GAME</h2>

    <p>
        Card gosa filadhu
    </p>

    <button
        class="entry-btn buy10"
        onclick="enterGame(10)">

        🎫 BUY CARD 10 BIRR

    </button>

    <button
        class="entry-btn buy20"
        onclick="enterGame(20)">

        🎫 BUY CARD 20 BIRR

    </button>

</div>


<!-- GAME SCREEN -->

<div id="gameScreen">


    <div class="status-box">

        <div id="gameStatus">

            ⏳ WAITING FOR GAME

        </div>

        <div id="timer">

            --

        </div>

    </div>


    <!-- AUTO ON / OFF -->

    <div class="auto-panel">

        <span>
            AUTO MARK:
        </span>

        <button
            id="autoOnBtn"
            class="auto-btn active"
            onclick="setAutoMode(true)">

            AUTO ON

        </button>

        <button
            id="autoOffBtn"
            class="auto-btn"
            onclick="setAutoMode(false)">

            AUTO OFF

        </button>

    </div>


    <!-- WINNER SCREEN -->

    <div id="winnerScreen">

    </div>


    <!-- CURRENT NUMBER -->

    <div class="current-number">

        <h3>
            🎱 CURRENT NUMBER
        </h3>

        <div id="currentNumber">

            --

        </div>

    </div>


    <!-- BUY BUTTONS -->

    <div class="buttons">

        <button
            id="buy10Btn"
            onclick="buyCard(10)">

            🎫 BUY 10 BIRR

        </button>

        <button
            id="buy20Btn"
            onclick="buyCard(20)">

            🎫 BUY 20 BIRR

        </button>

    </div>


    <div id="buyMessage"
         class="message">

    </div>


    <!-- CARD ID TABLE -->

    <div id="cardIdPanel">

        <h3>
            🎫 SELECT CARD ID 1 - 500
        </h3>

        <div id="cardIdGrid"></div>

    </div>


    <!-- GAME -->

    <div class="game-layout">


        <div class="left-side">

            <div class="called-box">

                <h3>
                    📢 CALLED NUMBERS
                </h3>

                <div id="calledNumbers"></div>

            </div>

        </div>


        <div class="right-side">

            <div id="bingoMessage"
                 class="message">

            </div>

            <div id="myCardBox"></div>

        </div>

    </div>

</div>

</div>


<script>


// =====================================================
// TELEGRAM
// =====================================================

const tg =
    window.Telegram.WebApp;

tg.ready();

tg.expand();


// =====================================================
// USER ID
// =====================================================

let userId = null;

if(
    tg.initDataUnsafe &&
    tg.initDataUnsafe.user
){

    userId =
        tg.initDataUnsafe.user.id;

}


// =====================================================
// GAME VARIABLES
// =====================================================

let currentGameId = null;

let gameState = null;

let myCards = [];

let selectedCardNumber = null;

let selectedCardType = null;

let gameEntered = false;

let autoMode = true;

let bingoSubmittedCards =
    new Set();


// =====================================================
// ELEMENTS
// =====================================================

const gameEntryPanel =
    document.getElementById(
        "gameEntryPanel"
    );

const gameScreen =
    document.getElementById(
        "gameScreen"
    );

const gameStatus =
    document.getElementById(
        "gameStatus"
    );

const timer =
    document.getElementById(
        "timer"
    );

const currentNumber =
    document.getElementById(
        "currentNumber"
    );

const calledNumbers =
    document.getElementById(
        "calledNumbers"
    );

const buy10Btn =
    document.getElementById(
        "buy10Btn"
    );

const buy20Btn =
    document.getElementById(
        "buy20Btn"
    );

const cardIdGrid =
    document.getElementById(
        "cardIdGrid"
    );

const cardIdPanel =
    document.getElementById(
        "cardIdPanel"
    );

const buyMessage =
    document.getElementById(
        "buyMessage"
    );

const bingoMessage =
    document.getElementById(
        "bingoMessage"
    );

const myCardBox =
    document.getElementById(
        "myCardBox"
    );

const balanceValue =
    document.getElementById(
        "balanceValue"
    );

const gameIdValue =
    document.getElementById(
        "gameIdValue"
    );

const derashValue =
    document.getElementById(
        "derashValue"
    );

const playerValue =
    document.getElementById(
        "playerValue"
    );

const calledValue =
    document.getElementById(
        "calledValue"
    );

const winnerScreen =
    document.getElementById(
        "winnerScreen"
    );


// =====================================================
// ENTER GAME
// =====================================================

function enterGame(cardType){

    selectedCardType =
        Number(cardType);

    gameEntered =
        true;

    gameEntryPanel.style.display =
        "none";

    gameScreen.style.display =
        "block";

    updateBuyButtons();

    loadGameState();

}


// =====================================================
// MESSAGE
// =====================================================

function showMessage(
    element,
    text,
    type
){

    if(!element){

        return;

    }

    element.innerText =
        text;

    element.className =
        "message " + type;

    setTimeout(
        function(){

            element.innerText =
                "";

            element.className =
                "message";

        },
        5000
    );

}


// =====================================================
// AUTO MODE
// =====================================================

function setAutoMode(value){

    autoMode =
        Boolean(value);

    const onBtn =
        document.getElementById(
            "autoOnBtn"
        );

    const offBtn =
        document.getElementById(
            "autoOffBtn"
        );


    if(autoMode){

        onBtn.classList.add(
            "active"
        );

        offBtn.classList.remove(
            "active"
        );


        myCards.forEach(
            function(card){

                autoMarkCalledNumbers(
                    card
                );

            }
        );


        renderMyCards();

        autoCheckAllCards();

    }

    else{

        onBtn.classList.remove(
            "active"
        );

        offBtn.classList.add(
            "active"
        );

    }

}


// =====================================================
// LOAD GAME STATE
// =====================================================

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state?user_id="
                +
                encodeURIComponent(
                    userId
                )
            );

        const data =
            await response.json();


        if(!data.success){

            gameStatus.innerText =
                "⚠️ GAME STATE ERROR";

            return;

        }


        updateGameUI(
            data
        );

    }

    catch(error){

        console.error(
            error
        );

        gameStatus.innerText =
            "❌ SERVER CONNECTION ERROR";

    }

}


// =====================================================
// UPDATE BUY BUTTONS
// =====================================================

function updateBuyButtons(){

    if(!gameEntered){

        buy10Btn.style.display =
            "none";

        buy20Btn.style.display =
            "none";

        return;

    }


    if(
        selectedCardType === 10
    ){

        buy10Btn.style.display =
            "block";

        buy20Btn.style.display =
            "none";

    }

    else if(
        selectedCardType === 20
    ){

        buy10Btn.style.display =
            "none";

        buy20Btn.style.display =
            "block";

    }

}


// =====================================================
// UPDATE GAME UI
// =====================================================

function updateGameUI(data){

    const now =
        Date.now() / 1000;


    // BALANCE

    if(
        data.balance !== undefined &&
        data.balance !== null
    ){

        balanceValue.innerText =
            Number(
                data.balance
            ).toLocaleString()
            + " Birr";

    }

    else{

        balanceValue.innerText =
            "0 Birr";

    }


    // NEW GAME

    if(

        currentGameId !== null &&

        currentGameId !== data.game_id

    ){

        selectedCardNumber =
            null;

        myCards =
            [];

        bingoSubmittedCards =
            new Set();

        winnerScreen.classList.remove(
            "show"
        );

        winnerScreen.innerHTML =
            "";

    }


    currentGameId =
        data.game_id;

    gameState =
        data;


    // GAME ID

    gameIdValue.innerText =
        data.game_id || "--";


    // CALLED COUNT

    const calledCount =
        Array.isArray(
            data.called_numbers
        )
        ?
        data.called_numbers.length
        :
        0;


    calledValue.innerText =
        calledCount;


    // PLAYER COUNT

    let playerCount =
        0;


    if(
        Array.isArray(
            data.players
        )
    ){

        playerCount =
            data.players.length;

    }


    if(
        data.player_count !== undefined
    ){

        playerCount =
            data.player_count;

    }


    if(
        data.players_count !== undefined
    ){

        playerCount =
            data.players_count;

    }


    playerValue.innerText =
        playerCount;


    // DERASH

    if(
        data.derash !== undefined
    ){

        derashValue.innerText =
            data.derash;

    }

    else if(
        data.draw !== undefined
    ){

        derashValue.innerText =
            data.draw;

    }

    else{

        derashValue.innerText =
            "BINGO";

    }


    // WINNER FOR ALL USERS

    if(
        data.winner
    ){

        showWinnerForEveryone(
            data.winner
        );

    }


    // CARD BUYING

    if(
        data.card_buying
    ){

        gameStatus.innerText =
            "🟢 CARD BUYING IS OPEN";


        const remaining =
            Math.max(
                0,
                Math.ceil(
                    data.card_buying_end_time
                    - now
                )
            );


        timer.innerText =
            "⏱️ CARD BUYING: "
            + remaining
            + " SEC";


        updateBuyButtons();


        buy10Btn.disabled =
            false;

        buy20Btn.disabled =
            false;


        cardIdPanel.style.display =
            "block";


        renderCardIds();

    }


    // GAME RUNNING

    else if(
        data.started
    ){

        gameStatus.innerText =
            "🎮 GAME IS RUNNING";


        timer.innerText =
            "📢 CALLED NUMBERS";


        buy10Btn.style.display =
            "none";

        buy20Btn.style.display =
            "none";


        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;


        cardIdPanel.style.display =
            "none";


        if(
            myCards.length > 0
        ){

            myCardBox.style.display =
                "block";

        }

    }


    // WINNER

    else if(
        data.winner
    ){

        gameStatus.innerText =
            "🏆 GAME FINISHED";


        timer.innerText =
            "🏆 WINNER FOUND";


        buy10Btn.style.display =
            "none";

        buy20Btn.style.display =
            "none";


        cardIdPanel.style.display =
            "none";

    }


    // WAITING

    else{

        gameStatus.innerText =
            "⏳ WAITING FOR GAME";


        buy10Btn.style.display =
            "none";

        buy20Btn.style.display =
            "none";


        cardIdPanel.style.display =
            "none";

    }


    // CURRENT NUMBER

    if(

        data.current_number !== null &&

        data.current_number !== undefined

    ){

        currentNumber.innerText =
            formatCall(
                data.current_number
            );

    }

    else{

        currentNumber.innerText =
            "--";

    }


    // CALLED NUMBERS

    renderCalledNumbers(
        data.called_numbers || []
    );


    // AUTO MARK

    if(autoMode){

        myCards.forEach(
            function(card){

                autoMarkCalledNumbers(
                    card
                );

            }
        );

    }


    renderMyCards();


    // AUTO BINGO

    if(
        autoMode &&
        data.started &&
        !data.winner
    ){

        autoCheckAllCards();

    }

}


// =====================================================
// SHOW WINNER FOR EVERYONE
// =====================================================

function showWinnerForEveryone(winner){

    if(
        !winner
    ){

        return;

    }


    let winnerName =
        winner.username ||
        winner.first_name ||
        winner.name ||
        "PLAYER";


    let cardNumber =
        winner.card_number ||
        "--";

// =====================================================
// FORMAT NUMBER
// =====================================================

function formatCall(number){

    if(
        number >= 1 &&
        number <= 15
    ){

        return "B-" + number;

    }


    if(
        number >= 16 &&
        number <= 30
    ){

        return "I-" + number;

    }


    if(
        number >= 31 &&
        number <= 45
    ){

        return "N-" + number;

    }


    if(
        number >= 46 &&
        number <= 60
    ){

        return "G-" + number;

    }


    if(
        number >= 61 &&
        number <= 75
    ){

        return "O-" + number;

    }


    return number;

}


// =====================================================
// CALLED NUMBERS
// =====================================================

function renderCalledNumbers(numbers){

    calledNumbers.innerHTML =
        "";


    const calledSet =
        new Set(
            numbers.map(
                Number
            )
        );


    const columns = [

        {
            letter:"B",
            start:1
        },

        {
            letter:"I",
            start:16
        },

        {
            letter:"N",
            start:31
        },

        {
            letter:"G",
            start:46
        },

        {
            letter:"O",
            start:61
        }

    ];


    columns.forEach(
        function(column){

            const header =
                document.createElement(
                    "div"
                );


            header.className =
                "called-number header";


            header.innerText =
                column.letter;


            calledNumbers.appendChild(
                header
            );

        }
    );


    for(
        let row = 0;
        row < 15;
        row++
    ){

        columns.forEach(
            function(column){

                const number =
                    column.start
                    + row;


                const div =
                    document.createElement(
                        "div"
                    );


                div.className =
                    "called-number";


                div.innerText =
                    number;


                if(
                    calledSet.has(
                        number
                    )
                ){

                    div.classList.add(
                        "active"
                    );

                }


                calledNumbers.appendChild(
                    div
                );

            }
        );

    }

}


// =====================================================
// AUTO MARK CALLED NUMBERS
// =====================================================

function autoMarkCalledNumbers(
    userCard
){

    if(

        !userCard ||

        !Array.isArray(
            userCard.card
        )

    ){

        return;

    }


    if(
        !Array.isArray(
            userCard.markedCells
        )
    ){

        userCard.markedCells =
            [];

    }


    // FREE SPACE

    if(
        !userCard.markedCells.includes(
            "2-2"
        )
    ){

        userCard.markedCells.push(
            "2-2"
        );

    }


    if(

        !gameState ||

        !Array.isArray(
            gameState.called_numbers
        )

    ){

        return;

    }


    const calledSet =
        new Set(
            gameState.called_numbers.map(
                Number
            )
        );


    for(
        let row = 0;
        row < 5;
        row++
    ){

        for(
            let col = 0;
            col < 5;
            col++
        ){

            const value =
                userCard.card[row][col];


            if(
                value === "FREE"
            ){

                continue;

            }


            if(
                calledSet.has(
                    Number(
                        value
                    )
                )
            ){

                const key =
                    row
                    + "-"
                    + col;


                if(
                    !userCard.markedCells.includes(
                        key
                    )
                ){

                    userCard.markedCells.push(
                        key
                    );

                }

            }

        }

    }

}

// =====================================================
// TOGGLE CARD CELL
// =====================================================

function toggleCardCell(

    userCard,

    cell,

    value,

    row,

    col

){

    if(
        autoMode
    ){

        return;

    }


    if(
        value === "FREE"
    ){

        return;

    }


    if(

        !gameState ||

        !Array.isArray(
            gameState.called_numbers
        )

    ){

        return;

    }


    const number =
        Number(
            value
        );


    if(

        !gameState.called_numbers
            .map(
                Number
            )
            .includes(
                number
            )

    ){

        showMessage(

            bingoMessage,

            "⚠️ LAKKOOFSI KUN HIN WAAMAMNE.",

            "error"

        );

        return;

    }


    const key =
        row
        + "-"
        + col;


    cell.classList.toggle(
        "marked"
    );


    if(

        cell.classList.contains(
            "marked"
        )

    ){

        if(

            !userCard.markedCells.includes(
                key
            )

        ){

            userCard.markedCells.push(
                key
            );

        }

    }

    else{

        userCard.markedCells =
            userCard.markedCells.filter(
                function(item){

                    return item !== key;

                }
            );

    }

}


// =====================================================
// CHECK BINGO
// =====================================================

function checkLocalBingo(
    userCard
){

    if(

        !userCard ||

        !Array.isArray(
            userCard.card
        )

    ){

        return false;

    }


    const marked =
        userCard.markedCells || [];


    function isMarked(
        row,
        col
    ){

        return marked.includes(

            row
            + "-"
            + col

        );

    }


    // HORIZONTAL

    for(

        let row = 0;

        row < 5;

        row++

    ){

        let complete =
            true;


        for(

            let col = 0;

            col < 5;

            col++

        ){

            if(

                !isMarked(
                    row,
                    col
                )

            ){

                complete =
                    false;

                break;

            }

        }


        if(
            complete
        ){

            return true;

        }

    }


    // VERTICAL

    for(

        let col = 0;

        col < 5;

        col++

    ){

        let complete =
            true;


        for(

            let row = 0;

            row < 5;

            row++

        ){

            if(

                !isMarked(
                    row,
                    col
                )

            ){

                complete =
                    false;

                break;

            }

        }


        if(
            complete
        ){

            return true;

        }

    }


    // DIAGONAL 1

    let diagonal1 =
        true;


    for(

        let i = 0;

        i < 5;

        i++

    ){

        if(

            !isMarked(
                i,
                i
            )

        ){

            diagonal1 =
                false;

            break;

        }

    }


    if(
        diagonal1
    ){

        return true;

    }


    // DIAGONAL 2

    let diagonal2 =
        true;


    for(

        let i = 0;

        i < 5;

        i++

    ){

        if(

            !isMarked(

                i,

                4 - i

            )

        ){

            diagonal2 =
                false;

            break;

        }

    }


    if(
        diagonal2
    ){

        return true;

    }


    // FOUR CORNERS

    if(

        isMarked(
            0,
            0
        )

        &&

        isMarked(
            0,
            4
        )

        &&

        isMarked(
            4,
            0
        )

        &&

        isMarked(
            4,
            4
        )

    ){

        return true;

    }


    return false;

}

async function autoCheckAllCards(){

    if(
        !autoMode
    ){

        return;

    if(
        !gameState
    ){

        return;

    }


    if(
        gameState.winner
    ){

        return;

    }


    for(
        const userCard
        of
        myCards
    ){

        if(

            !userCard ||

            !userCard.card

        ){

            continue;

        }


        autoMarkCalledNumbers(
            userCard
        );


        if(

            !checkLocalBingo(
                userCard
            )

        ){

            continue;

        }


        const cardKey =
            String(
                userCard.card_number
            );


        if(

            bingoSubmittedCards.has(
                cardKey
            )

        ){

            continue;

        }


        bingoSubmittedCards.add(
            cardKey
        );


        await submitAutoBingo(
            userCard
        );

    }

}
