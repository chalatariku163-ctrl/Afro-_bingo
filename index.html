<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GADAA BINGO</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#101828;
    color:white;
    min-height:100vh;
}

.header{
    background:#16233a;
    padding:15px;
    text-align:center;
    border-bottom:2px solid #2f80ed;
}

.header h1{
    margin:0;
    font-size:24px;
}

.header p{
    margin:6px 0 0;
    color:#b9c5d6;
}

.container{
    width:100%;
    max-width:600px;
    margin:auto;
    padding:15px;
}

.card{
    background:#18263d;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-top:0;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.btn10{
    background:#27ae60;
    color:white;
}

.btn20{
    background:#f39c12;
    color:white;
}

.btn{
    background:#2f80ed;
    color:white;
}

.danger{
    background:#e74c3c;
    color:white;
}

.info{
    background:#23334f;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    text-align:center;
}

.hidden{
    display:none !important;
}

/* =========================
   BINGO CARD
========================= */

.bingo-title{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    letter-spacing:8px;
    color:#f1c40f;
    margin-bottom:8px;
}

.bingo-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
    margin-top:10px;
}

.bingo-cell{
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:7px;
    background:#f4f6f8;
    color:#111;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.bingo-cell.called{
    background:#2ecc71;
    color:white;
}

.bingo-cell.free{
    background:#f1c40f;
    color:#111;
}

/* =========================
   CALLED NUMBER TABLE
========================= */

.number-title{
    text-align:center;
    color:#f1c40f;
    margin-bottom:8px;
}

.number-grid{
    display:grid;
    grid-template-columns:repeat(15,1fr);
    gap:4px;
}

.number-cell{
    min-height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#263853;
    border-radius:4px;
    font-size:11px;
    font-weight:bold;
}

.number-cell.called{
    background:#e74c3c;
    color:white;
}

.current-number{
    text-align:center;
    font-size:50px;
    font-weight:bold;
    color:#f1c40f;
    padding:10px;
}

/* =========================
   CARD NUMBER TABLE
========================= */

.card-number-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:7px;
    max-height:350px;
    overflow-y:auto;
    padding:5px;
}

.card-number{
    padding:12px 5px;
    background:#263853;
    color:white;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
}

.card-number:hover{
    background:#2f80ed;
}

.card-number.selected{
    background:#27ae60;
}

/* =========================
   STATUS
========================= */

.status{
    text-align:center;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
    background:#23334f;
}

.success{
    background:#176b42;
}

.error{
    background:#7b2525;
}

.warning{
    background:#765d15;
}

.timer{
    text-align:center;
    font-size:20px;
    color:#f1c40f;
    font-weight:bold;
}

.small{
    color:#b9c5d6;
    font-size:13px;
    text-align:center;
}

</style></head><body><div class="header"><h1>🎱 GADAA BINGO</h1>

<p>Play • Win • Enjoy</p>

</div><div class="container"><!-- STATUS -->

<div id="statusBox" class="status">
    Connecting to game...
</div>


<!-- GAME INFORMATION -->

<div class="card">

    <div class="info">

        🎮 Game ID:
        <b id="gameId">-</b>

        <br><br>

        💰 Total Sales:
        <b id="totalSales">0 Birr</b>

    </div>

    <div id="timer" class="timer"></div>

</div>


<!-- CARD TYPE -->

<div id="cardTypeSection" class="card">

    <h2>🎫 Choose Card Type</h2>

    <button
        class="btn10"
        onclick="chooseCardType('10')">

        🎫 10 Birr Card

    </button>

    <button
        class="btn20"
        onclick="chooseCardType('20')">

        🎫 20 Birr Card

    </button>

</div>


<!-- CARD NUMBER SELECTION -->

<div
    id="cardNumberSection"
    class="card hidden">

    <h2>
        🎫 Choose Your Card Number
    </h2>

    <div
        id="selectedCardType"
        class="info">

    </div>

    <div
        id="cardNumberGrid"
        class="card-number-grid">

    </div>

    <button
        class="btn"
        onclick="buySelectedCard()">

        💰 BUY SELECTED CARD

    </button>

    <button
        class="danger"
        onclick="backToCardType()">

        🔙 Back

    </button>

</div>


<!-- MY CARD -->

<div
    id="myCardSection"
    class="card hidden">

    <h2>🎫 MY BINGO CARD</h2>

    <div
        id="myCardInfo"
        class="info">

    </div>

    <div class="bingo-title">

        B I N G O

    </div>

    <div
        id="bingoCard"
        class="bingo-grid">

    </div>

    <button
        class="btn"
        onclick="checkBingo()">

        🏆 BINGO

    </button>

</div>


<!-- CURRENT NUMBER -->

<div
    id="currentNumberSection"
    class="card">

    <h2 class="number-title">

        📢 CURRENT NUMBER

    </h2>

    <div
        id="currentNumber"
        class="current-number">

        -

    </div>

</div>


<!-- CALLED NUMBER TABLE -->

<div class="card">

    <h2 class="number-title">

        📢 CALLED NUMBERS

    </h2>

    <div
        id="calledNumbers"
        class="number-grid">

    </div>

</div>


<!-- WINNER -->

<div
    id="winnerSection"
    class="card hidden">

    <h2>🏆 WINNER</h2>

    <div
        id="winnerInfo"
        class="info">

    </div>

</div>

</div><script>

/* =====================================================
   TELEGRAM
===================================================== */

const tg = window.Telegram.WebApp;

tg.ready();

tg.expand();


/* =====================================================
   USER ID
===================================================== */

let userId = null;

if (
    tg.initDataUnsafe &&
    tg.initDataUnsafe.user
) {

    userId =
        tg.initDataUnsafe.user.id;

}


/*
   TEST ONLY

   Yoo Telegram keessatti hin banamne,
   user ID kana fayyadami.

   Production keessatti Telegram ID
   irraa fudhata.
*/

if (!userId) {

    const savedUserId =
        localStorage.getItem(
            "gayaa_user_id"
        );

    if (savedUserId) {

        userId =
            parseInt(
                savedUserId
            );

    }

}


/* =====================================================
   VARIABLES
===================================================== */

let gameState = null;

let selectedCardType = null;

let selectedCardNumber = null;

let myCardNumber = null;

let myCardType = null;

let myCard = null;

let timerInterval = null;


/* =====================================================
   INITIALIZE NUMBER TABLE
===================================================== */

function createNumberTable(){

    const container =
        document.getElementById(
            "calledNumbers"
        );

    container.innerHTML = "";

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const cell =
            document.createElement(
                "div"
            );

        cell.className =
            "number-cell";

        cell.id =
            "number-" + number;

        cell.innerText =
            number;

        container.appendChild(
            cell
        );

    }

}


/* =====================================================
   LOAD GAME STATE
===================================================== */

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state"
            );

        const data =
            await response.json();

        if(
            !data.success
        ){

            showStatus(
                "Game state hin argamne.",
                "error"
            );

            return;

        }

        gameState =
            data;

        updateGameUI();

    }

    catch(error){

        showStatus(
            "Server waliin wal qunnamtiin hin jiru.",
            "error"
        );

    }

}


/* =====================================================
   UPDATE UI
===================================================== */

function updateGameUI(){

    if(!gameState){

        return;

    }


    document.getElementById(
        "gameId"
    ).innerText =
        gameState.game_id;


    document.getElementById(
        "totalSales"
    ).innerText =
        gameState.total_sales +
        " Birr";


    const currentNumber =
        document.getElementById(
            "currentNumber"
        );


    if(
        gameState.current_number
    ){

        currentNumber.innerText =
            gameState.current_number;

    }
    else{

        currentNumber.innerText =
            "-";

    }


    updateCalledNumbers(
        gameState.called_numbers
    );


    if(
        gameState.winner
    ){

        showWinner();

        return;

    }


    if(
        gameState.card_buying
    ){

        showStatus(
            "🎫 Card bitachuuf yeroo jira.",
            "success"
        );

        startTimer(
            gameState.card_buying_end_time
        );

    }
    else if(
        gameState.started
    ){

        showStatus(
            "🎮 Game jalqabameera!",
            "success"
        );

        stopTimer();

    }
    else{

        showStatus(
            "⏳ Game eegamaa jira.",
            "warning"
        );

        stopTimer();

    }

}


/* =====================================================
   CALLED NUMBERS
===================================================== */

function updateCalledNumbers(
    numbers
){

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const cell =
            document.getElementById(
                "number-" + number
            );

        if(!cell){

            continue;

        }

        if(
            numbers.includes(
                number
            )
        ){

            cell.classList.add(
                "called"
            );

        }
        else{

            cell.classList.remove(
                "called"
            );

        }

    }


    if(myCard){

        renderMyCard();

    }

}


/* =====================================================
   TIMER
===================================================== */

function startTimer(
    endTime
){

    stopTimer();

    timerInterval =
        setInterval(

            function(){

                const remaining =
                    Math.max(
                        0,
                        endTime -
                        Date.now() / 1000
                    );

                const seconds =
                    Math.ceil(
                        remaining
                    );

                document.getElementById(
                    "timer"
                ).innerText =
                    "⏱️ Card Buying: " +
                    seconds +
                    " sec";

                if(
                    seconds <= 0
                ){

                    stopTimer();

                    loadGameState();

                }

            },

            500

        );

}


function stopTimer(){

    if(
        timerInterval
    ){

        clearInterval(
            timerInterval
        );

        timerInterval =
            null;

    }

    document.getElementById(
        "timer"
    ).innerText =
        "";

}


/* =====================================================
   CARD TYPE
===================================================== */

function chooseCardType(
    type
){

    if(
        !gameState ||
        !gameState.card_buying
    ){

        showStatus(
            "⏳ Amma card bitachuun hin danda'amu.",
            "warning"
        );

        return;

    }

    selectedCardType =
        type;

    selectedCardNumber =
        null;

    document.getElementById(
        "cardTypeSection"
    ).classList.add(
        "hidden"
    );

    document.getElementById(
        "cardNumberSection"
    ).classList.remove(
        "hidden"
    );

    document.getElementById(
        "selectedCardType"
    ).innerText =
        "Card " +
        type +
        " Birr filatame.";

    createCardNumbers();

}


/* =====================================================
   CARD NUMBER TABLE
===================================================== */

function createCardNumbers(){

    const grid =
        document.getElementById(
            "cardNumberGrid"
        );

    grid.innerHTML = "";

    for(
        let number = 1;
        number <= 500;
        number++
    ){

        const card =
            document.createElement(
                "div"
            );

        card.className =
            "card-number";

        card.innerText =
            number;

        card.onclick =
            function(){

                document
                    .querySelectorAll(
                        ".card-number"
                    )
                    .forEach(

                        function(
                            item
                        ){

                            item.classList.remove(
                                "selected"
                            );

                        }

                    );

                card.classList.add(
                    "selected"
                );

                selectedCardNumber =
                    number;

            };


        grid.appendChild(
            card
        );

    }

}


/* =====================================================
   BACK
===================================================== */

function backToCardType(){

    selectedCardType =
        null;

    selectedCardNumber =
        null;

    document.getElementById(
        "cardNumberSection"
    ).classList.add(
        "hidden"
    );

    document.getElementById(
        "cardTypeSection"
    ).classList.remove(
        "hidden"
    );

}


/* =====================================================
   BUY CARD
===================================================== */

async function buySelectedCard(){

    if(
        !selectedCardType
    ){

        showStatus(
            "Card type filadhu.",
            "warning"
        );

        return;

    }


    if(
        !selectedCardNumber
    ){

        showStatus(
            "Card number filadhu.",
            "warning"
        );

        return;

    }


    if(
        !userId
    ){

        showStatus(
            "Telegram User ID hin argamne.",
            "error"
        );

        return;

    }


    showStatus(
        "⏳ Card bitamaa jira...",
        "warning"
    );


    try{

        const response =
            await fetch(
                "/api/buy-card",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body:JSON.stringify({

                        user_id:userId,

                        card_type:
                            selectedCardType,

                        /*
                           IMPORTANT

                           bot.py amma card number
                           ofumaan filata.

                           Kanaaf selected number
                           UI irraa filatamu qofa.

                           Yoo backend keessatti
                           exact card number barbaadde,
                           endpoint bot.py jijjiiruu qabda.
                        */

                    })

                }

            );


        const data =
            await response.json();


        if(
            !data.success
        ){

            showStatus(
                data.message ||
                "Card bituun hin milkoofne.",
                "error"
            );

            return;

        }


        myCardNumber =
            data.card_number;

        myCardType =
            data.card_type;

        myCard =
            data.card;


        document.getElementById(
            "cardNumberSection"
        ).classList.add(
            "hidden"
        );


        document.getElementById(
            "myCardSection"
        ).classList.remove(
            "hidden"
        );


        document.getElementById(
            "myCardInfo"
        ).innerHTML =

            "🎫 Card Number: <b>" +
            myCardNumber +
            "</b><br><br>" +

            "💰 Type: <b>" +
            myCardType +
            " Birr</b>";


        renderMyCard();


        showStatus(
            "✅ Card milkaa'inaan bitame!",
            "success"
        );


        loadGameState();

    }

    catch(error){

        showStatus(
            "Server error: " +
            error.message,
            "error"
        );

    }

}


/* =====================================================
   RENDER BINGO CARD
===================================================== */

function renderMyCard(){

    if(
        !myCard
    ){

        return;

    }


    const grid =
        document.getElementById(
            "bingoCard"
        );

    grid.innerHTML = "";


    const called =
        gameState
        ? gameState.called_numbers
        : [];


    for(
        let row = 0;
        row < 5;
        row++
    ){

        for(
            let col = 0;
            col < 5;
            col++
        ){

            const value =
                myCard[row][col];


            const cell =
                document.createElement(
                    "div"
                );


            cell.className =
                "bingo-cell";


            if(
                value === "FREE"
            ){

                cell.innerText =
                    "FREE";

                cell.classList.add(
                    "free"
                );

            }
            else{

                cell.innerText =
                    value;


                if(
                    called.includes(
                        value
                    )
                ){

                    cell.classList.add(
                        "called"
                    );

                }

            }


            grid.appendChild(
                cell
            );

        }

    }

}


/* =====================================================
   CHECK BINGO
===================================================== */

async function checkBingo(){

    if(
        !myCardNumber ||
        !myCardType
    ){

        showStatus(
            "Card hin jiru.",
            "error"
        );

        return;

    }


    try{

        const response =
            await fetch(
                "/api/check-bingo",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                            "application/json"
                    },

                    body:JSON.stringify({

                        user_id:userId,

                        card_number:
                            myCardNumber,

                        card_type:
                            myCardType

                    })

                }

            );


        const data =
            await response.json();


        if(
            data.success
        ){

            showStatus(
                "🏆 BINGO! Ati mo'atte!",
                "success"
            );

            alert(
                "🏆 BINGO!\n\nPrize: " +
                data.prize +
                " Birr"
            );

            loadGameState();

        }
        else{

            showStatus(
                data.message ||
                "Bingo hin guunne.",
                "error"
            );

        }

    }

    catch(error){

        showStatus(
            "Server error.",
            "error"
        );

    }

}


/* =====================================================
   WINNER
===================================================== */

function showWinner(){

    document.getElementById(
        "winnerSection"
    ).classList.remove(
        "hidden"
    );


    document.getElementById(
        "winnerInfo"
    ).innerHTML =

        "🏆 Winner User ID: <b>" +
        gameState.winner_user_id +
        "</b><br><br>" +

        "🎫 Card: <b>" +
        gameState.winner_card_number +
        "</b><br><br>" +

        "💰 Prize: <b>" +
        gameState.prize +
        " Birr</b>";

}


/* =====================================================
   STATUS
===================================================== */

function showStatus(
    message,
    type
){

    const box =
        document.getElementById(
            "statusBox"
        );

    box.innerText =
        message;

    box.className =
        "status " +
        type;

}


/* =====================================================
   START
===================================================== */

createNumberTable();

loadGameState();


setInterval(

    loadGameState,

    1000

);


/* =====================================================
   TELEGRAM USER ID
===================================================== */

if(
    userId
){

    localStorage.setItem(
        "gayaa_user_id",
        userId
    );

}

</script></body>
    </html>
