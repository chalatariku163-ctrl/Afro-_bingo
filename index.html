<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gadaa Bingo</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{
    box-sizing:border-box;
}

:root{
    --bg:#b8a6d0;
    --purple:#86008f;
    --orange:#ff8200;
    --blue:#1655d8;
    --red:#e60000;
    --green:#078b16;
}

body{
    margin:0;
    padding:8px;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:white;
}

.app{
    max-width:1100px;
    margin:auto;
}

.top-info{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
    padding:5px;
    border:2px solid white;
    border-radius:14px;
    margin-bottom:8px;
}

.info{
    background:#eeeeee;
    color:#5a126e;
    border:2px solid white;
    border-radius:12px;
    min-height:66px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    font-size:15px;
}

.info b{
    font-size:19px;
    margin-top:5px;
}

.main{
    display:grid;
    grid-template-columns:270px 1fr;
    gap:8px;
}

.bingo-title{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    margin-bottom:6px;
}

.bingo-title div{
    color:white;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    padding:9px 0;
    border-radius:6px;
    border:1px solid white;
}

.b{background:#ffad00}
.i{background:#008b18}
.n{background:#001de0}
.g{background:#ed0000}
.o{background:#78007e}

.number-board{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
}

.number{
    height:57px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#b7b7d1;
    border:1px solid rgba(255,255,255,.7);
    border-radius:8px;
    color:white;
    font-size:20px;
    font-weight:bold;
}

.number.called{
    background:var(--orange);
}

.right-area{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.current-box{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--purple);
    border-radius:48px;
    padding:10px 14px 10px 30px;
    min-height:96px;
}

.current-title{
    font-size:28px;
    font-weight:bold;
}

.current-call{
    width:76px;
    height:76px;
    border-radius:50%;
    background:var(--orange);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
}

.last-calls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    padding:12px;
    background:#cfc1df;
    border:4px solid #ddd4e7;
    border-radius:16px;
    min-height:90px;
}

.last-ball{
    width:58px;
    height:58px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:17px;
    font-weight:bold;
}

.last-ball:nth-child(1){background:#ed0000}
.last-ball:nth-child(2){background:#ffad00}
.last-ball:nth-child(3){background:#ed0000}

.controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#ded4e8;
    color:#4b2860;
    border-radius:12px;
    padding:12px 18px;
    font-size:20px;
    font-weight:bold;
}

.sound{
    display:flex;
    align-items:center;
    gap:8px;
}

.sound-btn{
    width:42px;
    height:42px;
    border-radius:50%;
    border:0;
    background:var(--purple);
    color:white;
    font-size:20px;
}

.auto{
    display:flex;
    align-items:center;
    gap:10px;
}

.auto-status{
    background:#efa16f;
    color:white;
    border-radius:12px;
    padding:8px 15px;
    font-size:15px;
}

.message-box{
    min-height:250px;
    flex:1;
    background:rgba(210,201,230,.55);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

#message{
    color:#5b167e;
    font-size:26px;
    font-weight:bold;
}

.bottom-buttons{
    display:grid;
    grid-template-columns:1fr 1fr 2fr;
    gap:8px;
}

.bottom-buttons button{
    height:62px;
    border:0;
    border-radius:20px;
    color:white;
    font-size:24px;
    font-weight:bold;
}

.leave-btn{background:#d40000}
.refresh-btn{background:#1254d5}
.bingo-btn{background:#efa16f}

.card-area{
    margin-top:10px;
    background:#c9b9dc;
    border-radius:12px;
    padding:10px;
}

.card-title{
    text-align:center;
    color:#5b167e;
    font-size:21px;
    font-weight:bold;
}

.card-number{
    text-align:center;
    color:#5b167e;
    font-weight:bold;
    margin:8px;
}

.bingo-card{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
}

.card-cell{
    min-height:55px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#b7b7d1;
    border:1px solid white;
    border-radius:7px;
    font-size:18px;
    font-weight:bold;
    color:white;
}

.card-cell.marked,
.card-cell.free{
    background:#078b16;
}

.no-card{
    text-align:center;
    padding:35px 15px;
    border:2px dashed #777;
    border-radius:10px;
    color:#5b167e;
    font-weight:bold;
}

@media(max-width:700px){

    body{
        padding:5px;
    }

    .top-info{
        gap:3px;
        padding:3px;
    }

    .info{
        min-height:60px;
        font-size:11px;
    }

    .info b{
        font-size:15px;
    }

    .main{
        grid-template-columns:270px 1fr;
        gap:6px;
    }

    .number{
        height:57px;
        font-size:19px;
    }

    .current-title{
        font-size:21px;
    }

    .current-call{
        width:65px;
        height:65px;
        font-size:20px;
    }

    .last-calls{
        gap:8px;
        padding:8px;
    }

    .last-ball{
        width:52px;
        height:52px;
        font-size:15px;
    }

    .controls{
        font-size:16px;
        padding:10px;
    }

    #message{
        font-size:20px;
    }

    .bottom-buttons{
        position:fixed;
        bottom:0;
        left:0;
        right:0;
        padding:5px;
        background:#b8a6d0;
        z-index:20;
    }

    .bottom-buttons button{
        height:55px;
        font-size:19px;
    }

    .card-area{
        margin-bottom:65px;
    }
}

@media(max-width:430px){

    .main{
        grid-template-columns:170px 1fr;
    }

    .number{
        height:49px;
        font-size:16px;
    }

    .bingo-title div{
        font-size:16px;
        padding:7px 0;
    }

    .current-title{
        font-size:16px;
    }

    .current-call{
        width:54px;
        height:54px;
        font-size:16px;
    }

    .last-ball{
        width:42px;
        height:42px;
        font-size:12px;
    }

    .controls{
        font-size:13px;
    }

    .auto-status{
        padding:6px 8px;
        font-size:12px;
    }

    #message{
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="app">

    <div class="top-info">

        <div class="info">
            GAME ID
            <b id="gameId">---</b>
        </div>

        <div class="info">
            DERASH
            <b id="derash">0</b>
        </div>

        <div class="info">
            PLAYERS
            <b id="players">0</b>
        </div>

        <div class="info">
            STAKE
            <b id="stake">10</b>
        </div>

        <div class="info">
            CALLED
            <b id="calledCount">0</b>
        </div>

    </div>

    <div class="main">

        <div class="left-board">

            <div class="bingo-title">
                <div class="b">B</div>
                <div class="i">I</div>
                <div class="n">N</div>
                <div class="g">G</div>
                <div class="o">O</div>
            </div>

            <div id="numberBoard" class="number-board"></div>

        </div>

        <div class="right-area">

            <div class="current-box">

                <div class="current-title">
                    CURRENT CALL
                </div>

                <div id="currentCall" class="current-call">
                    -
                </div>

            </div>

            <div class="last-calls">

                <div id="last1" class="last-ball">-</div>
                <div id="last2" class="last-ball">-</div>
                <div id="last3" class="last-ball">-</div>

            </div>

            <div class="controls">

                <div class="sound">

                    <span>Sound</span>

                    <button
                        class="sound-btn"
                        onclick="toggleSound()">
                        🔊
                    </button>

                </div>

                <div class="auto">

                    <span>Auto</span>

                    <span id="autoStatus" class="auto-status">
                        5 SEC
                    </span>

                </div>

            </div>

            <div class="message-box">

                <div id="message">
                    ⏳ Game loading...
                </div>

            </div>

            <div class="bottom-buttons">

                <button
                    class="leave-btn"
                    onclick="leaveGame()">
                    ↪ Leave
                </button>

                <button
                    class="refresh-btn"
                    onclick="refreshGame()">
                    ⟳ Refresh
                </button>

                <button
                    class="bingo-btn"
                    onclick="checkBingo()">
                    Bingo!
                </button>

            </div>

        </div>

    </div>

    <div id="cardArea" class="card-area">

        <div class="card-title">
            🎫 YOUR BINGO CARD
        </div>

        <div id="cardNumber" class="card-number">
            Card: Loading...
        </div>

        <div id="bingoCard" class="bingo-card"></div>

    </div>

    <div id="noCardArea" class="no-card" style="display:none">

        <h2>🎫 CARD NOT PURCHASED</h2>

        <p>You do not have a card for this game.</p>

    </div>

</div>

<script>

let tg = null;

if(
    window.Telegram &&
    window.Telegram.WebApp
){

    tg = window.Telegram.WebApp;

    tg.ready();

    tg.expand();

}

let playerId = null;

let calledNumbers = [];

let gameStarted = false;

let currentGameId = null;

let playerCards = [];

let cardData = [];

let soundEnabled = true;

let pollingTimer = null;


/* =========================
   USER ID
========================= */

function getUserId(){

    if(
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ){

        return String(
            tg.initDataUnsafe.user.id
        );

    }

    return null;

}


/* =========================
   BINGO LETTER
========================= */

function getLetter(number){

    number = Number(number);

    if(number >= 1 && number <= 15)
        return "B";

    if(number >= 16 && number <= 30)
        return "I";

    if(number >= 31 && number <= 45)
        return "N";

    if(number >= 46 && number <= 60)
        return "G";

    if(number >= 61 && number <= 75)
        return "O";

    return "";

}


/* =========================
   NUMBER BOARD
========================= */

function createNumberBoard(){

    const board =
        document.getElementById(
            "numberBoard"
        );

    board.innerHTML = "";

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const box =
            document.createElement(
                "div"
            );

        box.className = "number";

        box.id =
            "number-" + number;

        box.innerText =
            number;

        board.appendChild(box);

    }

}


function updateNumberBoard(){

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const box =
            document.getElementById(
                "number-" + number
            );

        if(!box)
            continue;

        box.classList.toggle(

            "called",

            calledNumbers.includes(
                number
            )

        );

    }

}


/* =========================
   LAST CALLS
========================= */

function updateLastCalls(){

    const recent =
        calledNumbers
        .slice(-3)
        .reverse();

    const ids = [
        "last1",
        "last2",
        "last3"
    ];

    ids.forEach(

        (
            id,
            index
        ) => {

            const element =
                document.getElementById(
                    id
                );

            if(
                recent[index] !== undefined
            ){

                element.innerText =
                    getLetter(
                        recent[index]
                    )
                    +
                    "-"
                    +
                    recent[index];

            }else{

                element.innerText =
                    "-";

            }

        }

    );

}


/* =========================
   CARD FROM BOT.PY
========================= */

function renderCard(card){

    const container =
        document.getElementById(
            "bingoCard"
        );

    container.innerHTML = "";

    cardData = [];

    for(
        let row = 0;
        row < 5;
        row++
    ){

        for(
            let col = 0;
            col < 5;
            col++
        ){

            const value =
                card[row][col];

            cardData.push(value);

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell";

            cell.innerText =
                value;

            if(
                value === "FREE"
            ){

                cell.classList.add(
                    "free",
                    "marked"
                );

            }

            container.appendChild(
                cell
            );

        }

    }

    updateCardMarks();

}


function updateCardMarks(){

    const cells =
        document.querySelectorAll(
            ".bingo-card .card-cell"
        );

    cardData.forEach(

        (
            value,
            index
        ) => {

            if(
                value === "FREE"
            )
                return;

            cells[index].classList.toggle(

                "marked",

                calledNumbers.includes(
                    Number(value)
                )

            );

        }

    );

}


/* =========================
   LOAD MY CARD
========================= */

async function loadMyCard(){

    if(!playerId)
        return;

    try{

        const response =
            await fetch(

                "/api/my-card?user_id="
                +
                encodeURIComponent(
                    playerId
                ),

                {
                    cache:
                        "no-store"
                }

            );

        const data =
            await response.json();

        if(
            !response.ok ||
            !data.success ||
            !data.cards ||
            data.cards.length === 0
        ){

            document.getElementById(
                "cardArea"
            ).style.display =
                "none";

            document.getElementById(
                "noCardArea"
            ).style.display =
                "block";

            playerCards = [];

            return;

        }

        playerCards =
            data.cards;

        const firstCard =
            playerCards[0];

        document.getElementById(
            "cardArea"
        ).style.display =
            "block";

        document.getElementById(
            "noCardArea"
        ).style.display =
            "none";

        document.getElementById(
            "cardNumber"
        ).innerText =
            "🎫 Card: "
            +
            firstCard.card_number
            +
            " | "
            +
            firstCard.card_type
            +
            " Birr";

        renderCard(
            firstCard.card
        );

    }catch(error){

        console.log(
            "CARD ERROR:",
            error
        );

    }

}


/* =========================
   JOIN GAME
========================= */

async function joinGame(){

    if(!playerId)
        return;

    try{

        await fetch(

            "/api/join-game",

            {

                method:
                    "POST",

                headers:
                    {
                        "Content-Type":
                        "application/json"
                    },

                body:
                    JSON.stringify({

                        user_id:
                        Number(
                            playerId
                        )

                    })

            }

        );

    }catch(error){

        console.log(
            "JOIN ERROR:",
            error
        );

    }

}


/* =========================
   GAME STATE
========================= */

async function loadGameState(){

    try{

        const response =
            await fetch(

                "/api/game",

                {
                    cache:
                        "no-store"
                }

            );

        const data =
            await response.json();

        if(
            !data.success
        )
            return;

        currentGameId =
            data.game_id;

        calledNumbers =
            data.called_numbers
            ||
            [];

        gameStarted =
            Boolean(
                data.started
            );

        document.getElementById(
            "gameId"
        ).innerText =
            data.game_id;

        document.getElementById(
            "calledCount"
        ).innerText =
            calledNumbers.length;

        document.getElementById(
            "players"
        ).innerText =
            data.players
            ?
            Object.keys(
                data.players
            ).length
            :
            0;

        document.getElementById(
            "currentCall"
        ).innerText =

            data.current_number
            ?
            getLetter(
                data.current_number
            )
            +
            "-"
            +
            data.current_number
            :
            "-";

        updateNumberBoard();

        updateLastCalls();

        updateCardMarks();

        if(
            data.winner
        ){

            showMessage(
                "🏆 WINNER: "
                +
                data.winner
            );

        }else if(
            gameStarted
        ){

            showMessage(
                "🎮 GAME STARTED"
            );

        }else if(
            data.card_buying
        ){

            showMessage(
                "🎫 CARD BUYING OPEN"
            );

        }else{

            showMessage(
                "⏳ WAITING FOR GAME"
            );

        }

    }catch(error){

        console.log(
            "GAME STATE ERROR:",
            error
        );

        showMessage(
            "❌ Server connection error."
        );

    }

}


/* =========================
   BINGO CHECK
========================= */

function checkBingo(){

    if(
        cardData.length !== 25
    ){

        showMessage(
            "🎫 No Bingo card found."
        );

        return;

    }

    if(
        !gameStarted
    ){

        showMessage(
            "⏳ Game has not started."
        );

        return;

    }

    const marked =
        cardData.map(

            value =>

                value === "FREE"
                ||
                calledNumbers.includes(
                    Number(value)
                )

        );

    let bingo = false;

    for(
        let row = 0;
        row < 5;
        row++
    ){

        if(

            marked.slice(
                row * 5,
                row * 5 + 5
            )
            .every(Boolean)

        ){

            bingo = true;

        }

    }

    for(
        let col = 0;
        col < 5;
        col++
    ){

        if(

            [0,1,2,3,4]
            .every(

                row =>
                    marked[
                        row * 5
                        +
                        col
                    ]

            )

        ){

            bingo = true;

        }

    }

    if(

        [0,6,12,18,24]
        .every(
            index =>
                marked[index]
        )

    ){

        bingo = true;

    }

    if(

        [4,8,12,16,20]
        .every(
            index =>
                marked[index]
        )

    ){

        bingo = true;

    }

    if(
        bingo
    ){

        showMessage(
            "🏆 BINGO! You won!"
        );

        if(tg){

            tg.showAlert(
                "🏆 BINGO!"
            );

        }

    }else{

        showMessage(
            "❌ Bingo is not complete."
        );

    }

}


/* =========================
   SOUND
========================= */

function toggleSound(){

    soundEnabled =
        !soundEnabled;

    document.querySelector(
        ".sound-btn"
    ).innerText =
        soundEnabled
        ?
        "🔊"
        :
        "🔇";

}


function speakNumber(number){

    if(
        !soundEnabled
    )
        return;

    if(
        "speechSynthesis"
        in
        window
    ){

        const voice =
            new SpeechSynthesisUtterance(

                getLetter(
                    number
                )
                +
                " "
                +
                number

            );

        speechSynthesis.cancel();

        speechSynthesis.speak(
            voice
        );

    }

}


/* =========================
   REFRESH
========================= */

async function refreshGame(){

    await loadGameState();

    await loadMyCard();

}


/* =========================
   LEAVE
========================= */

function leaveGame(){

    if(tg){

        tg.close();

    }else{

        history.back();

    }

}


/* =========================
   START
========================= */

async function startGame(){

    createNumberBoard();

    playerId =
        getUserId();

    await joinGame();

    await loadMyCard();

    await loadGameState();

    pollingTimer =
        setInterval(

            async function(){

                await loadGameState();

                await loadMyCard();

            },

            2000

        );

}


window.addEventListener(

    "load",

    startGame

);

</script>

</body>
</html>
