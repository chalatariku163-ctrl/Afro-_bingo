<script>

// =====================================================
// TELEGRAM
// =====================================================

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();


// =====================================================
// USER ID
// =====================================================

let userId = null;

if (
    tg.initDataUnsafe &&
    tg.initDataUnsafe.user
) {
    userId = tg.initDataUnsafe.user.id;
}


// =====================================================
// GAME VARIABLES
// =====================================================

let currentGameId = null;

let gameState = null;


// ⭐ USER CARDS HUNDA
let myCards = [];


// =====================================================
// ELEMENTS
// =====================================================

const gameStatus =
    document.getElementById("gameStatus");

const timer =
    document.getElementById("timer");

const currentNumber =
    document.getElementById("currentNumber");

const calledNumbers =
    document.getElementById("calledNumbers");

const buy10Btn =
    document.getElementById("buy10Btn");

const buy20Btn =
    document.getElementById("buy20Btn");

const cardIdGrid =
    document.getElementById("cardIdGrid");

const cardIdPanel =
    document.getElementById("cardIdPanel");

const buyMessage =
    document.getElementById("buyMessage");

const bingoMessage =
    document.getElementById("bingoMessage");


// =====================================================
// MESSAGE
// =====================================================

function showMessage(element, text, type) {

    element.innerText = text;

    element.className =
        "message " + type;

    setTimeout(() => {

        element.className = "message";

    }, 5000);

}


// =====================================================
// LOAD GAME STATE
// =====================================================

async function loadGameState() {

    try {

        const response =
            await fetch("/api/game-state");

        const data =
            await response.json();

        if (!data.success) {

            gameStatus.innerText =
                "⚠️ Game state error";

            return;

        }

        updateGameUI(data);

    }

    catch (error) {

        console.error(error);

        gameStatus.innerText =
            "❌ Server connection error";

    }

}


// =====================================================
// UPDATE GAME UI
// =====================================================

function updateGameUI(data) {

    const now =
        Date.now() / 1000;


    // =========================================
    // NEW GAME
    // =========================================

    if (

        currentGameId !== null &&

        currentGameId !== data.game_id

    ) {

        // GAME HAARAWA
        myCards = [];

        currentGameId =
            data.game_id;

    }


    currentGameId =
        data.game_id;

    gameState =
        data;


    // =========================================
    // CARD BUYING
    // =========================================

    if (data.card_buying) {

        gameStatus.innerText =
            "🟢 CARD BUYING IS OPEN";

        buy10Btn.disabled =
            false;

        buy20Btn.disabled =
            false;


        const remaining =
            Math.max(
                0,
                Math.ceil(
                    data.card_buying_end_time
                    - now
                )
            );

        timer.innerText =
            "⏱️ Card buying: "
            + remaining
            + " sec";


        // CARD ID TABLE MUL'ISI
        cardIdPanel.style.display =
            "block";


        renderCardIds();

    }


    // =========================================
    // GAME RUNNING
    // =========================================

    else if (data.started) {

        gameStatus.innerText =
            "🎮 GAME IS RUNNING";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;

        timer.innerText =
            "🎱 Numbers are being called";


        // CALL NUMBER JALQABUUN
        // CARD ID TABLE DHOKATA

        cardIdPanel.style.display =
            "none";

    }


    // =========================================
    // WINNER
    // =========================================

    else if (data.winner) {

        gameStatus.innerText =
            "🏆 GAME FINISHED";

        timer.innerText =
            "Winner found";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;

        cardIdPanel.style.display =
            "none";

    }


    // =========================================
    // WAITING
    // =========================================

    else {

        gameStatus.innerText =
            "⏳ WAITING FOR GAME";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;

        cardIdPanel.style.display =
            "none";

    }


    // =========================================
    // CURRENT NUMBER
    // =========================================

    if (

        data.current_number !== null &&

        data.current_number !== undefined

    ) {

        currentNumber.innerText =
            formatCall(
                data.current_number
            );

    }

    else {

        currentNumber.innerText =
            "--";

    }


    // =========================================
    // CALLED NUMBERS
    // =========================================

    renderCalledNumbers(
        data.called_numbers || []
    );


    // =========================================
    // ⭐ USER CARDS UPDATE
    // =========================================

    renderMyCards();

}


// =====================================================
// CARD ID TABLE 1 - 500
// =====================================================

function renderCardIds() {

    cardIdGrid.innerHTML =
        "";


    for (

        let i = 1;

        i <= 500;

        i++

    ) {

        const div =
            document.createElement(
                "div"
            );


        div.className =
            "card-id";


        div.innerText =
            i;


        div.id =
            "card-id-" + i;


        // ⭐ CARD USER BITATE
        // CARD ID HUNDA HALLUU ADDAA

        const alreadyBought =
            myCards.some(
                card =>
                    Number(
                        card.card_number
                    ) === i
            );


        if (alreadyBought) {

            div.classList.add(
                "my-card"
            );

        }


        // CARD ID CLICK

        div.onclick =
            function () {

                if (

                    gameState &&

                    gameState.card_buying

                ) {

                    // CARD DURSEE BITAME
                    if (alreadyBought) {

                        showMessage(

                            buyMessage,

                            "⚠️ Card #"
                            + i
                            + " dursee bitameera.",

                            "error"

                        );

                        return;

                    }


                    // CARD FILATAME

                    document
                        .querySelectorAll(
                            ".card-id"
                        )
                        .forEach(
                            function (item) {

                                item.classList
                                    .remove(
                                        "selected"
                                    );

                            }
                        );


                    div.classList.add(
                        "selected"
                    );


                    // CARD ID FILATAMEERA

                    window.selectedCardNumber =
                        i;


                    showMessage(

                        buyMessage,

                        "🎫 Card #"
                        + i
                        + " filatameera. "
                        + "Amma Card 10 ykn Card 20 bitadhu.",

                        "success"

                    );

                }

            };


        cardIdGrid.appendChild(
            div
        );

    }

}


// =====================================================
// FORMAT NUMBER
// =====================================================

function formatCall(number) {

    if (
        number >= 1 &&
        number <= 15
    )
        return "B-" + number;


    if (
        number >= 16 &&
        number <= 30
    )
        return "I-" + number;


    if (
        number >= 31 &&
        number <= 45
    )
        return "N-" + number;


    if (
        number >= 46 &&
        number <= 60
    )
        return "G-" + number;


    if (
        number >= 61 &&
        number <= 75
    )
        return "O-" + number;


    return number;

}


// =====================================================
// CALLED NUMBERS
// =====================================================

function renderCalledNumbers(numbers) {

    calledNumbers.innerHTML =
        "";


    for (

        let i = 1;

        i <= 75;

        i++

    ) {

        const div =
            document.createElement(
                "div"
            );


        div.className =
            "called-number";


        div.innerText =
            formatCall(i);


        if (

            numbers.includes(i)

        ) {

            div.classList.add(
                "active"
            );

        }


        calledNumbers.appendChild(
            div
        );

    }

}


// =====================================================
// BUY CARD
// =====================================================

async function buyCard(type) {

    if (!userId) {

        showMessage(

            buyMessage,

            "⚠️ Telegram User ID hin argamne.",

            "error"

        );

        return;

    }


    const selectedCardNumber =
        window.selectedCardNumber;


    if (!selectedCardNumber) {

        showMessage(

            buyMessage,

            "⚠️ Dura Card ID 1 hanga 500 keessaa tokko filadhu.",

            "error"

        );

        return;

    }


    if (

        !gameState ||

        !gameState.card_buying

    ) {

        showMessage(

            buyMessage,

            "⚠️ Yeroon Card bitachuu xumurame.",

            "error"

        );

        return;

    }


    buy10Btn.disabled =
        true;

    buy20Btn.disabled =
        true;


    try {

        const response =
            await fetch(

                "/api/buy-card",

                {

                    method:
                        "POST",

                    headers:
                    {
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({

                            user_id:
                                userId,

                            card_type:
                                type,

                            card_number:
                                selectedCardNumber

                        })

                }

            );


        const data =
            await response.json();


        if (!data.success) {

            showMessage(

                buyMessage,

                data.message ||
                "Card bitachuu hin dandeenye.",

                "error"

            );

            return;

        }


        // =========================================
        // ⭐ CARD HAARAA USER BITATE
        // =========================================

        const newCard = {

            game_id:
                data.game_id,

            card_number:
                data.card_number,

            card_type:
                data.card_type,

            card:
                data.card,

            markedCells:
                [

                    "2-2"

                ]

        };


        // ⭐ CARD DURAA IRRA HIN BARBANE
        // CARD HAARAA QOFA DABALI

        myCards.push(
            newCard
        );


        // CARD ID TABLE UPDATE

        renderCardIds();


        // ⭐ CARD BITAME GARA MIRGAA MUL'ISIISI

        renderMyCards();


        showMessage(

            buyMessage,

            "✅ Card #"
            + data.card_number
            + " milkaa'inaan bitame!",

            "success"

        );


        // CARD ID FILATAME QULQULLI

        window.selectedCardNumber =
            null;


        document
            .querySelectorAll(
                ".card-id"
            )
            .forEach(
                function (item) {

                    item.classList
                        .remove(
                            "selected"
                        );

                }
            );


    }

    catch (error) {

        console.error(error);

        showMessage(

            buyMessage,

            "❌ Server error.",

            "error"

        );

    }


    finally {

        if (

            gameState &&

            gameState.card_buying

        ) {

            buy10Btn.disabled =
                false;

            buy20Btn.disabled =
                false;

        }

    }

}


// =====================================================
// ⭐ RENDER ALL USER CARDS
// =====================================================

function renderMyCards() {

    const myCardBox =
        document.getElementById(
            "myCardBox"
        );


    if (!myCardBox) {

        return;

    }


    // CARD HIN JIRRE

    if (

        myCards.length === 0

    ) {

        myCardBox.style.display =
            "none";

        return;

    }


    // CARD BOX MUL'ISI

    myCardBox.style.display =
        "block";


    // =========================================
    // CARD HUNDA USER BITATE
    // =========================================

    myCardBox.innerHTML =
        "";


    myCards.forEach(

        function (userCard, index) {


            const cardPanel =
                document.createElement(
                    "div"
                );


            cardPanel.className =
                "user-card-panel";


            cardPanel.style.marginBottom =
                "12px";


            cardPanel.innerHTML = `

                <div class="card-header">

                    <div class="card-number">

                        🎫 CARD #

                        ${userCard.card_number}

                    </div>

                    <div class="card-type">

                        ${userCard.card_type}

                        Birr

                    </div>

                </div>


                <table class="bingo-card">

                    <thead>

                        <tr>

                            <th>B</th>

                            <th>I</th>

                            <th>N</th>

                            <th>G</th>

                            <th>O</th>

                        </tr>

                    </thead>


                    <tbody>

                    </tbody>

                </table>


                <button
                    class="btn-bingo"
                    data-index="${index}"
                >

                    🏆 BINGO CARD #

                    ${userCard.card_number}

                </button>


                <div
                    class="message bingo-card-message"
                ></div>

            `;


            const table =
                cardPanel.querySelector(
                    "tbody"
                );


            // =========================================
            // CARD NUMBER 5 x 5
            // =========================================

            for (

                let row = 0;

                row < 5;

                row++

            ) {

                const tr =
                    document.createElement(
                        "tr"
                    );


                for (

                    let col = 0;

                    col < 5;

                    col++

                ) {

                    const td =
                        document.createElement(
                            "td"
                        );


                    const value =
                        userCard.card[row][col];


                    td.innerText =
                        value;


                    const key =
                        row
                        + "-"
                        + col;


                    if (

                        value ===
                        "FREE"

                    ) {

                        td.classList.add(
                            "free"
                        );

                        td.classList.add(
                            "marked"
                        );


                        if (

                            !userCard.markedCells
                                .includes(
                                    key
                                )

                        ) {

                            userCard.markedCells
                                .push(
                                    key
                                );

                        }

                    }


                    if (

                        userCard.markedCells
                            .includes(
                                key
                            )

                    ) {

                        td.classList.add(
                            "marked"
                        );

                    }


                    // =========================================
                    // NUMBER CLICK
                    // =========================================

                    td.onclick =
                        function () {

                            toggleCardCell(

                                userCard,

                                td,

                                value,

                                row,

                                col

                            );

                        };


                    tr.appendChild(
                        td
                    );

                }


                table.appendChild(
                    tr
                );

            }


            // =========================================
            // BINGO BUTTON
            // =========================================

            const bingoButton =
                cardPanel.querySelector(
                    ".btn-bingo"
                );


            bingoButton.onclick =
                function () {

                    claimBingo(
                        userCard,
                        cardPanel
                    );

                };


            myCardBox.appendChild(
                cardPanel
            );

        }

    );

}


// =====================================================
// MARK CARD CELL
// =====================================================

function toggleCardCell(

    userCard,

    cell,

    value,

    row,

    col

) {

    if (

        value ===
        "FREE"

    ) {

        return;

    }


    if (

        !gameState ||

        !gameState.called_numbers

    ) {

        return;

    }


    if (

        !gameState.called_numbers
            .includes(
                value
            )

    ) {

        showMessage(

            bingoMessage,

            "⚠️ Lakkoofsi kun hin waamamin.",

            "error"

        );

        return;

    }


    const key =
        row
        + "-"
        + col;


    cell.classList.toggle(
        "marked"
    );


    if (

        cell.classList.contains(
            "marked"
        )

    ) {

        if (

            !userCard.markedCells
                .includes(
                    key
                )

        ) {

            userCard.markedCells.push(
                key
            );

        }

    }

    else {

        userCard.markedCells =
            userCard.markedCells.filter(

                item =>
                    item !== key

            );

    }

}


// =====================================================
// CLAIM BINGO
// =====================================================

async function claimBingo(

    userCard,

    cardPanel

) {

    if (!userId) {

        showMessage(

            bingoMessage,

            "⚠️ User ID hin argamne.",

            "error"

        );

        return;

    }


    const button =
        cardPanel.querySelector(
            ".btn-bingo"
        );


    button.disabled =
        true;


    try {

        const response =
            await fetch(

                "/api/check-bingo",

                {

                    method:
                        "POST",

                    headers:
                    {
                        "Content-Type":
                            "application/json"
                    },

                    body:
                        JSON.stringify({

                            user_id:
                                userId,

                            card_number:
                                userCard.card_number,

                            card_type:
                                userCard.card_type

                        })

                }

            );


        const data =
            await response.json();


        const message =
            cardPanel.querySelector(
                ".bingo-card-message"
            );


        if (data.success) {

            showMessage(

                message,

                "🏆 BINGO! Ati mo'atteetta! Prize: "
                + data.prize
                + " Birr",

                "success"

            );

        }

        else {

            showMessage(

                message,

                data.message ||
                "Bingo hin mirkanoofne.",

                "error"

            );

        }

    }

    catch (error) {

        console.error(error);

        showMessage(

            bingoMessage,

            "❌ Server error.",

            "error"

        );

    }

    finally {

        button.disabled =
            false;

    }

}


// =====================================================
// LEAVE
// =====================================================

function leaveGame() {

    const myCardBox =
        document.getElementById(
            "myCardBox"
        );


    if (myCardBox) {

        myCardBox.style.display =
            "none";

    }

}


// =====================================================
// AUTO REFRESH
// =====================================================

setInterval(

    function () {

        loadGameState();

    },

    1000

);


// =====================================================
// TIMER
// =====================================================

setInterval(

    function () {

        if (gameState) {

            updateGameUI(
                gameState
            );

        }

    },

    500

);


// =====================================================
// START
// =====================================================

loadGameState();

    </script>
