<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GADAA BINGO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:
    linear-gradient(135deg,#061b2c,#0b3d5c,#061b2c);
    color:white;
    min-height:100vh;
}

.header{
    padding:16px;
    text-align:center;
    background:rgba(0,0,0,.35);
    border-bottom:1px solid rgba(255,255,255,.15);
}

.header h1{
    font-size:24px;
    color:#ffd700;
}

.header p{
    margin-top:5px;
    font-size:13px;
    opacity:.8;
}

.container{
    max-width:700px;
    margin:auto;
    padding:15px;
}

.status-box{
    background:rgba(255,255,255,.1);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    text-align:center;
}

.status{
    font-size:18px;
    font-weight:bold;
    color:#00ff9d;
}

.timer{
    margin-top:8px;
    color:#ffd700;
}

.game-area{
    display:none;
}

.card-select{
    background:rgba(255,255,255,.1);
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

.card-select h2{
    text-align:center;
    margin-bottom:12px;
    color:#ffd700;
}

.card-input{
    display:flex;
    gap:8px;
}

.card-input input{
    flex:1;
    padding:13px;
    border:none;
    border-radius:10px;
    font-size:16px;
    text-align:center;
}

button{
    border:none;
    border-radius:10px;
    padding:13px 18px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.select-btn{
    background:#00c853;
    color:white;
}

.bingo-btn{
    width:100%;
    background:#ffd700;
    color:#111;
    font-size:20px;
    margin-top:15px;
}

.bingo-btn:disabled{
    opacity:.5;
}

.current-number-box{
    text-align:center;
    margin:15px 0;
}

.current-label{
    font-size:14px;
    opacity:.8;
}

.current-number{
    width:100px;
    height:100px;
    margin:10px auto;
    border-radius:50%;
    background:#e53935;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    box-shadow:0 0 25px rgba(255,0,0,.5);
}

.bingo-layout{
    display:flex;
    gap:12px;
    align-items:flex-start;
}

.card-area{
    flex:1;
}

.card-title{
    text-align:center;
    margin-bottom:8px;
    color:#ffd700;
}

.bingo-card{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:4px;
    background:#111;
    padding:5px;
    border-radius:10px;
}

.cell{
    aspect-ratio:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    color:#111;
    border-radius:5px;
    font-size:14px;
    font-weight:bold;
}

.cell.called{
    background:#00c853;
    color:white;
    box-shadow:0 0 8px #00ff88;
}

.cell.free{
    background:#ffd700;
    color:#111;
}

.called-area{
    width:120px;
    background:rgba(255,255,255,.1);
    border-radius:12px;
    padding:10px;
}

.called-area h3{
    text-align:center;
    font-size:14px;
    color:#ffd700;
    margin-bottom:8px;
}

.called-numbers{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    max-height:360px;
    overflow-y:auto;
}

.called-number{
    width:30px;
    height:30px;
    border-radius:50%;
    background:#2196f3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:12px;
    font-weight:bold;
}

.message{
    text-align:center;
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    background:rgba(0,0,0,.3);
}

.success{
    color:#00ff88;
}

.error{
    color:#ff5252;
}

.warning{
    color:#ffd700;
}

.info{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    opacity:.8;
}

@media(max-width:500px){

    .bingo-layout{
        gap:7px;
    }

    .called-area{
        width:95px;
        padding:6px;
    }

    .called-number{
        width:24px;
        height:24px;
        font-size:10px;
    }

    .cell{
        font-size:11px;
    }

    .current-number{
        width:80px;
        height:80px;
        font-size:32px;
    }

}

</style>
</head>

<body>

<div class="header">

    <h1>🎯 GADAA BINGO</h1>

    <p>Play • Win • Enjoy</p>

</div>


<div class="container">

    <div class="status-box">

        <div id="status" class="status">
            ⏳ Connecting...
        </div>

        <div id="timer" class="timer"></div>

    </div>


    <!-- CARD SELECT -->

    <div id="cardSelect" class="card-select">

        <h2>🎫 SELECT YOUR CARD</h2>

        <div class="card-input">

            <input
                id="cardNumber"
                type="number"
                min="1"
                max="500"
                placeholder="Card Number 1 - 500"
            >

            <button
                class="select-btn"
                onclick="selectCard()"
            >
                SELECT
            </button>

        </div>

        <div class="info">
            Card number kee Telegram keessatti bitatte galchi.
        </div>

    </div>


    <!-- GAME -->

    <div id="gameArea" class="game-area">


        <div class="current-number-box">

            <div class="current-label">
                📢 CURRENT NUMBER
            </div>

            <div
                id="currentNumber"
                class="current-number"
            >
                -
            </div>

        </div>


        <div class="bingo-layout">


            <div class="card-area">

                <div
                    id="cardTitle"
                    class="card-title"
                >
                    🎫 CARD
                </div>

                <div
                    id="bingoCard"
                    class="bingo-card"
                ></div>

            </div>


            <div class="called-area">

                <h3>📢 CALLED</h3>

                <div
                    id="calledNumbers"
                    class="called-numbers"
                ></div>

            </div>


        </div>


        <button
            id="bingoButton"
            class="bingo-btn"
            onclick="claimBingo()"
            disabled
        >
            🏆 BINGO!
        </button>


        <div
            id="message"
            class="message"
        ></div>

    </div>

</div>


<script>

const tg = window.Telegram.WebApp;

tg.ready();

tg.expand();


/* =====================================================
   API
===================================================== */

const API_BASE = window.location.origin;


/* =====================================================
   VARIABLES
===================================================== */

let selectedCard = null;

let selectedCardType = "10";

let currentGameId = 0;

let calledNumbers = [];

let gameStarted = false;

let cardBuying = false;

let cardData = [];

let lastCurrentNumber = null;


/* =====================================================
   USER ID
===================================================== */

function getUserId(){

    if(
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ){

        return tg.initDataUnsafe.user.id;

    }

    const saved =
        localStorage.getItem("user_id");

    return saved || null;

}


/* =====================================================
   MESSAGE
===================================================== */

function showMessage(
    text,
    type="info"
){

    const message =
        document.getElementById("message");

    message.innerHTML = text;

    message.className =
        "message " + type;

}


/* =====================================================
   GAME STATE
===================================================== */

async function loadGameState(){

    try{

        const response =
            await fetch(
                API_BASE +
                "/api/game-state"
            );

        const data =
            await response.json();

        if(!data.success){

            showMessage(
                "Game state error.",
                "error"
            );

            return;

        }


        currentGameId =
            data.game_id;

        calledNumbers =
            data.called_numbers || [];

        gameStarted =
            data.started;

        cardBuying =
            data.card_buying;


        updateStatus(data);

        updateCalledNumbers();

        updateCurrentNumber(
            data.current_number
        );


        if(
            selectedCard &&
            gameStarted
        ){

            document
            .getElementById(
                "bingoButton"
            )
            .disabled = false;

        }


        if(
            selectedCard &&
            gameStarted
        ){

            renderCard();

        }

    }

    catch(error){

        console.error(error);

        showMessage(
            "Server waliin wal qunnamtiin hin jiru.",
            "error"
        );

    }

}


/* =====================================================
   UPDATE STATUS
===================================================== */

function updateStatus(data){

    const status =
        document.getElementById(
            "status"
        );

    const timer =
        document.getElementById(
            "timer"
        );


    if(data.winner){

        status.innerHTML =
            "🏆 WINNER FOUND";

        timer.innerHTML =
            "Game xumurame.";

        return;

    }


    if(data.card_buying){

        status.innerHTML =
            "🎫 CARD BUYING OPEN";

        const remaining =
            Math.max(
                0,
                Math.ceil(
                    data.card_buying_end_time
                    - Date.now()/1000
                )
            );

        timer.innerHTML =
            "⏳ Card buying: " +
            remaining +
            " seconds";

        return;

    }


    if(data.started){

        status.innerHTML =
            "🎮 GAME IS RUNNING";

        timer.innerHTML =
            "📢 Number waamamaa jira";

        return;

    }


    status.innerHTML =
        "⏸ GAME NOT STARTED";

    timer.innerHTML =
        "Game itti aanu eegi.";

}


/* =====================================================
   SELECT CARD
===================================================== */

function selectCard(){

    const input =
        document.getElementById(
            "cardNumber"
        );

    const number =
        parseInt(
            input.value
        );


    if(
        !number ||
        number < 1 ||
        number > 500
    ){

        showMessage(
            "⚠️ Card number 1 hanga 500 galchi.",
            "error"
        );

        return;

    }


    selectedCard =
        number;


    localStorage.setItem(
        "selected_card",
        number
    );


    document
    .getElementById(
        "cardSelect"
    )
    .style.display =
        "none";


    document
    .getElementById(
        "gameArea"
    )
    .style.display =
        "block";


    document
    .getElementById(
        "cardTitle"
    )
    .innerHTML =
        "🎫 CARD " +
        number;


    generateCard();


    showMessage(
        "✅ Card " +
        number +
        " filatame. Game jalqaba.",
        "success"
    );


    loadGameState();

}


/* =====================================================
   GENERATE CARD
===================================================== */

function generateCard(){

    if(!selectedCard){

        return;

    }


    let seed =
        parseInt(
            selectedCard
        );


    function seededRandom(
        min,
        max
    ){

        seed =
            (
                seed *
                9301 +
                49297
            ) % 233280;


        const rnd =
            seed / 233280;


        return Math.floor(
            min +
            rnd *
            (
                max -
                min +
                1
            )
        );

    }


    function generateColumn(
        min,
        max
    ){

        const numbers = [];


        while(
            numbers.length < 5
        ){

            const number =
                seededRandom(
                    min,
                    max
                );


            if(
                !numbers.includes(
                    number
                )
            ){

                numbers.push(
                    number
                );

            }

        }


        return numbers;

    }


    const columns = [

        generateColumn(1,15),

        generateColumn(16,30),

        generateColumn(31,45),

        generateColumn(46,60),

        generateColumn(61,75)

    ];


    cardData = [];


    for(
        let row = 0;
        row < 5;
        row++
    ){

        const rowData = [];


        for(
            let col = 0;
            col < 5;
            col++
        ){

            if(
                row === 2 &&
                col === 2
            ){

                rowData.push(
                    "FREE"
                );

            }

            else{

                rowData.push(
                    columns[col][row]
                );

            }

        }


        cardData.push(
            rowData
        );

    }


    renderCard();

}


/* =====================================================
   RENDER CARD
===================================================== */

function renderCard(){

    const container =
        document.getElementById(
            "bingoCard"
        );


    container.innerHTML = "";


    if(!cardData.length){

        return;

    }


    cardData.forEach(

        (row) => {

            row.forEach(

                (value) => {

                    const cell =
                        document.createElement(
                            "div"
                        );


                    cell.className =
                        "cell";


                    cell.innerText =
                        value;


                    if(
                        value === "FREE"
                    ){

                        cell.classList.add(
                            "free"
                        );

                    }

                    else if(
                        calledNumbers
                        .includes(
                            value
                        )
                    ){

                        cell.classList.add(
                            "called"
                        );

                    }


                    container.appendChild(
                        cell
                    );

                }

            );

        }

    );

}


/* =====================================================
   CURRENT NUMBER
===================================================== */

function updateCurrentNumber(
    number
){

    const element =
        document.getElementById(
            "currentNumber"
        );


    if(
        number === null ||
        number === undefined
    ){

        element.innerText =
            "-";

        return;

    }


    element.innerText =
        number;


    if(
        number !== lastCurrentNumber
    ){

        lastCurrentNumber =
            number;


        try{

            if(
                navigator.vibrate
            ){

                navigator.vibrate(
                    200
                );

            }

        }

        catch(error){}

    }

}


/* =====================================================
   CALLED NUMBERS
===================================================== */

function updateCalledNumbers(){

    const container =
        document.getElementById(
            "calledNumbers"
        );


    container.innerHTML = "";


    [...calledNumbers]
    .reverse()
    .forEach(

        (number) => {

            const item =
                document.createElement(
                    "div"
                );


            item.className =
                "called-number";


            item.innerText =
                number;


            container.appendChild(
                item
            );

        }

    );


    renderCard();

}


/* =====================================================
   CHECK BINGO
===================================================== */

async function claimBingo(){

    if(!selectedCard){

        showMessage(
            "Card hin filatam.",
            "error"
        );

        return;

    }


    const userId =
        getUserId();


    if(!userId){

        showMessage(
            "Telegram user ID hin argamne.",
            "error"
        );

        return;

    }


    const button =
        document.getElementById(
            "bingoButton"
        );


    button.disabled =
        true;


    showMessage(
        "⏳ Bingo mirkaneessaa jira...",
        "warning"
    );


    try{

        const response =
            await fetch(

                API_BASE +
                "/api/check-bingo",

                {

                    method:
                    "POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:

                    JSON.stringify({

                        user_id:
                        userId,

                        card_number:
                        selectedCard,

                        card_type:
                        selectedCardType

                    })

                }

            );


        const data =
            await response.json();


        if(
            data.success
        ){

            showMessage(

                "🏆 BINGO! ATI MO'ATTE!<br>" +

                "💰 Prize: " +

                data.prize +

                " Birr",

                "success"

            );


            if(
                tg &&
                tg.showPopup
            ){

                tg.showPopup({

                    title:
                    "🏆 BINGO!",

                    message:
                    "Ati mo'atte! Prize: " +
                    data.prize +
                    " Birr",

                    buttons:[
                        {
                            type:
                            "ok"
                        }
                    ]

                });

            }


            return;

        }


        showMessage(

            "❌ " +
            (
                data.message ||
                "Bingo hin guunne."
            ),

            "error"

        );


        button.disabled =
            false;

    }

    catch(error){

        console.error(error);

        showMessage(

            "❌ Server error.",

            "error"

        );


        button.disabled =
            false;

    }

}


/* =====================================================
   AUTO REFRESH
===================================================== */

setInterval(

    loadGameState,

    1000

);


/* =====================================================
   START
===================================================== */

window.addEventListener(

    "load",

    () => {

        const savedCard =
            localStorage.getItem(
                "selected_card"
            );


        if(savedCard){

            document
            .getElementById(
                "cardNumber"
            )
            .value =
                savedCard;

        }


        loadGameState();

    }

);

</script>

</body>
</html>
