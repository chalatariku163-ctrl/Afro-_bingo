<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GADAA BINGO</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#061b2c,#0b3d5c,#061b2c);
    color:white;
    min-height:100vh;
}

.header{
    text-align:center;
    padding:12px 8px;
    background:rgba(0,0,0,.35);
    border-bottom:1px solid rgba(255,255,255,.15);
}

.header h1{
    color:#ffd700;
    font-size:22px;
}

.header p{
    font-size:11px;
    opacity:.75;
    margin-top:4px;
}

.container{
    width:100%;
    max-width:850px;
    margin:auto;
    padding:8px;
}

/* GAME INFO */

.game-info{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    margin-bottom:8px;
}

.info-box{
    background:rgba(255,255,255,.1);
    border-radius:8px;
    padding:7px 3px;
    text-align:center;
}

.info-box small{
    display:block;
    font-size:9px;
    opacity:.7;
}

.info-box strong{
    display:block;
    margin-top:3px;
    color:#ffd700;
    font-size:13px;
}

/* STATUS */

.status-box{
    background:rgba(255,255,255,.1);
    border-radius:10px;
    padding:8px;
    text-align:center;
    margin-bottom:8px;
}

.status{
    font-size:15px;
    font-weight:bold;
    color:#00ff9d;
}

.timer{
    margin-top:4px;
    color:#ffd700;
    font-size:12px;
}

/* BUY */

.card-buying{
    background:rgba(255,255,255,.1);
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    text-align:center;
}

.card-buying h2{
    color:#ffd700;
    font-size:16px;
    margin-bottom:8px;
}

.buy-buttons{
    display:flex;
    gap:8px;
}

button{
    border:none;
    border-radius:8px;
    padding:10px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

.buy-btn{
    flex:1;
    background:#00c853;
    color:white;
}

button:disabled{
    opacity:.45;
    cursor:not-allowed;
}

/* CURRENT CALL */

.current-call{
    background:rgba(0,0,0,.35);
    border-radius:10px;
    padding:8px;
    text-align:center;
    margin-bottom:8px;
}

.current-label{
    font-size:11px;
    opacity:.75;
}

.current-number{
    font-size:34px;
    font-weight:bold;
    color:#ffd700;
    margin-top:3px;
}

/* MAIN GAME */

.game-layout{
    display:grid;
    grid-template-columns:1fr 1.25fr;
    gap:8px;
    align-items:start;
}

/* CALLED BOARD */

.called-board{
    background:rgba(255,255,255,.08);
    border-radius:10px;
    padding:7px;
}

.called-board h3{
    text-align:center;
    color:#ffd700;
    font-size:14px;
    margin-bottom:6px;
}

.bingo-table{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
}

.bingo-head{
    text-align:center;
    color:#ffd700;
    font-size:13px;
    font-weight:bold;
    padding:3px 0;
}

.number{
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:5px;
    background:#18394d;
    font-size:11px;
    font-weight:bold;
}

.number.called{
    background:#00c853;
    color:white;
    box-shadow:0 0 7px #00ff88;
}

.number.current{
    background:#e53935;
    color:white;
    box-shadow:0 0 10px #ff5252;
}

/* CARD */

.card-area{
    background:rgba(255,255,255,.08);
    border-radius:10px;
    padding:7px;
}

.card-title{
    text-align:center;
    color:#ffd700;
    font-size:14px;
    font-weight:bold;
    margin-bottom:6px;
}

.card-header{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
    margin-bottom:3px;
}

.card-header div{
    text-align:center;
    color:#ffd700;
    font-weight:bold;
    font-size:14px;
}

.bingo-card{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
    background:#111;
    padding:4px;
    border-radius:8px;
}

.cell{
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f5f5f5;
    color:#111;
    border-radius:4px;
    font-size:12px;
    font-weight:bold;
}

.cell.called{
    background:#00c853;
    color:white;
}

.cell.free{
    background:#ffd700;
    color:#111;
}

/* CONTROLS */

.controls{
    display:flex;
    gap:5px;
    margin-top:8px;
}

.control-btn{
    flex:1;
    padding:8px 4px;
    background:#263238;
    color:white;
    font-size:11px;
}

.control-btn.active{
    background:#00c853;
}

/* BINGO */

.bingo-btn{
    width:100%;
    margin-top:8px;
    padding:13px;
    background:#ffd700;
    color:#111;
    font-size:20px;
}

.message{
    text-align:center;
    margin-top:8px;
    min-height:20px;
    padding:7px;
    border-radius:7px;
    font-size:12px;
}

.success{color:#00ff88;}
.error{color:#ff5252;}
.warning{color:#ffd700;}

@media(max-width:600px){

    .container{
        padding:6px;
    }

    .game-info{
        gap:3px;
    }

    .info-box{
        padding:5px 2px;
    }

    .info-box small{
        font-size:8px;
    }

    .info-box strong{
        font-size:11px;
    }

    .game-layout{
        grid-template-columns:1fr 1.15fr;
        gap:5px;
    }

    .number{
        font-size:9px;
    }

    .cell{
        font-size:10px;
    }

    .current-number{
        font-size:28px;
    }

    button{
        font-size:11px;
        padding:9px 4px;
    }
}
</style></head><body><div class="header">
    <h1>🎯 GADAA BINGO</h1>
    <p>Play • Win • Enjoy</p>
</div><div class="container"><!-- GAME INFO -->

<div class="game-info">

    <div class="info-box">
        <small>Game ID</small>
        <strong id="gameId">----</strong>
    </div>

    <div class="info-box">
        <small>Players</small>
        <strong id="players">0</strong>
    </div>

    <div class="info-box">
        <small>Stake</small>
        <strong id="stake">0</strong>
    </div>

    <div class="info-box">
        <small>Called</small>
        <strong id="calledCount">0</strong>
    </div>

</div>

<!-- STATUS -->

<div class="status-box">

    <div id="status" class="status">
        ⏳ Connecting...
    </div>

    <div id="timer" class="timer"></div>

</div>

<!-- BUY CARD -->

<div id="cardBuyingBox" class="card-buying">

    <h2>🎫 BUY CARD</h2>

    <div id="buyTimer" class="timer">
        ⏳ Waiting...
    </div>

    <div class="buy-buttons">

        <button
            id="buy10Button"
            class="buy-btn"
            onclick="buyCard('10')"
            disabled
        >
            🎫 10 BIRR
        </button>

        <button
            id="buy20Button"
            class="buy-btn"
            onclick="buyCard('20')"
            disabled
        >
            🎫 20 BIRR
        </button>

    </div>

</div>

<!-- CURRENT CALL -->

<div class="current-call">

    <div class="current-label">
        📢 CURRENT CALL
    </div>

    <div
        id="currentNumber"
        class="current-number"
    >
        -
    </div>

</div>

<!-- GAME -->

<div id="gameArea" style="display:none;">

    <div class="game-layout">

        <!-- LEFT: CALLED NUMBERS -->

        <div class="called-board">

            <h3>📢 CALLED NUMBERS</h3>

            <div
                id="bingoTable"
                class="bingo-table"
            ></div>

        </div>

        <!-- RIGHT: USER CARD -->

        <div class="card-area">

            <div
                id="cardTitle"
                class="card-title"
            >
                🎫 MY BINGO CARD
            </div>

            <div class="card-header">

                <div>B</div>
                <div>I</div>
                <div>N</div>
                <div>G</div>
                <div>O</div>

            </div>

            <div
                id="bingoCard"
                class="bingo-card"
            ></div>

        </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

        <button
            id="soundButton"
            class="control-btn active"
            onclick="toggleSound()"
        >
            🔊 Sound ON
        </button>

        <button
            id="autoButton"
            class="control-btn active"
            onclick="toggleAuto()"
        >
            ⚡ Auto ON
        </button>

        <button
            class="control-btn"
            onclick="loadGameState()"
        >
            🔄 Refresh
        </button>

        <button
            class="control-btn"
            onclick="leaveGame()"
        >
            🚪 Leave
        </button>

    </div>

    <!-- BINGO -->

    <button
        id="bingoButton"
        class="bingo-btn"
        onclick="claimBingo()"
        disabled
    >
        🏆 BINGO!
    </button>

    <div
        id="message"
        class="message"
    ></div>

</div>

</div><script>

/* TELEGRAM */

const tg = window.Telegram.WebApp;

tg.ready();

tg.expand();


/* API */

const API_BASE = window.location.origin;


/* VARIABLES */

let selectedCard = null;
let selectedCardType = null;
let currentGameId = 0;
let calledNumbers = [];
let gameStarted = false;
let cardBuying = false;
let cardBuyingEndTime = 0;
let cardData = [];
let lastCurrentNumber = null;
let soundEnabled = true;
let autoEnabled = true;


/* USER ID */

function getUserId(){

    if(
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ){

        return String(
            tg.initDataUnsafe.user.id
        );

    }

    return localStorage.getItem("user_id");

}


/* MESSAGE */

function showMessage(text,type="info"){

    const message =
        document.getElementById("message");

    message.innerHTML = text;

    message.className =
        "message " + type;

}


/* GET LETTER */

function getLetter(number){

    if(number >= 1 && number <= 15)
        return "B";

    if(number >= 16 && number <= 30)
        return "I";

    if(number >= 31 && number <= 45)
        return "N";

    if(number >= 46 && number <= 60)
        return "G";

    if(number >= 61 && number <= 75)
        return "O";

    return "";

}


/* FORMAT CALL */

function formatCall(number){

    if(number === null || number === undefined)
        return "-";

    return getLetter(number) + "-" + number;

}


/* CREATE BINGO TABLE */

function createBingoTable(){

    const table =
        document.getElementById("bingoTable");

    table.innerHTML = "";

    const letters =
        ["B","I","N","G","O"];

    letters.forEach(letter => {

        const head =
            document.createElement("div");

        head.className = "bingo-head";

        head.innerText = letter;

        table.appendChild(head);

    });

    for(let row = 0; row < 15; row++){

        for(let col = 0; col < 5; col++){

            const number =
                (col * 15) + row + 1;

            const item =
                document.createElement("div");

            item.className = "number";

            item.id =
                "number-" + number;

            item.innerText = number;

            if(calledNumbers.includes(number)){

                item.classList.add("called");

            }

            if(number === lastCurrentNumber){

                item.classList.add("current");

            }

            table.appendChild(item);

        }

    }

}


/* LOAD GAME */

async function loadGameState(){

    try{

        const response =
            await fetch(
                API_BASE + "/api/game-state"
            );

        const data =
            await response.json();

        if(!data.success){

            showMessage(
                "❌ Game state error.",
                "error"
            );

            return;

        }

        currentGameId =
            data.game_id;

        calledNumbers =
            data.called_numbers || [];

        gameStarted =
            data.started;

        cardBuying =
            data.card_buying;

        cardBuyingEndTime =
            data.card_buying_end_time || 0;

        lastCurrentNumber =
            data.current_number;

        document.getElementById("gameId")
            .innerText =
            data.game_id || "----";

        document.getElementById("calledCount")
            .innerText =
            calledNumbers.length;

        document.getElementById("stake")
            .innerText =
            data.total_sales || 0;

        updateStatus(data);

        updateCardBuyingUI();

        updateCurrentNumber(
            data.current_number
        );

        createBingoTable();

        if(selectedCard){

            document.getElementById("gameArea")
                .style.display = "block";

            renderCard();

            document.getElementById("bingoButton")
                .disabled = !gameStarted;

        }

    }

    catch(error){

        console.error(error);

        showMessage(
            "❌ Server waliin qunnamtiin hin jiru.",
            "error"
        );

    }

}


/* STATUS */

function updateStatus(data){

    const status =
        document.getElementById("status");

    const timer =
        document.getElementById("timer");

    if(data.winner){

        status.innerText =
            "🏆 WINNER FOUND";

        timer.innerText =
            "Game xumurame.";

        return;

    }

    if(data.card_buying){

        status.innerText =
            "🎫 CARD BUYING OPEN";

        const remaining =
            Math.max(
                0,
                Math.ceil(
                    data.card_buying_end_time -
                    Date.now() / 1000
                )
            );

        timer.innerText =
            "⏳ Card bitachuuf: "
            + remaining +
            " seconds";

        return;

    }

    if(data.started){

        status.innerText =
            "🎮 GAME IS RUNNING";

        timer.innerText =
            "📢 Number waamamaa jira";

        return;

    }

    status.innerText =
        "⏸ WAITING FOR NEXT GAME";

    timer.innerText =
        "Game itti aanu eegi.";

}


/* CARD BUYING */

function updateCardBuyingUI(){

    const box =
        document.getElementById(
            "cardBuyingBox"
        );

    const buy10 =
        document.getElementById(
            "buy10Button"
        );

    const buy20 =
        document.getElementById(
            "buy20Button"
        );

    const timer =
        document.getElementById(
            "buyTimer"
        );

    if(cardBuying){

        box.style.display = "block";

        const remaining =
            Math.max(
                0,
                Math.ceil(
                    cardBuyingEndTime -
                    Date.now() / 1000
                )
            );

        timer.innerText =
            "⏳ Yeroo hafe: "
            + remaining +
            " seconds";

        buy10.disabled = false;

        buy20.disabled = false;

    }

    else{

        box.style.display = "none";

        buy10.disabled = true;

        buy20.disabled = true;

    }

}


/* BUY CARD */

async function buyCard(cardType){

    const userId =
        getUserId();

    if(!userId){

        showMessage(
            "⚠️ Telegram keessatti qofa bani.",
            "error"
        );

        return;

    }

    const buy10 =
        document.getElementById(
            "buy10Button"
        );

    const buy20 =
        document.getElementById(
            "buy20Button"
        );

    buy10.disabled = true;

    buy20.disabled = true;

    showMessage(
        "⏳ Card siif bitamaa jira...",
        "warning"
    );

    try{

        const response =
            await fetch(
                API_BASE + "/api/buy-card",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        user_id:userId,

                        card_type:cardType

                    })

                }
            );

        const data =
            await response.json();

        if(!data.success){

            showMessage(
                "❌ " +
                (
                    data.message ||
                    "Card bituun hin milkoofne."
                ),
                "error"
            );

            buy10.disabled = false;

            buy20.disabled = false;

            return;

        }

        selectedCard =
            data.card_number;

        selectedCardType =
            data.card_type;

        cardData =
            data.card || [];

        localStorage.setItem(
            "selected_card",
            selectedCard
        );

        localStorage.setItem(
            "selected_card_type",
            selectedCardType
        );

        document.getElementById("gameArea")
            .style.display = "block";

        document.getElementById("cardTitle")
            .innerText =
            "🎫 CARD " +
            selectedCard +
            " — " +
            selectedCardType +
            " BIRR";

        renderCard();

        showMessage(
            "✅ Card " +
            selectedCard +
            " bitatte.",
            "success"
        );

        await loadGameState();

    }

    catch(error){

        console.error(error);

        showMessage(
            "❌ Server error.",
            "error"
        );

        buy10.disabled = false;

        buy20.disabled = false;

    }

}


/* RENDER CARD */

function renderCard(){

    const container =
        document.getElementById(
            "bingoCard"
        );

    container.innerHTML = "";

    if(!cardData.length)
        return;

    cardData.forEach(row => {

        row.forEach(value => {

            const cell =
                document.createElement("div");

            cell.className = "cell";

            cell.innerText = value;

            if(value === "FREE"){

                cell.classList.add("free");

            }

            else if(
                calledNumbers.includes(value)
            ){

                cell.classList.add("called");

            }

            container.appendChild(cell);

        });

    });

}


/* CURRENT NUMBER */

function updateCurrentNumber(number){

    const element =
        document.getElementById(
            "currentNumber"
        );

    element.innerText =
        formatCall(number);

    if(
        number !== null &&
        number !== undefined &&
        number !== lastCurrentNumber
    ){

        if(soundEnabled){

            playSound();

        }

        if(navigator.vibrate){

            navigator.vibrate(200);

        }

    }

}


/* SOUND */

function playSound(){

    try{

        const audio =
            new Audio(
                "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YQAAAAA="
            );

        audio.play().catch(() => {});

    }

    catch(error){}

}


/* TOGGLE SOUND */

function toggleSound(){

    soundEnabled =
        !soundEnabled;

    const button =
        document.getElementById(
            "soundButton"
        );

    if(soundEnabled){

        button.innerText =
            "🔊 Sound ON";

        button.classList.add("active");

    }

    else{

        button.innerText =
            "🔇 Sound OFF";

        button.classList.remove("active");

    }

}


/* TOGGLE AUTO */

function toggleAuto(){

    autoEnabled =
        !autoEnabled;

    const button =
        document.getElementById(
            "autoButton"
        );

    if(autoEnabled){

        button.innerText =
            "⚡ Auto ON";

        button.classList.add("active");

    }

    else{

        button.innerText =
            "⚡ Auto OFF";

        button.classList.remove("active");

    }

}


/* BINGO */

async function claimBingo(){

    if(!selectedCard){

        showMessage(
            "⚠️ Card hin jiru.",
            "error"
        );

        return;

    }

    const userId =
        getUserId();

    if(!userId){

        showMessage(
            "⚠️ User ID hin argamne.",
            "error"
        );

        return;

    }

    const button =
        document.getElementById(
            "bingoButton"
        );

    button.disabled = true;

    showMessage(
        "⏳ Bingo mirkaneessaa jira...",
        "warning"
    );

    try{

        const response =
            await fetch(
                API_BASE + "/api/check-bingo",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        user_id:userId,

                        card_number:selectedCard,

                        card_type:selectedCardType

                    })

                }
            );

        const data =
            await response.json();

        if(data.success){

            showMessage(
                "🏆 BINGO! ATI MO'ATTE!<br>" +
                "💰 Prize: " +
                data.prize +
                " Birr",
                "success"
            );

            if(tg.showPopup){

                tg.showPopup({

                    title:"🏆 BINGO!",

                    message:
                    "Ati mo'atte! Prize: "
                    + data.prize
                    + " Birr",

                    buttons:[
                        {type:"ok"}
                    ]

                });

            }

            return;

        }

        showMessage(
            "❌ " +
            (
                data.message ||
                "Bingo hin guunne."
            ),
            "error"
        );

        button.disabled = false;

    }

    catch(error){

        console.error(error);

        showMessage(
            "❌ Server error.",
            "error"
        );

        button.disabled = false;

    }

}


/* LEAVE */

function leaveGame(){

    document.getElementById("gameArea")
        .style.display = "none";

    showMessage(
        "🚪 Game keessaa baate.",
        "warning"
    );

}


/* LOAD SAVED CARD */

window.addEventListener(
    "load",
    () => {

        const savedCard =
            localStorage.getItem(
                "selected_card"
            );

        const savedCardType =
            localStorage.getItem(
                "selected_card_type"
            );

        if(savedCard){

            selectedCard =
                parseInt(savedCard);

            selectedCardType =
                savedCardType || "10";

            document.getElementById(
                "gameArea"
            ).style.display = "block";

            fetch(
                API_BASE +
                "/api/game-state"
            )
            .then(
                response => response.json()
            )
            .then(
                data => {

                    if(data.success){

                        cardData =
                            generateCardFromNumber(
                                selectedCard
                            );

                        renderCard();

                    }

                }
            );

        }

        createBingoTable();

        loadGameState();

    }
);


/* GENERATE SAME CARD AS PYTHON */

function generateCardFromNumber(cardNumber){

    let seed =
        parseInt(cardNumber);

    function seededRandom(min,max){

        seed =
            (
                seed * 9301 +
                49297
            ) % 233280;

        const rnd =
            seed / 233280;

        return Math.floor(
            min +
            rnd *
            (max - min + 1)
        );

    }

    function generateColumn(min,max){

        const numbers = [];

        while(numbers.length < 5){

            const number =
                seededRandom(min,max);

            if(!numbers.includes(number)){

                numbers.push(number);

            }

        }

        return numbers;

    }

    const columns = [

        generateColumn(1,15),

        generateColumn(16,30),

        generateColumn(31,45),

        generateColumn(46,60),

        generateColumn(61,75)

    ];

    const card = [];

    for(let row = 0; row < 5; row++){

        const rowData = [];

        for(let col = 0; col < 5; col++){

            if(row === 2 && col === 2){

                rowData.push("FREE");

            }

            else{

                rowData.push(
                    columns[col][row]
                );

            }

        }

        card.push(rowData);

    }

    return card;

}


/* AUTO REFRESH */

setInterval(

    loadGameState,

    1000

);
