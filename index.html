<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Gadaa Bingo</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #bba4cf;
    color: #222;
}

.top {
    background: #202b39;
    color: white;
    padding: 12px;
    text-align: center;
}

.top h1 {
    margin: 5px;
    font-size: 28px;
}

button {
    padding: 12px 16px;
    margin: 4px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#callBtn {
    background: #f5a000;
    color: white;
    display: none;
}

.main {
    display: grid;
    grid-template-columns: 270px 260px 1fr;
    gap: 10px;
    padding: 10px;
    align-items: start;
}

.called-board {
    padding: 5px;
}

.letters {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 6px;
}

.letters div {
    padding: 9px 0;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    border-radius: 7px;
}

.b { background: #f5a000; }
.i { background: green; }
.n { background: blue; }
.g { background: red; }
.o { background: purple; }

.number-board {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.number-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}

.number-row span {
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #c2c4df;
    border: 2px solid #eeeeee;
    border-radius: 10px;
    color: white;
    font-size: 17px;
    font-weight: bold;
}

.number-row span.active {
    background: green;
    border-color: white;
}

.current-area {
    text-align: center;
}

.current-title {
    background: purple;
    color: white;
    border-radius: 35px;
    padding: 20px 10px;
    font-size: 25px;
    font-weight: bold;
    margin-bottom: 20px;
}

.current-number {
    display: inline-flex;
    width: 110px;
    height: 110px;
    align-items: center;
    justify-content: center;
    background: blue;
    color: white;
    border-radius: 50%;
    font-size: 32px;
    font-weight: bold;
}

#status {
    font-size: 18px;
    font-weight: bold;
    margin: 15px;
}

.card-area {
    background: white;
    padding: 12px;
    border-radius: 12px;
    min-height: 300px;
}

.card-area h2 {
    margin-top: 0;
    text-align: center;
}

.card-number-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
}

.bingo-card {
    width: 100%;
    max-width: 520px;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}

.card-cell {
    min-height: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eeeeee;
    border: 2px solid #555;
    border-radius: 8px;
    font-size: 20px;
    font-weight: bold;
}

.card-header {
    background: #202b39;
    color: white;
}

.card-cell.marked {
    background: green;
    color: white;
}

.free {
    background: gold !important;
    color: black !important;
}

#bingoBtn {
    display: block;
    margin: 15px auto 5px auto;
    background: purple;
    color: white;
    font-size: 18px;
}

#message {
    min-height: 30px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
}

@media (max-width: 900px) {

    .main {
        grid-template-columns: 1fr;
    }

    .called-board,
    .current-area,
    .card-area {
        width: 100%;
        max-width: 600px;
        margin: auto;
    }

}

</style></head><body><div class="top"><h1>🎯 GADAA BINGO</h1>

<button
    id="callBtn"
    onclick="callNumber()">

    📢 CALL NUMBER

</button>

</div><div class="main"><!-- CALLED NUMBERS -->

<div class="called-board">

    <div class="letters">

        <div class="b">B</div>
        <div class="i">I</div>
        <div class="n">N</div>
        <div class="g">G</div>
        <div class="o">O</div>

    </div>

    <div
        id="numberBoard"
        class="number-board">

    </div>

</div>


<!-- CURRENT NUMBER -->

<div class="current-area">

    <div class="current-title">

        CURRENT CALL

    </div>

    <div
        id="currentNumber"
        class="current-number">

        -

    </div>

    <div
        id="status">

        Game loading...

    </div>

</div>


<!-- BINGO CARD -->

<div class="card-area">

    <h2>

        🎫 YOUR BINGO CARD

    </h2>

    <div
        id="cardNumberTitle"
        class="card-number-title">

        Card: Loading...

    </div>

    <div
        id="bingoCard"
        class="bingo-card">

    </div>

    <button
        id="bingoBtn"
        onclick="checkBingo()">

        🏆 BINGO

    </button>

    <div
        id="message">

    </div>

</div>

</div><script>

/* ==================================================
   TELEGRAM WEB APP
================================================== */

let tg = null;

if (
    window.Telegram &&
    window.Telegram.WebApp
) {

    tg = window.Telegram.WebApp;

    tg.ready();

    tg.expand();

}


/* ==================================================
   GAME VARIABLES
================================================== */

let calledNumbers = [];

let gameStarted = false;

let playerId = null;

let playerCardNumber = null;

let cardNumbers = [];

let pollingTimer = null;

const ADMIN_ID = "6376605934";


/* ==================================================
   GET TELEGRAM USER ID
================================================== */

function getUserId() {

    if (
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ) {

        return String(
            tg.initDataUnsafe.user.id
        );

    }

    return null;

}


/* ==================================================
   ADMIN CHECK
================================================== */

function isAdmin() {

    return playerId === ADMIN_ID;

}


/* ==================================================
   CREATE NUMBER BOARD
================================================== */

function createNumberBoard() {

    const board =
        document.getElementById(
            "numberBoard"
        );

    board.innerHTML = "";

    for (
        let start = 1;
        start <= 75;
        start += 5
    ) {

        const row =
            document.createElement(
                "div"
            );

        row.className =
            "number-row";

        for (
            let number = start;
            number < start + 5 &&
            number <= 75;
            number++
        ) {

            const span =
                document.createElement(
                    "span"
                );

            span.id =
                "number-" + number;

            span.innerText =
                number;

            row.appendChild(span);

        }

        board.appendChild(row);

    }

}


/* ==================================================
   JOIN GAME
================================================== */

async function joinGame() {

    playerId =
        getUserId();

    if (!playerId) {

        document.getElementById(
            "status"
        ).innerText =
            "Telegram keessatti banuu qabda.";

        return false;

    }

    try {

        const response =
            await fetch(
                "/api/join-game",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({

                        user_id: playerId

                    })

                }

            );

        const data =
            await response.json();

        if (
            !response.ok ||
            !data.success
        ) {

            document.getElementById(
                "status"
            ).innerText =
                data.message ||
                "Game seenuun hin danda'amne.";

            return false;

        }

        playerCardNumber =
            data.card_number;

        document.getElementById(
            "cardNumberTitle"
        ).innerText =
            "🎫 Card Number: " +
            playerCardNumber;

        generateCardFromCardNumber();

        document.getElementById(
            "status"
        ).innerText =
            "Game keessa seente.";

        return true;

    }

    catch (error) {

        console.log(
            "JOIN ERROR:",
            error
        );

        document.getElementById(
            "status"
        ).innerText =
            "Server waliin wal qunnamuun hin danda'amne.";

        return false;

    }

}


/* ==================================================
   LOAD GAME STATE
================================================== */

async function loadGameState() {

    try {

        const response =
            await fetch(
                "/api/game-state",
                {
                    cache: "no-store"
                }
            );

        const data =
            await response.json();

        calledNumbers =
            data.called_numbers || [];

        gameStarted =
            Boolean(
                data.started
            );

        updateCalledBoard();

        updateCardMarks();

        if (
            data.current_number
        ) {

            document.getElementById(
                "currentNumber"
            ).innerText =

                getLetter(
                    data.current_number
                )

                + "-" +

                data.current_number;

        }

        else {

            document.getElementById(
                "currentNumber"
            ).innerText =
                "-";

        }

        if (
            data.started
        ) {

            document.getElementById(
                "status"
            ).innerText =
                "🎮 Game banameera.";

        }

        else {

            document.getElementById(
                "status"
            ).innerText =
                "⏳ Game amma cufaa dha.";

        }

        if (
            data.winner
        ) {

            document.getElementById(
                "message"
            ).innerText =
                "🏆 Winner jira!";

        }

    }

    catch (error) {

        console.log(
            "STATE ERROR:",
            error
        );

        document.getElementById(
            "status"
        ).innerText =
            "Game state fe'uu hin dandeenye.";

    }

}


/* ==================================================
   UPDATE CALLED BOARD
================================================== */

function updateCalledBoard() {

    for (
        let number = 1;
        number <= 75;
        number++
    ) {

        const box =
            document.getElementById(
                "number-" + number
            );

        if (!box) {

            continue;

        }

        if (
            calledNumbers.includes(
                number
            )
        ) {

            box.classList.add(
                "active"
            );

        }

        else {

            box.classList.remove(
                "active"
            );

        }

    }

}


/* ==================================================
   GET BINGO LETTER
================================================== */

function getLetter(number) {

    if (
        number <= 15
    ) {

        return "B";

    }

    if (
        number <= 30
    ) {

        return "I";

    }

    if (
        number <= 45
    ) {

        return "N";

    }

    if (
        number <= 60
    ) {

        return "G";

    }

    return "O";

}


/* ==================================================
   SEEDED RANDOM
================================================== */

function seededRandom(
    seedObject,
    min,
    max
) {

    seedObject.value =

        (

            seedObject.value * 9301
            + 49297

        ) % 233280;

    const randomValue =

        seedObject.value / 233280;

    return Math.floor(

        min +

        randomValue *

        (

            max - min + 1

        )

    );

}


/* ==================================================
   GENERATE COLUMN
================================================== */

function generateSeededColumn(

    seedObject,
    min,
    max,
    count

) {

    const numbers = [];

    while (
        numbers.length < count
    ) {

        const number =
            seededRandom(
                seedObject,
                min,
                max
            );

        if (
            !numbers.includes(
                number
            )
        ) {

            numbers.push(
                number
            );

        }

    }

    return numbers;

}


/* ==================================================
   CREATE BINGO CARD
================================================== */

function generateCardFromCardNumber() {

    if (
        playerCardNumber === null
    ) {

        return;

    }

    const card =
        document.getElementById(
            "bingoCard"
        );

    card.innerHTML = "";

    cardNumbers = [];

    const headers = [

        "B",
        "I",
        "N",
        "G",
        "O"

    ];


    headers.forEach(

        letter => {

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell card-header";

            cell.innerText =
                letter;

            card.appendChild(
                cell
            );

        }

    );


    const seedObject = {

        value:
            Number(
                playerCardNumber
            )

    };


    const columns = [

        generateSeededColumn(
            seedObject,
            1,
            15,
            5
        ),

        generateSeededColumn(
            seedObject,
            16,
            30,
            5
        ),

        generateSeededColumn(
            seedObject,
            31,
            45,
            5
        ),

        generateSeededColumn(
            seedObject,
            46,
            60,
            5
        ),

        generateSeededColumn(
            seedObject,
            61,
            75,
            5
        )

    ];


    for (
        let row = 0;
        row < 5;
        row++
    ) {

        for (
            let col = 0;
            col < 5;
            col++
        ) {

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell";


            if (
                row === 2 &&
                col === 2
            ) {

                cell.innerText =
                    "FREE";

                cell.classList.add(
                    "marked"
                );

                cell.classList.add(
                    "free"
                );

                cardNumbers.push(
                    "FREE"
                );

            }

            else {

                const number =
                    columns[col][row];

                cell.innerText =
                    number;

                cardNumbers.push(
                    number
                );

            }

            card.appendChild(
                cell
            );

        }

    }

    updateCardMarks();

}


/* ==================================================
   UPDATE CARD MARKS
================================================== */

function updateCardMarks() {

    const cells =
        document.querySelectorAll(
            ".bingo-card .card-cell"
        );

    if (
        cells.length < 30
    ) {

        return;

    }

    for (
        let i = 0;
        i < cardNumbers.length;
        i++
    ) {

        const value =
            cardNumbers[i];

        const cell =
            cells[i + 5];

        if (
            value === "FREE"
        ) {

            continue;

        }

        if (
            calledNumbers.includes(
                Number(value)
            )
        ) {

            cell.classList.add(
                "marked"
            );

        }

        else {

            cell.classList.remove(
                "marked"
            );

        }

    }

}


/* ==================================================
   CALL NUMBER
================================================== */

async function callNumber() {

    if (
        !isAdmin()
    ) {

        document.getElementById(
            "message"
        ).innerText =
            "❌ Admin qofa.";

        return;

    }

    try {

        const response =
            await fetch(
                "/api/admin/call-number",
                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json"

                    },

                    body: JSON.stringify({

                        admin_id:
                            playerId

                    })

                }

            );

        const data =
            await response.json();

        if (
            !data.success
        ) {

            document.getElementById(
                "message"
            ).innerText =
                data.message ||
                "Lakkoofsa waamuu hin dandeenye.";

            return;

        }

        calledNumbers =
            data.called_numbers;

        document.getElementById(
            "currentNumber"
        ).innerText =

            getLetter(
                data.number
            )

            + "-" +

            data.number;

        updateCalledBoard();

        updateCardMarks();

        document.getElementById(
            "message"
        ).innerText =
            "📢 " +
            getLetter(
                data.number
            ) +
            "-" +
            data.number +
            " waamameera.";

    }

    catch (error) {

        console.log(
            "CALL ERROR:",
            error
        );

        document.getElementById(
            "message"
        ).innerText =
            "Server error.";

    }

}


/* ==================================================
   CHECK BINGO
================================================== */

function checkBingo() {

    if (
        !gameStarted
    ) {

        document.getElementById(
            "message"
        ).innerText =
            "⏳ Game hin jalqabne.";

        return;

    }

    if (
        cardNumbers.length !== 25
    ) {

        document.getElementById(
            "message"
        ).innerText =
            "🎫 Card hin guutamne.";

        return;

    }


    const marked = [];


    for (
        let i = 0;
        i < cardNumbers.length;
        i++
    ) {

        if (
            cardNumbers[i] === "FREE"
        ) {

            marked.push(
                true
            );

        }

        else {

            marked.push(

                calledNumbers.includes(

                    Number(
                        cardNumbers[i]
                    )

                )

            );

        }

    }


    let bingo = false;


    /* HORIZONTAL */

    for (
        let row = 0;
        row < 5;
        row++
    ) {

        let complete = true;

        for (
            let col = 0;
            col < 5;
            col++
        ) {

            if (
                !marked[
                    row * 5 + col
                ]
            ) {

                complete = false;

                break;

            }

        }

        if (
            complete
        ) {

            bingo = true;

        }

    }


    /* VERTICAL */

    for (
        let col = 0;
        col < 5;
        col++
    ) {

        let complete = true;

        for (
            let row = 0;
            row < 5;
            row++
        ) {

            if (
                !marked[
                    row * 5 + col
                ]
            ) {

                complete = false;

                break;

            }

        }

        if (
            complete
        ) {

            bingo = true;

        }

    }


    /* DIAGONAL 1 */

    let diagonalOne = true;

    for (
        let i = 0;
        i < 5;
        i++
    ) {

        if (
            !marked[
                i * 5 + i
            ]
        ) {

            diagonalOne = false;

            break;

        }

    }

    if (
        diagonalOne
    ) {

        bingo = true;

    }


    /* DIAGONAL 2 */

    let diagonalTwo = true;

    for (
        let i = 0;
        i < 5;
        i++
    ) {

        if (
            !marked[
                i * 5 + (4 - i)
            ]
        ) {

            diagonalTwo = false;

            break;

        }

    }

    if (
        diagonalTwo
    ) {

        bingo = true;

    }


    if (
        bingo
    ) {

        document.getElementById(
            "message"
        ).innerText =
            "🏆 BINGO!";

        if (
            tg
        ) {

            tg.showAlert(
                "🏆 BINGO!"
            );

        }

    }

    else {

        document.getElementById(
            "message"
        ).innerText =
            "❌ Bingo pattern hin guunne.";

    }

}


/* ==================================================
   START GAME
================================================== */

async function startGame() {

    document.getElementById(
        "status"
    ).innerText =
        "🎫 Card loading...";

    createNumberBoard();

    playerId =
        getUserId();


    if (
        isAdmin()
    ) {

        document.getElementById(
            "callBtn"
        ).style.display =
            "inline-block";

    }


    const joined =
        await joinGame();


    if (
        !joined
    ) {

        return;

    }


    await loadGameState();


    if (
        pollingTimer
    ) {

        clearInterval(
            pollingTimer
        );

    }


    pollingTimer =

        setInterval(

            loadGameState,

            2000

        );

}


/* ==================================================
   PAGE LOAD
================================================== */

window.addEventListener(

    "load",

    startGame

);

</script></body>
