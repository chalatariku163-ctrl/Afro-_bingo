<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GADAA BINGO</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#101827;

    color:white;

    padding:12px;

}

.container{

    max-width:1100px;

    margin:auto;

}

h1{

    text-align:center;

    color:#00e5ff;

    margin:8px 0 15px;

}


/* ================================= */
/* GAME INFORMATION */
/* ================================= */

.game-info{

    display:grid;

    grid-template-columns:
        repeat(5,1fr);

    gap:6px;

    background:#1b2638;

    border-radius:12px;

    padding:8px;

    margin-bottom:12px;

    text-align:center;

}

.game-info-item{

    background:#27364d;

    border-radius:8px;

    padding:8px 4px;

    min-width:0;

}

.game-info-label{

    display:block;

    color:#9aa8bb;

    font-size:10px;

    margin-bottom:4px;

}

.game-info-value{

    display:block;

    color:#00e5ff;

    font-size:13px;

    font-weight:bold;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

}


.status-box{

    background:#1b2638;

    border-radius:12px;

    padding:15px;

    margin-bottom:12px;

    text-align:center;

}

#gameStatus{

    font-size:18px;

    font-weight:bold;

    margin-bottom:8px;

}

#timer{

    color:#ffd54a;

    font-size:16px;

}

.current-number{

    background:#0b1220;

    border:2px solid #00e5ff;

    border-radius:15px;

    padding:15px;

    text-align:center;

    margin-bottom:12px;

}

.current-number h3{

    margin:0 0 8px;

    color:#aaa;

}

#currentNumber{

    font-size:42px;

    font-weight:bold;

    color:#00e5ff;

}

.buttons{

    display:flex;

    gap:10px;

    margin-bottom:12px;

}

button{

    border:none;

    border-radius:10px;

    padding:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}

button:disabled{

    opacity:.5;

    cursor:not-allowed;

}

#buy10Btn{

    flex:1;

    background:#16c784;

    color:white;

}

#buy20Btn{

    flex:1;

    background:#ff9800;

    color:white;

}

.message{

    min-height:20px;

    margin:8px 0;

    padding:8px;

    border-radius:8px;

    text-align:center;

}

.message.success{

    background:#123d29;

    color:#4cff9b;

}

.message.error{

    background:#481b1b;

    color:#ff7777;

}


/* ================================= */
/* CARD ID TABLE */
/* ================================= */

#cardIdPanel{

    background:#1b2638;

    border-radius:12px;

    padding:12px;

    margin-bottom:15px;

}

#cardIdPanel h3{

    text-align:center;

    margin-top:0;

}

#cardIdGrid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(45px,1fr));

    gap:6px;

    max-height:350px;

    overflow-y:auto;

}

.card-id{

    background:#27364d;

    padding:10px 3px;

    text-align:center;

    border-radius:7px;

    cursor:pointer;

    font-weight:bold;

}

.card-id:hover{

    background:#405775;

}

.card-id.selected{

    background:#00a8ff;

    color:white;

}

.card-id.my-card{

    background:#e53935;

    color:white;

    border:2px solid #ffb3b3;

}


/* ================================= */
/* LEFT CALLED / RIGHT CARD */
/* ================================= */

.game-layout{

    display:grid;

    grid-template-columns:
        minmax(0,1fr)
        minmax(0,1fr);

    gap:15px;

    align-items:start;

}

.left-side{

    min-width:0;

}

.right-side{

    min-width:0;

}


/* ================================= */
/* CALLED NUMBERS */
/* ================================= */

.called-box{

    background:#1b2638;

    border-radius:12px;

    padding:12px;

    margin-bottom:15px;

}

.called-box h3{

    text-align:center;

    margin-top:0;

}

#calledNumbers{

    display:grid;

    grid-template-columns:
        repeat(5,1fr);

    gap:5px;

}

.called-number{

    background:#27364d;

    padding:8px 2px;

    text-align:center;

    border-radius:6px;

    font-size:12px;

    min-height:30px;

    display:flex;

    align-items:center;

    justify-content:center;

}

.called-number.header{

    background:#00a8ff;

    font-weight:bold;

    font-size:15px;

}

.called-number.active{

    background:#16c784;

    color:white;

    font-weight:bold;

    box-shadow:
        0 0 8px #16c784;

}


/* ================================= */
/* USER CARD */
/* ================================= */

#myCardBox{

    display:none;

}

.user-card-panel{

    background:#1b2638;

    border-radius:15px;

    padding:12px;

    margin-bottom:15px;

    box-shadow:
        0 4px 15px #0005;

}

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:10px;

    padding:10px;

    background:#0b1220;

    border-radius:10px;

}

.card-number{

    color:#00e5ff;

    font-size:18px;

    font-weight:bold;

}

.card-type{

    color:#ffd54a;

    font-weight:bold;

}

.bingo-card{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;

}

.bingo-card th{

    background:#00a8ff;

    padding:10px;

    font-size:18px;

}

.bingo-card td{

    background:#27364d;

    border:2px solid #101827;

    text-align:center;

    height:52px;

    font-size:17px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

}

.bingo-card td.marked{

    background:#16c784;

    color:white;

    font-weight:bold;

    box-shadow:
        0 0 8px #16c784;

}

.bingo-card td.free{

    background:#9c27b0;

    color:white;

}

.btn-bingo{

    width:100%;

    margin-top:10px;

    background:#e91e63;

    color:white;

}

#bingoMessage{

    margin-top:10px;

}


/* ================================= */
/* MOBILE */
/* ================================= */

@media(max-width:700px){

    .game-layout{

        grid-template-columns:
            minmax(0,1fr)
            minmax(0,1fr);

        gap:8px;

    }

    .called-box{

        padding:6px;

    }

    .called-box h3{

        font-size:12px;

    }

    .called-number{

        font-size:10px;

        min-height:27px;

        padding:5px 1px;

    }

    .called-number.header{

        font-size:12px;

    }

    .user-card-panel{

        padding:6px;

    }

    .card-header{

        display:block;

        text-align:center;

        padding:7px;

    }

    .card-number{

        font-size:13px;

    }

    .card-type{

        font-size:11px;

        margin-top:5px;

    }

    .bingo-card th{

        padding:5px;

        font-size:13px;

    }

    .bingo-card td{

        height:38px;

        font-size:11px;

    }

    .btn-bingo{

        font-size:11px;

        padding:8px 3px;

    }

}

@media(max-width:600px){

    body{

        padding:8px;

    }

    .current-number{

        padding:10px;

    }

    #currentNumber{

        font-size:35px;

    }

    .game-info{

        gap:3px;

        padding:5px;

    }

    .game-info-item{

        padding:6px 2px;

    }

    .game-info-label{

        font-size:8px;

    }

    .game-info-value{

        font-size:10px;

    }

}

</style></head><body><div class="container"><h1>🎱 GADAA BINGO</h1><!-- ================================= --><!-- GAME INFORMATION --><!-- ================================= --><div class="game-info"><div class="game-info-item">

    <span class="game-info-label">
        GAME ID
    </span>

    <span

</div>

</div>


<div class="game-info-item">

    </span>

</div>

</div><div class="status-box"><div id="gameStatus">

</div><div class="current-number"><h3>🎱 CURRENT NUMBER</h3>

</div><div class="buttons"><button id="buy10Btn"
        onclick="buyCard(10)">

</button>


<button id="buy20Btn"
        onclick="buyCard(20)">

    🎫 BUY 20 BIRR

</button>

</div><div id="buyMessage"
     class="message"></div><!-- CARD ID TABLE --><div id="cardIdPanel"><h3>🎫 SELECT CARD ID 1 - 500</h3>

<div id="cardIdGrid">

</div>

</div><!-- CALLED NUMBERS LEFT / USER CARD RIGHT --><div class="game-layout"><!-- LEFT -->

<div class="left-side">

    <div class="called-box">

        <h3>📢 CALLED NUMBERS</h3>

        <div id="calledNumbers">

        </div>

    </div>

</div>


<!-- RIGHT -->

<div class="right-side">

    <div id="bingoMessage"
         class="message">

    </div>


    <div id="myCardBox">

    </div>

</div>

</div></div><script>


// =====================================================
// TELEGRAM
// =====================================================

const tg =
    window.Telegram.WebApp;


tg.ready();


tg.expand();


// =====================================================
// USER ID
// =====================================================

let userId =
    null;


if(

    tg.initDataUnsafe &&

    tg.initDataUnsafe.user

){

    userId =
        tg.initDataUnsafe.user.id;

}


// =====================================================
// GAME VARIABLES
// =====================================================

let currentGameId =
    null;


let gameState =
    null;


let myCards =
    [];


let selectedCardNumber =
    null;


let winnerCardTimeout =
    null;


// =====================================================
// ELEMENTS
// =====================================================

const gameStatus =
    document.getElementById(
        "gameStatus"
    );


const timer =
    document.getElementById(
        "timer"
    );


const currentNumber =
    document.getElementById(
        "currentNumber"
    );


const calledNumbers =
    document.getElementById(
        "calledNumbers"
    );


const buy10Btn =
    document.getElementById(
        "buy10Btn"
    );


const buy20Btn =
    document.getElementById(
        "buy20Btn"
    );


const cardIdGrid =
    document.getElementById(
        "cardIdGrid"
    );


const cardIdPanel =
    document.getElementById(
        "cardIdPanel"
    );


const buyMessage =
    document.getElementById(
        "buyMessage"
    );


const bingoMessage =
    document.getElementById(
        "bingoMessage"
    );


const myCardBox =
    document.getElementById(
        "myCardBox"
    );


// =====================================================
// GAME INFO ELEMENTS
// =====================================================

const gameIdValue =
    document.getElementById(
        "gameIdValue"
    );


const derashValue =
    document.getElementById(
        "derashValue"
    );


const playerValue =
    document.getElementById(
        "playerValue"
    );


const stakeValue =
    document.getElementById(
        "stakeValue"
    );


const calledValue =
    document.getElementById(
        "calledValue"
    );


// =====================================================
// MESSAGE
// =====================================================

function showMessage(

    element,

    text,

    type

){

    if(!element){

        return;

    }


    element.innerText =
        text;


    element.className =
        "message " + type;


    setTimeout(

        function(){

            element.innerText =
                "";


            element.className =
                "message";

        },

        5000

    );

}


// =====================================================
// LOAD GAME STATE
// =====================================================

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state"
            );


        const data =
            await response.json();


        if(!data.success){

            gameStatus.innerText =
                "⚠️ GAME STATE ERROR";


            return;

        }


        updateGameUI(data);

    }

    catch(error){

        console.error(error);


        gameStatus.innerText =
            "❌ SERVER CONNECTION ERROR";

    }

}


// =====================================================
// UPDATE GAME UI
// =====================================================

function updateGameUI(data){

    const now =
        Date.now() / 1000;


    // =================================================
    // NEW GAME
    // =================================================

    if(

        currentGameId !== null &&

        currentGameId !== data.game_id

    ){

        selectedCardNumber =
            null;


        if(winnerCardTimeout){

            clearTimeout(
                winnerCardTimeout
            );


            winnerCardTimeout =
                null;

        }

    }


    currentGameId =
        data.game_id;


    gameState =
        data;


    // =================================================
    // GAME INFORMATION
    // =================================================

    gameIdValue.innerText =
        data.game_id || "--";


    const calledCount =
        Array.isArray(
            data.called_numbers
        )

        ?

        data.called_numbers.length

        :

        0;


    calledValue.innerText =
        calledCount;


    let playerCount =
        0;


    let stake =
        0;


    if(

        Array.isArray(
            data.players
        )

    ){

        playerCount =
            data.players.length;

    }


    if(

        data.player_count !== undefined

    ){

        playerCount =
            data.player_count;

    }


    if(

        data.players_count !== undefined

    ){

        playerCount =
            data.players_count;

    }


    if(

        data.stake !== undefined

    ){

        stake =
            data.stake;

    }


    if(

        data.total_stake !== undefined

    ){

        stake =
            data.total_stake;

    }


    playerValue.innerText =
        playerCount;


    stakeValue.innerText =
        stake + " Birr";


    if(

        data.derash !== undefined

    ){

        derashValue.innerText =
            data.derash;

    }

    else if(

        data.draw !== undefined

    ){

        derashValue.innerText =
            data.draw;

    }

    else{

        derashValue.innerText =
            "BINGO";

    }


    // =================================================
    // CARD BUYING
    // =================================================

    if(data.card_buying){

        gameStatus.innerText =
            "🟢 CARD BUYING IS OPEN";


        buy10Btn.disabled =
            false;


        buy20Btn.disabled =
            false;


        const remaining =
            Math.max(

                0,

                Math.ceil(

                    data.card_buying_end_time
                    - now

                )

            );


        timer.innerText =
            "⏱️ CARD BUYING: "
            + remaining
            + " SEC";


        cardIdPanel.style.display =
            "block";


        renderCardIds();


        if(

            myCards.length > 0

        ){

            myCardBox.style.display =
                "block";

        }

    }


    // =================================================
    // GAME RUNNING
    // =================================================

    else if(data.started){

        gameStatus.innerText =
            "🎮 GAME IS RUNNING";


        buy10Btn.disabled =
            true;


        buy20Btn.disabled =
            true;


        timer.innerText =
            "🎱 NUMBERS ARE BEING CALLED";


        cardIdPanel.style.display =
            "none";


        if(

            myCards.length > 0

        ){

            myCardBox.style.display =
                "block";

        }

    }


    // =================================================
    // WINNER
    // =================================================

    else if(data.winner){

        gameStatus.innerText =
            "🏆 GAME FINISHED";


        timer.innerText =
            "🏆 WINNER FOUND";


        buy10Btn.disabled =
            true;


        buy20Btn.disabled =
            true;


        cardIdPanel.style.display =
            "none";


        if(

            myCards.length > 0

        ){

            myCardBox.style.display =
                "block";

        }


        if(

            !winnerCardTimeout

        ){

            winnerCardTimeout =

                setTimeout(

                    function(){

                        myCardBox.style.display =
                            "none";


                        winnerCardTimeout =
                            null;

                    },

                    40000

                );

        }

    }


    // =================================================
    // WAITING
    // =================================================

    else{

        gameStatus.innerText =
            "⏳ WAITING FOR GAME";


        buy10Btn.disabled =
            true;


        buy20Btn.disabled =
            true;


        cardIdPanel.style.display =
            "none";


        if(

            myCards.length > 0

        ){

            myCardBox.style.display =
                "block";

        }

    }


    // =================================================
    // CURRENT NUMBER
    // =================================================

    if(

        data.current_number !== null &&

        data.current_number !== undefined

    ){

        currentNumber.innerText =
            formatCall(
                data.current_number
            );

    }

    else{

        currentNumber.innerText =
            "--";

    }


    // =================================================
    // CALLED NUMBERS
    // =================================================

    renderCalledNumbers(

        data.called_numbers || []

    );


    // =================================================
    // AUTO MARK USER CARDS
    // =================================================

    myCards.forEach(

        function(card){

            autoMarkCalledNumbers(
                card
            );

        }

    );


    // =================================================
    // RENDER USER CARDS
    // =================================================

    renderMyCards();

}


// =====================================================
// CARD ID TABLE 1 - 500
// =====================================================

function renderCardIds(){

    cardIdGrid.innerHTML =
        "";


    for(

        let i = 1;

        i <= 500;

        i++

    ){

        const div =
            document.createElement(
                "div"
            );


        div.className =
            "card-id";


        div.innerText =
            i;


        div.id =
            "card-id-" + i;


        const alreadyBought =
            myCards.some(

                function(card){

                    return Number(

                        card.card_number

                    ) === i;

                }

            );


        if(alreadyBought){

            div.classList.add(
                "my-card"
            );

        }


        if(

            selectedCardNumber === i

        ){

            div.classList.add(
                "selected"
            );

        }


        div.onclick =
            function(){

                if(

                    !gameState ||

                    !gameState.card_buying

                ){

                    return;

                }


                if(alreadyBought){

                    showMessage(

                        buyMessage,

                        "⚠️ CARD #"
                        + i
                        + " DURSEE BITAMEERA.",

                        "error"

                    );


                    return;

                }


                document

                    .querySelectorAll(
                        ".card-id"
                    )

                    .forEach(

                        function(item){

                            item.classList

                                .remove(
                                    "selected"
                                );

                        }

                    );


                div.classList.add(
                    "selected"
                );


                selectedCardNumber =
                    i;


                showMessage(

                    buyMessage,

                    "🎫 CARD #"
                    + i
                    + " FILATAMEERA.",

                    "success"

                );

            };


        cardIdGrid.appendChild(
            div
        );

    }

}


// =====================================================
// FORMAT CALL NUMBER
// =====================================================

function formatCall(number){

    if(

        number >= 1 &&

        number <= 15

    ){

        return "B-" + number;

    }


    if(

        number >= 16 &&

        number <= 30

    ){

        return "I-" + number;

    }


    if(

        number >= 31 &&

        number <= 45

    ){

        return "N-" + number;

    }


    if(

        number >= 46 &&

        number <= 60

    ){

        return "G-" + number;

    }


    if(

        number >= 61 &&

        number <= 75

    ){

        return "O-" + number;

    }


    return number;

}


// =====================================================
// CALLED NUMBERS TABLE
// =====================================================

function renderCalledNumbers(numbers){

    calledNumbers.innerHTML =
        "";


    const calledSet =
        new Set(

            numbers.map(
                Number
            )

        );


    const columns = [

        {
            letter:"B",
            start:1
        },

        {
            letter:"I",
            start:16
        },

        {
            letter:"N",
            start:31
        },

        {
            letter:"G",
            start:46
        },

        {
            letter:"O",
            start:61
        }

    ];


    columns.forEach(

        function(column){

            const header =
                document.createElement(
                    "div"
                );


            header.className =
                "called-number header";


            header.innerText =
                column.letter;


            calledNumbers.appendChild(
                header
            );

        }

    );


    for(

        let row = 0;

        row < 15;

        row++

    ){

        columns.forEach(

            function(column){

                const number =
                    column.start + row;


                const div =
                    document.createElement(
                        "div"
                    );


                div.className =
                    "called-number";


                div.innerText =
                    number;


                if(

                    calledSet.has(
                        number
                    )

                ){

                    div.classList.add(
                        "active"
                    );

                }


                calledNumbers.appendChild(
                    div
                );

            }

        );

    }

}


// =====================================================
// AUTO MARK CALLED NUMBERS
// =====================================================

function autoMarkCalledNumbers(userCard){

    if(

        !userCard ||

        !Array.isArray(
            userCard.card
        )

    ){

        return;

    }


    if(

        !Array.isArray(
            userCard.markedCells
        )

    ){

        userCard.markedCells =
            [];

    }


    if(

        !userCard.markedCells.includes(
            "2-2"
        )

    ){

        userCard.markedCells.push(
            "2-2"
        );

    }


    if(

        !gameState ||

        !Array.isArray(
            gameState.called_numbers
        )

    ){

        return;

    }


    const calledSet =
        new Set(

            gameState.called_numbers.map(
                Number
            )

        );


    for(

        let row = 0;

        row < 5;

        row++

    ){

        for(

            let col = 0;

            col < 5;

            col++

        ){

            const value =
                userCard.card[row][col];


            if(

                value === "FREE"

            ){

                continue;

            }


            if(

                calledSet.has(
                    Number(value)
                )

            ){

                const key =
                    row + "-" + col;


                if(

                    !userCard.markedCells.includes(
                        key
                    )

                ){

                    userCard.markedCells.push(
                        key
                    );

                }

            }

        }

    }

}


// =====================================================
// BUY CARD
// =====================================================

async function buyCard(type){

    if(!userId){

        showMessage(

            buyMessage,

            "⚠️ TELEGRAM USER ID HIN ARGAMNE.",

            "error"

        );


        return;

    }


    if(!selectedCardNumber){

        showMessage(

            buyMessage,

            "⚠️ DURA CARD ID 1 HANGA 500 FILADHU.",

            "error"

        );


        return;

    }


    if(

        !gameState ||

        !gameState.card_buying

    ){

        showMessage(

            buyMessage,

            "⚠️ YEROON CARD BITACHUU XUMURAMEERA.",

            "error"

        );


        return;

    }


    buy10Btn.disabled =
        true;


    buy20Btn.disabled =
        true;


    try{

        const response =
            await fetch(

                "/api/buy-card",

                {

                    method:
                        "POST",


                    headers:{

                        "Content-Type":
                            "application/json"

                    },


                    body:

                        JSON.stringify({

                            user_id:
                                userId,


                            card_type:
                                type,


                            card_number:
                                selectedCardNumber

                        })

                }

            );


        const data =
            await response.json();


        if(!data.success){

            showMessage(

                buyMessage,

                data.message ||

                "❌ CARD BITACHUU HIN DANDEEMNE.",

                "error"

            );


            return;

        }


        const newCard = {

            game_id:
                data.game_id,


            card_number:
                data.card_number,


            card_type:
                data.card_type,


            card:
                data.card,


            markedCells:

                [

                    "2-2"

                ]

        };


        const exists =
            myCards.some(

                function(card){

                    return (

                        Number(
                            card.card_number
                        )

                        ===

                        Number(
                            newCard.card_number
                        )

                    );

                }

            );


        if(!exists){

            myCards.push(
                newCard
            );

        }


        renderCardIds();


        myCardBox.style.display =
            "block";


        renderMyCards();


        showMessage(

            buyMessage,

            "✅ CARD #"
            + data.card_number
            + " MILKAA'INAAN BITAME!",

            "success"

        );


        selectedCardNumber =
            null;


        document

            .querySelectorAll(
                ".card-id"
            )

            .forEach(

                function(item){

                    item.classList

                        .remove(
                            "selected"
                        );

                }

            );

    }


    catch(error){

        console.error(error);


        showMessage(

            buyMessage,

            "❌ SERVER ERROR.",

            "error"

        );

    }


    finally{

        if(

            gameState &&

            gameState.card_buying

        ){

            buy10Btn.disabled =
                false;


            buy20Btn.disabled =
                false;

        }

    }

}


// =====================================================
// RENDER USER CARDS
// =====================================================

function renderMyCards(){

    if(!myCardBox){

        return;

    }


    if(

        myCards.length === 0

    ){

        myCardBox.style.display =
            "none";


        return;

    }


    myCardBox.style.display =
        "block";


    myCardBox.innerHTML =
        "";


    myCards.forEach(

        function(userCard,index){

            if(

                !userCard.card ||

                !Array.isArray(
                    userCard.card
                )

            ){

                return;

            }


            autoMarkCalledNumbers(
                userCard
            );


            const cardPanel =
                document.createElement(
                    "div"
                );


            cardPanel.className =
                "user-card-panel";


            if(

                !Array.isArray(
                    userCard.markedCells
                )

            ){

                userCard.markedCells =
                    [

                        "2-2"

                    ];

            }


            cardPanel.innerHTML = `

                <div class="card-header">

                    <div class="card-number">

                        🎫 CARD #

                        ${userCard.card_number}

                    </div>


                    <div class="card-type">

                        ${userCard.card_type}

                        BIRR

                    </div>

                </div>


                <table class="bingo-card">

                    <thead>

                        <tr>

                            <th>B</th>

                            <th>I</th>

                            <th>N</th>

                            <th>G</th>

                            <th>O</th>

                        </tr>

                    </thead>


                    <tbody>

                    </tbody>

                </table>


                <button

                    class="btn-bingo"

                >

                    🏆 BINGO CARD #

                    ${userCard.card_number}

                </button>


                <div

                    class="message bingo-card-message"

                ></div>

            `;


            const table =
                cardPanel.querySelector(
                    "tbody"
                );


            for(

                let row = 0;

                row < 5;

                row++

            ){

                const tr =
                    document.createElement(
                        "tr"
                    );


                for(

                    let col = 0;

                    col < 5;

                    col++

                ){

                    const td =
                        document.createElement(
                            "td"
                        );


                    const value =
                        userCard.card[row][col];


                    td.innerText =
                        value;


                    const key =
                        row + "-" + col;


                    if(

                        value === "FREE"

                    ){

                        td.classList.add(
                            "free"
                        );


                        td.classList.add(
                            "marked"
                        );

                    }


                    else if(

                        gameState &&

                        Array.isArray(
                            gameState.called_numbers
                        ) &&

                        gameState.called_numbers

                            .map(Number)

                            .includes(
                                Number(value)
                            )

                    ){

                        td.classList.add(
                            "marked"
                        );

                    }


                    if(

                        userCard.markedCells.includes(
                            key
                        )

                    ){

                        td.classList.add(
                            "marked"
                        );

                    }


                    td.onclick =
                        function(){

                            toggleCardCell(

                                userCard,

                                td,

                                value,

                                row,

                                col

                            );

                        };


                    tr.appendChild(
                        td
                    );

                }


                table.appendChild(
                    tr
                );

            }


            const bingoButton =
                cardPanel.querySelector(
                    ".btn-bingo"
                );


            bingoButton.onclick =
                function(){

                    claimBingo(

                        userCard,

                        cardPanel

                    );

                };


            myCardBox.appendChild(
                cardPanel
            );

        }

    );

}


// =====================================================
// MARK CARD CELL
// =====================================================

function toggleCardCell(

    userCard,

    cell,

    value,

    row,

    col

){

    if(

        value === "FREE"

    ){

        return;

    }


    if(

        !gameState ||

        !Array.isArray(
            gameState.called_numbers
        )

    ){

        return;

    }


    const number =
        Number(value);


    if(

        !gameState.called_numbers

            .map(Number)

            .includes(
                number
            )

    ){

        showMessage(

            bingoMessage,

            "⚠️ LAKKOOFSI KUN HIN WAAMAMNE.",

            "error"

        );


        return;

    }


    const key =
        row + "-" + col;


    cell.classList.toggle(
        "marked"
    );


    if(

        cell.classList.contains(
            "marked"
        )

    ){

        if(

            !userCard.markedCells.includes(
                key
            )

        ){

            userCard.markedCells.push(
                key
            );

        }

    }

    else{

        userCard.markedCells =

            userCard.markedCells.filter(

                function(item){

                    return item !== key;

                }

            );

    }

}


// =====================================================
// CHECK BINGO PATTERNS
// =====================================================

function checkLocalBingo(userCard){

    if(

        !userCard ||

        !Array.isArray(
            userCard.card
        )

    ){

        return false;

    }


    const marked =
        userCard.markedCells || [];


    function isMarked(row,col){

        return marked.includes(

            row + "-" + col

        );

    }


    // HORIZONTAL

    for(

        let row = 0;

        row < 5;

        row++

    ){

        let complete =
            true;


        for(

            let col = 0;

            col < 5;

            col++

        ){

            if(

                !isMarked(
                    row,
                    col
                )

            ){

                complete =
                    false;


                break;

            }

        }


        if(complete){

            return true;

        }

    }


    // VERTICAL

    for(

        let col = 0;

        col < 5;

        col++

    ){

        let complete =
            true;


        for(

            let row = 0;

            row < 5;

            row++

        ){

            if(

                !isMarked(
                    row,
                    col
                )

            ){

                complete =
                    false;


                break;

            }

        }


        if(complete){

            return true;

        }

    }


    // DIAGONAL 1

    let diagonal1 =
        true;


    for(

        let i = 0;

        i < 5;

        i++

    ){

        if(

            !isMarked(
                i,
                i
            )

        ){

            diagonal1 =
                false;


            break;

        }

    }


    if(diagonal1){

        return true;

    }


    // DIAGONAL 2

    let diagonal2 =
        true;


    for(

        let i = 0;

        i < 5;

        i++

    ){

        if(

            !isMarked(

                i,

                4 - i

            )

        ){

            diagonal2 =
                false;


            break;

        }

    }


    if(diagonal2){

        return true;

    }


    // FOUR CORNERS

    if(

        isMarked(0,0) &&

        isMarked(0,4) &&

        isMarked(4,0) &&

        isMarked(4,4)

    ){

        return true;

    }


    return false;

}


// =====================================================
// CLAIM BINGO
// =====================================================

async function claimBingo(

    userCard,

    cardPanel

){

    if(!userId){

        showMessage(

            bingoMessage,

            "⚠️ USER ID HIN ARGAMNE.",

            "error"

        );


        return;

    }


    autoMarkCalledNumbers(
        userCard
    );


    if(

        !checkLocalBingo(
            userCard
        )

    ){

        showMessage(

            cardPanel.querySelector(
                ".bingo-card-message"
            ),

            "⚠️ BINGO HIN GUUTAMNE. Toora, diagonal ykn goleewwan afran guutuu qaba.",

            "error"

        );


        return;

    }


    const button =
        cardPanel.querySelector(
            ".btn-bingo"
        );


    button.disabled =
        true;


    try{

        const response =
            await fetch(

                "/api/check-bingo",

                {

                    method:
                        "POST",


                    headers:{

                        "Content-Type":
                            "application/json"

                    },


                    body:

                        JSON.stringify({

                            user_id:
                                userId,


                            card_number:
                                userCard.card_number,


                            card_type:
                                userCard.card_type

                        })

                }

            );


        const data =
            await response.json();


        const message =
            cardPanel.querySelector(

                ".bingo-card-message"

            );


        if(data.success){

            showMessage(

                message,

                "🏆 BINGO! ATI MO'ATTEE!"

                + " PRIZE: "

                + data.prize

                + " BIRR",

                "success"

            );

        }

        else{

            showMessage(

                message,

                data.message ||

                "BINGO HIN MIRKANOOfNE.",

                "error"

            );

        }

    }

    catch(error){

        console.error(error);


        showMessage(

            bingoMessage,

            "❌ SERVER ERROR.",

            "error"

        );

    }

    finally{

        button.disabled =
            false;

    }

}
