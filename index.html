<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gadaa Bingo</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#e9e9e9;
    color:#222;
}

.top-bar{
    background:#202b39;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.info-box{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.info{
    background:#364657;
    padding:7px 10px;
    border-radius:6px;
    font-size:12px;
    text-align:center;
}

.info b{
    display:block;
    color:#ffd000;
    font-size:15px;
}

.main{
    display:grid;
    grid-template-columns:260px 1fr 420px;
    gap:10px;
    padding:10px;
}

.panel{
    background:white;
    border-radius:8px;
    padding:10px;
}

.bingo-title{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:4px;
    margin-bottom:6px;
}

.bingo-title div{
    color:white;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    padding:8px 0;
    border-radius:5px;
}

.b{background:#e99b00}
.i{background:#159447}
.n{background:#3264d9}
.g{background:#e03333}
.o{background:#9a39a8}

.number-board{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:4px;
}

.number{
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#eee;
    border-radius:5px;
    font-weight:bold;
}

.number.called{
    background:#28a745;
    color:white;
}

.center-panel{
    text-align:center;
}

.current-title{
    background:#6334a5;
    color:white;
    padding:12px;
    border-radius:8px;
    font-size:20px;
    font-weight:bold;
}

.current-call{
    margin:20px auto;
    width:160px;
    height:160px;
    border-radius:50%;
    background:#3468d4;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:bold;
}

.status{
    font-size:17px;
    font-weight:bold;
    margin:15px;
}

#callBtn{
    display:none;
    background:#f0a000;
    color:white;
    border:none;
    border-radius:8px;
    padding:13px 20px;
    font-size:16px;
    font-weight:bold;
}

#message{
    min-height:40px;
    margin-top:15px;
    font-weight:bold;
}

.card-title{
    text-align:center;
    font-size:21px;
    font-weight:bold;
    margin-bottom:10px;
}

.card-number{
    text-align:center;
    font-weight:bold;
    margin-bottom:8px;
}

.bingo-card{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:5px;
}

.card-cell{
    min-height:65px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#eee;
    border:2px solid #555;
    border-radius:7px;
    font-size:20px;
    font-weight:bold;
}

.card-header{
    background:#202b39;
    color:white;
}

.card-cell.marked{
    background:#27a844;
    color:white;
}

.card-cell.free{
    background:#f5c400;
    color:black;
}

.no-card{
    text-align:center;
    padding:35px 15px;
    border:2px dashed #999;
    border-radius:10px;
    font-weight:bold;
}

.no-card h2{
    margin-top:0;
}

.buy-button{
    margin-top:18px;
    background:#6334a5;
    color:white;
    border:none;
    border-radius:8px;
    padding:13px 20px;
    font-size:16px;
    font-weight:bold;
}

#bingoBtn{
    display:none;
    margin:15px auto 5px;
    background:#6334a5;
    color:white;
    border:none;
    border-radius:8px;
    padding:13px 28px;
    font-size:18px;
    font-weight:bold;
}

@media(max-width:1000px){
    .main{
        grid-template-columns:1fr;
    }

    .current-call{
        width:130px;
        height:130px;
        font-size:34px;
    }
}
</style>
</head>

<body>

<div class="top-bar">

    <div class="logo">
        🎯 GADAA BINGO
    </div>

    <div class="info-box">

        <div class="info">
            GAME ID
            <b id="gameId">---</b>
        </div>

        <div class="info">
            PLAYERS
            <b id="players">0</b>
        </div>

        <div class="info">
            STAKE
            <b id="stake">10</b>
        </div>

        <div class="info">
            CALLED
            <b id="calledCount">0</b>
        </div>

    </div>

</div>

<div class="main">

    <!-- LEFT NUMBER BOARD -->

    <div class="panel">

        <div class="bingo-title">
            <div class="b">B</div>
            <div class="i">I</div>
            <div class="n">N</div>
            <div class="g">G</div>
            <div class="o">O</div>
        </div>

        <div
            id="numberBoard"
            class="number-board">
        </div>

    </div>

    <!-- CENTER -->

    <div class="panel center-panel">

        <div class="current-title">
            CURRENT CALL
        </div>

        <div
            id="currentCall"
            class="current-call">
            -
        </div>

        <div
            id="status"
            class="status">
            Game loading...
        </div>

        <button
            id="callBtn"
            onclick="callNumber()">

            📢 CALL NUMBER

        </button>

        <div id="message"></div>

    </div>

    <!-- RIGHT CARD -->

    <div class="panel">

        <div class="card-title">
            🎫 YOUR BINGO CARD
        </div>

        <!-- CARD EXISTS -->

        <div
            id="cardArea">

            <div
                id="cardNumber"
                class="card-number">

                Card: Loading...

            </div>

            <div
                id="bingoCard"
                class="bingo-card">

            </div>

            <button
                id="bingoBtn"
                onclick="checkBingo()">

                🏆 BINGO!

            </button>

        </div>

        <!-- NO CARD -->

        <div
            id="noCardArea"
            class="no-card"
            style="display:none">

            <h2>
                🎫 CARD NOT PURCHASED
            </h2>

            <p>
                You can watch the current Bingo game.
            </p>

            <p>
                Buy a card for the next game.
            </p>

            <button
                class="buy-button"
                onclick="buyCard()">

                🛒 BUY CARD FOR NEXT GAME

            </button>

        </div>

    </div>

</div>

<script>

let tg = null;

if(
    window.Telegram &&
    window.Telegram.WebApp
){

    tg = window.Telegram.WebApp;

    tg.ready();

    tg.expand();

}

const ADMIN_ID = "6376605934";

let playerId = null;

let playerCardNumber = null;

let cardNumbers = [];

let calledNumbers = [];

let gameStarted = false;

let pollingTimer = null;


/* =========================
   TELEGRAM USER
========================= */

function getUserId(){

    if(
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ){

        return String(
            tg.initDataUnsafe.user.id
        );

    }

    return null;

}

function isAdmin(){

    return playerId === ADMIN_ID;

}


/* =========================
   BINGO LETTER
========================= */

function getLetter(number){

    if(number <= 15) return "B";

    if(number <= 30) return "I";

    if(number <= 45) return "N";

    if(number <= 60) return "G";

    return "O";

}


/* =========================
   NUMBER BOARD
========================= */

function createNumberBoard(){

    const board =
        document.getElementById(
            "numberBoard"
        );

    board.innerHTML = "";

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const box =
            document.createElement(
                "div"
            );

        box.className = "number";

        box.id =
            "number-" + number;

        box.innerText = number;

        board.appendChild(box);

    }

}

function updateNumberBoard(){

    for(
        let number = 1;
        number <= 75;
        number++
    ){

        const box =
            document.getElementById(
                "number-" + number
            );

        if(!box) continue;

        if(
            calledNumbers.includes(number)
        ){

            box.classList.add("called");

        }else{

            box.classList.remove("called");

        }

    }

}


/* =========================
   GENERATE CARD
========================= */

function generateCard(){

    if(
        playerCardNumber === null
    ){

        return;

    }

    const card =
        document.getElementById(
            "bingoCard"
        );

    card.innerHTML = "";

    cardNumbers = [];

    const headers =
        ["B","I","N","G","O"];

    headers.forEach(letter => {

        const cell =
            document.createElement(
                "div"
            );

        cell.className =
            "card-cell card-header";

        cell.innerText =
            letter;

        card.appendChild(cell);

    });

    let seed =
        Number(
            playerCardNumber
        );

    function seededRandom(
        minimum,
        maximum
    ){

        seed =
            (
                seed * 9301
                + 49297
            ) % 233280;

        const randomValue =
            seed / 233280;

        return Math.floor(
            minimum
            + randomValue *
            (
                maximum
                - minimum
                + 1
            )
        );

    }

    function generateColumn(
        minimum,
        maximum
    ){

        const numbers = [];

        while(
            numbers.length < 5
        ){

            const number =
                seededRandom(
                    minimum,
                    maximum
                );

            if(
                !numbers.includes(number)
            ){

                numbers.push(number);

            }

        }

        return numbers;

    }

    const columns = [

        generateColumn(1,15),

        generateColumn(16,30),

        generateColumn(31,45),

        generateColumn(46,60),

        generateColumn(61,75)

    ];

    for(
        let row = 0;
        row < 5;
        row++
    ){

        for(
            let col = 0;
            col < 5;
            col++
        ){

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell";

            if(
                row === 2 &&
                col === 2
            ){

                cell.innerText = "FREE";

                cell.classList.add(
                    "marked"
                );

                cell.classList.add(
                    "free"
                );

                cardNumbers.push(
                    "FREE"
                );

            }else{

                const number =
                    columns[col][row];

                cell.innerText =
                    number;

                cardNumbers.push(
                    number
                );

            }

            card.appendChild(cell);

        }

    }

    updateCardMarks();

}


/* =========================
   MARK CARD
========================= */

function updateCardMarks(){

    const cells =
        document.querySelectorAll(
            ".bingo-card .card-cell"
        );

    if(
        cells.length < 30
    ){

        return;

    }

    for(
        let i = 0;
        i < cardNumbers.length;
        i++
    ){

        const value =
            cardNumbers[i];

        const cell =
            cells[i + 5];

        if(
            value === "FREE"
        ){

            continue;

        }

        if(
            calledNumbers.includes(
                Number(value)
            )
        ){

            cell.classList.add(
                "marked"
            );

        }else{

            cell.classList.remove(
                "marked"
            );

        }

    }

}


/* =========================
   JOIN / CHECK CARD
========================= */

async function joinGame(){

    if(!playerId){

        showMessage(
            "⚠️ Telegram user ID not found."
        );

        return;

    }

    try{

        const response =
            await fetch(
                "/api/join-game",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        user_id:playerId

                    })

                }
            );

        const data =
            await response.json();

        /*
          CARD FOUND
        */

        if(
            response.ok &&
            data.card_number
        ){

            playerCardNumber =
                Number(
                    data.card_number
                );

            document.getElementById(
                "cardArea"
            ).style.display =
                "block";

            document.getElementById(
                "noCardArea"
            ).style.display =
                "none";

            document.getElementById(
                "cardNumber"
            ).innerText =
                "🎫 Card: "
                +
                playerCardNumber;

            document.getElementById(
                "bingoBtn"
            ).style.display =
                "block";

            generateCard();

            return;

        }

        /*
          NO CARD
        */

        playerCardNumber = null;

        document.getElementById(
            "cardArea"
        ).style.display =
            "none";

        document.getElementById(
            "noCardArea"
        ).style.display =
            "block";

    }

    catch(error){

        console.log(
            "JOIN ERROR:",
            error
        );

        showMessage(
            "❌ Server connection error."
        );

    }

}


/* =========================
   LOAD GAME STATE
========================= */

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state",
                {
                    cache:"no-store"
                }
            );

        const data =
            await response.json();

        calledNumbers =
            data.called_numbers || [];

        gameStarted =
            Boolean(
                data.started
            );

        updateNumberBoard();

        updateCardMarks();

        document.getElementById(
            "calledCount"
        ).innerText =
            calledNumbers.length;

        if(
            data.current_number
        ){

            document.getElementById(
                "currentCall"
            ).innerText =
                getLetter(
                    data.current_number
                )
                + "-"
                +
                data.current_number;

        }else{

            document.getElementById(
                "currentCall"
            ).innerText =
                "-";

        }

        if(gameStarted){

            document.getElementById(
                "status"
            ).innerText =
                "🎮 GAME STARTED";

        }else{

            document.getElementById(
                "status"
            ).innerText =
                "⏳ WAITING FOR GAME";

        }

    }

    catch(error){

        console.log(
            "STATE ERROR:",
            error
        );

        showMessage(
            "❌ Server connection error."
        );

    }

}


/* =========================
   ADMIN CALL NUMBER
========================= */

async function callNumber(){

    if(!isAdmin()){

        showMessage(
            "⛔ Admin only."
        );

        return;

    }

    try{

        const response =
            await fetch(
                "/api/admin/call-number",
                {

                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body:JSON.stringify({

                        admin_id:ADMIN_ID

                    })

                }
            );

        const data =
            await response.json();

        if(!response.ok){

            showMessage(
                data.message ||
                "Cannot call number."
            );

            return;

        }

        calledNumbers =
            data.called_numbers || [];

        document.getElementById(
            "currentCall"
        ).innerText =
            getLetter(
                data.number
            )
            + "-"
            +
            data.number;

        updateNumberBoard();

        updateCardMarks();

        document.getElementById(
            "calledCount"
        ).innerText =
            calledNumbers.length;

        showMessage(
            "📢 "
            +
            getLetter(
                data.number
            )
            + "-"
            +
            data.number
            +
            " called."
        );

    }

    catch(error){

        showMessage(
            "❌ Server error."
        );

    }

}


/* =========================
   BINGO
========================= */

function checkBingo(){

    if(!playerCardNumber){

        showMessage(
            "🎫 You need to buy a card."
        );

        return;

    }

    if(!gameStarted){

        showMessage(
            "⏳ Game has not started."
        );

        return;

    }

    const marked = [];

    for(
        let i = 0;
        i < cardNumbers.length;
        i++
    ){

        if(
            cardNumbers[i] === "FREE"
        ){

            marked.push(true);

        }else{

            marked.push(
                calledNumbers.includes(
                    Number(
                        cardNumbers[i]
                    )
                )
            );

        }

    }

    let bingo = false;

    for(
        let row = 0;
        row < 5;
        row++
    ){

        if(
            marked.slice(
                row * 5,
                row * 5 + 5
            ).every(Boolean)
        ){

            bingo = true;

        }

    }

    for(
        let col = 0;
        col < 5;
        col++
    ){

        let complete = true;

        for(
            let row = 0;
            row < 5;
            row++
        ){

            if(
                !marked[
                    row * 5 + col
                ]
            ){

                complete = false;

            }

        }

        if(complete){

            bingo = true;

        }

    }

    if(
        [0,6,12,18,24]
        .every(
            index => marked[index]
        )
    ){

        bingo = true;

    }

    if(
        [4,8,12,16,20]
        .every(
            index => marked[index]
        )
    ){

        bingo = true;

    }

    if(bingo){

        showMessage(
            "🏆 BINGO! You won!"
        );

        if(tg){

            tg.showAlert(
                "🏆 BINGO!"
            );

        }

    }else{

        showMessage(
            "❌ Bingo is not complete."
        );

    }

}


/* =========================
   BUY CARD
========================= */

function buyCard(){

    if(tg){

        tg.close();

    }

}


/* =========================
   MESSAGE
========================= */

function showMessage(message){

    document.getElementById(
        "message"
    ).innerText =
        message;

}


/* =========================
   START
========================= */

async function startGame(){

    createNumberBoard();

    playerId =
        getUserId();

    if(isAdmin()){

        document.getElementById(
            "callBtn"
        ).style.display =
            "inline-block";

    }

    await joinGame();

    await loadGameState();

    pollingTimer =
        setInterval(

            async function(){

                await loadGameState();

            },

            2000

        );

}

window.addEventListener(
    "load",
    startGame
);

</script>

</body>
    </html>
