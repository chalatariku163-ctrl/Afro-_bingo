<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GADAA BINGO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#101827;
    color:white;
    min-height:100vh;
}

.header{
    background:#17233a;
    padding:12px;
    text-align:center;
    border-bottom:2px solid #273653;
}

.header h1{
    margin:0;
    font-size:22px;
}

.header p{
    margin:4px 0 0;
    color:#aebbd0;
    font-size:12px;
}

.container{
    max-width:850px;
    margin:auto;
    padding:8px;
}

.panel{
    background:#17233a;
    border-radius:12px;
    padding:10px;
    margin-bottom:8px;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
}

button{
    border:0;
    border-radius:8px;
    padding:10px;
    font-size:13px;
    font-weight:bold;
    cursor:pointer;
    width:100%;
    margin-top:6px;
}

.btn10{
    background:#2563eb;
    color:white;
}

.btn20{
    background:#16a34a;
    color:white;
}

.btn-bingo{
    background:#dc2626;
    color:white;
    font-size:18px;
    margin-top:8px;
}

.btn-refresh{
    background:#475569;
    color:white;
}

.btn-leave{
    background:#7f1d1d;
    color:white;
}

button:disabled{
    opacity:.45;
    cursor:not-allowed;
}

.status{
    text-align:center;
    padding:8px;
    border-radius:8px;
    background:#243452;
    margin-bottom:6px;
    font-size:13px;
}

.timer{
    text-align:center;
    font-size:16px;
    font-weight:bold;
    margin:6px 0;
}

.current-label{
    text-align:center;
    color:#aebbd0;
    font-size:10px;
}

.current-number{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    background:#0f172a;
    border-radius:10px;
    padding:7px;
    margin:5px 0 0;
}

.card-select-title{
    text-align:center;
    margin:0 0 6px;
    font-size:15px;
}

.card-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
}

.game-layout{
    display:grid;
    grid-template-columns:1fr 1.15fr;
    gap:8px;
    align-items:start;
}

.card-id-panel{
    background:#0f172a;
    border-radius:8px;
    padding:7px;
    margin-bottom:8px;
}

.card-id-title{
    text-align:center;
    color:#ffd700;
    font-size:12px;
    margin:0 0 6px;
}

.card-id-grid{
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:3px;
    max-height:260px;
    overflow-y:auto;
}

.card-id{
    background:#263653;
    color:white;
    text-align:center;
    padding:5px 1px;
    border-radius:4px;
    font-size:9px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.card-id:hover{
    background:#3b4f72;
}

/* CARD ID FILATAMEE */
.card-id.selected{
    background:#e11d48;
    color:white;
    box-shadow:0 0 6px #fb7185;
}

/* CARD ID KAN USER BITATE */
.card-id.my-card{
    background:#16a34a;
    color:white;
    box-shadow:0 0 6px #4ade80;
}

/* CARD ID FILATAMEE + BITAME */
.card-id.selected.my-card{
    background:#e11d48;
    box-shadow:0 0 8px #fb7185;
}

.called-title{
    text-align:center;
    margin:0 0 6px;
    font-size:14px;
}

.called-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:3px;
}

.called-number{
    background:#263653;
    padding:5px 1px;
    text-align:center;
    border-radius:5px;
    font-size:10px;
}

.called-number.active{
    background:#e11d48;
    font-weight:bold;
    box-shadow:0 0 4px #fb7185;
}

.called-controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px;
    margin-top:8px;
}

.called-controls button{
    margin-top:0;
    padding:8px 4px;
    font-size:11px;
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#243452;
    padding:7px;
    border-radius:8px;
    margin-bottom:6px;
}

.card-number{
    font-size:15px;
    font-weight:bold;
}

.card-type{
    color:#aebbd0;
    font-size:11px;
}

.bingo-card{
    width:100%;
    border-collapse:separate;
    border-spacing:2px;
    table-layout:fixed;
}

.bingo-card th{
    background:#334155;
    padding:5px 1px;
    border-radius:4px;
    font-size:12px;
}

.bingo-card td{
    background:#263653;
    height:auto;
    aspect-ratio:1 / 1;
    padding:0;
    text-align:center;
    border-radius:4px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

.bingo-card td.marked{
    background:#16a34a;
}

.bingo-card td.free{
    background:#ca8a04;
    color:white;
}

.message{
    text-align:center;
    padding:8px;
    border-radius:8px;
    margin-top:7px;
    display:none;
    font-size:12px;
}

.message.success{
    display:block;
    background:#166534;
}

.message.error{
    display:block;
    background:#991b1b;
}

@media(max-width:600px){

    .container{
        padding:5px;
    }

    .game-layout{
        grid-template-columns:1fr 1.12fr;
        gap:5px;
    }

    .called-number{
        font-size:8px;
        padding:4px 1px;
    }

    .bingo-card{
        border-spacing:2px;
    }

    .bingo-card th{
        font-size:10px;
        padding:4px 1px;
    }

    .bingo-card td{
        font-size:9px;
    }

    .current-number{
        font-size:27px;
    }

    .card-number{
        font-size:12px;
    }

    .card-type{
        font-size:9px;
    }

    .called-controls button{
        font-size:9px;
        padding:7px 2px;
    }

    .card-id-grid{
        grid-template-columns:repeat(10,1fr);
        gap:2px;
    }

    .card-id{
        font-size:8px;
        padding:4px 1px;
    }

}

</style>

</head>

<body>

<div class="header">

    <h1>🎱 GADAA BINGO</h1>

    <p>Play • Win • Enjoy</p>

</div>

<div class="container">


<!-- GAME STATUS -->

<div class="panel">

    <div id="gameStatus" class="status">

        ⏳ Loading game...

    </div>

    <div id="timer" class="timer">

        --

    </div>

    <div class="current-label">

        CURRENT CALLED NUMBER

    </div>

    <div id="currentNumber" class="current-number">

        --

    </div>

</div>


<!-- BUY CARD -->

<div id="buyPanel" class="panel">

    <h3 class="card-select-title">

        🎫 SELECT YOUR CARD ID

    </h3>

    <div class="card-buttons">

        <button
            class="btn10"
            id="buy10Btn"
            onclick="buyCard('10')"
        >

            🎫 BUY CARD 10 Birr

        </button>

        <button
            class="btn20"
            id="buy20Btn"
            onclick="buyCard('20')"
        >

            🎫 BUY CARD 20 Birr

        </button>

    </div>

    <div id="buyMessage" class="message"></div>

</div>


<!-- MAIN GAME -->

<div class="game-layout">


<!-- LEFT SIDE -->

<div class="panel">


    <!-- ID CARD TABLE -->

    <div
        id="cardIdPanel"
        class="card-id-panel"
    >

        <h3 class="card-id-title">

            🎫 CARD ID 1 - 500

        </h3>

        <div
            id="cardIdGrid"
            class="card-id-grid"
        >

        </div>

    </div>


    <!-- CALLED NUMBERS -->

    <h3 class="called-title">

        📢 CALLED NUMBERS

    </h3>

    <div
        id="calledNumbers"
        class="called-grid"
    >

    </div>


    <div class="called-controls">

        <button
            class="btn-refresh"
            onclick="loadGameState()"
        >

            🔄 REFRESH

        </button>

        <button
            class="btn-leave"
            onclick="leaveGame()"
        >

            🚪 LEAVE

        </button>

    </div>

</div>


<!-- RIGHT SIDE -->

<div
    id="myCardBox"
    class="panel"
    style="display:none;"
>

    <div class="card-header">

        <div class="card-number">

            🎫 CARD #

            <span id="cardNumber"></span>

        </div>

        <div class="card-type">

            <span id="cardType"></span>

            Birr

        </div>

    </div>


    <table class="bingo-card">

        <thead>

            <tr>

                <th>B</th>
                <th>I</th>
                <th>N</th>
                <th>G</th>
                <th>O</th>

            </tr>

        </thead>

        <tbody id="bingoTable"></tbody>

    </table>


    <button
        class="btn-bingo"
        id="bingoBtn"
        onclick="claimBingo()"
    >

        🏆 BINGO!

    </button>


    <div
        id="bingoMessage"
        class="message"
    >

    </div>

</div>

</div>

</div>


<script>


// =====================================================
// TELEGRAM
// =====================================================

const tg =
    window.Telegram.WebApp;

tg.ready();

tg.expand();


// =====================================================
// USER ID
// =====================================================

let userId = null;

if(

    tg.initDataUnsafe &&

    tg.initDataUnsafe.user

){

    userId =
        tg.initDataUnsafe.user.id;

}


// =====================================================
// GAME VARIABLES
// =====================================================

let currentGameId = null;

let myCardNumber = null;

let myCardType = null;

let myCard = [];

let markedCells = [];

let gameState = null;


// =====================================================
// ELEMENTS
// =====================================================

const gameStatus =
    document.getElementById(
        "gameStatus"
    );

const timer =
    document.getElementById(
        "timer"
    );

const currentNumber =
    document.getElementById(
        "currentNumber"
    );

const calledNumbers =
    document.getElementById(
        "calledNumbers"
    );

const myCardBox =
    document.getElementById(
        "myCardBox"
    );

const bingoTable =
    document.getElementById(
        "bingoTable"
    );

const cardNumber =
    document.getElementById(
        "cardNumber"
    );

const cardType =
    document.getElementById(
        "cardType"
    );

const buy10Btn =
    document.getElementById(
        "buy10Btn"
    );

const buy20Btn =
    document.getElementById(
        "buy20Btn"
    );

const bingoBtn =
    document.getElementById(
        "bingoBtn"
    );

const cardIdGrid =
    document.getElementById(
        "cardIdGrid"
    );

const buyMessage =
    document.getElementById(
        "buyMessage"
    );

const bingoMessage =
    document.getElementById(
        "bingoMessage"
    );


// =====================================================
// MESSAGE
// =====================================================

function showMessage(

    element,

    text,

    type

){

    element.innerText =
        text;

    element.className =
        "message "
        + type;

    setTimeout(

        function(){

            element.className =
                "message";

        },

        5000

    );

}


// =====================================================
// LOAD GAME STATE
// =====================================================

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state"
            );

        const data =
            await response.json();

        if(

            !data.success

        ){

            gameStatus.innerText =
                "⚠️ Game state error";

            return;

        }

        updateGameUI(
            data
        );

    }

    catch(error){

        console.error(
            error
        );

        gameStatus.innerText =
            "❌ Server connection error";

    }

}


// =====================================================
// UPDATE GAME UI
// =====================================================

function updateGameUI(data){

    const now =
        Date.now()
        / 1000;


    // =========================================
    // NEW GAME CYCLE
    // =========================================

    if(

        currentGameId !== null &&

        currentGameId !== data.game_id

    ){

        myCardNumber =
            null;

        myCardType =
            null;

        myCard =
            [];

        markedCells =
            [];

        myCardBox.style.display =
            "none";

        buyMessage.className =
            "message";

        bingoMessage.className =
            "message";

    }


    currentGameId =
        data.game_id;

    gameState =
        data;


    // =========================================
    // CARD BUYING
    // =========================================

    if(

        data.card_buying

    ){

        gameStatus.innerText =
            "🟢 CARD BUYING IS OPEN";

        buy10Btn.disabled =
            false;

        buy20Btn.disabled =
            false;


        let remaining =
            Math.max(

                0,

                Math.ceil(

                    data.card_buying_end_time
                    - now

                )

            );


        timer.innerText =
            "⏱️ Card buying: "
            + remaining
            + " sec";


        // IMPORTANT:
        // ID TABLE YEROO MUL'ATA
        renderCardIds();

    }


    // =========================================
    // GAME RUNNING
    // =========================================

    else if(

        data.started

    ){

        gameStatus.innerText =
            "🎮 GAME IS RUNNING";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;

        timer.innerText =
            "🎱 Numbers are being called";


        /*
        IMPORTANT FIX:

        DURAN:
        cardIdPanel.style.display = "none";

        KANA TURAN HIN JIRU.

        ID CARD TABLE YEROO MUL'ATA.
        */

        renderCardIds();

    }


    // =========================================
    // WINNER
    // =========================================

    else if(

        data.winner

    ){

        gameStatus.innerText =
            "🏆 GAME FINISHED";

        timer.innerText =
            "Winner found";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;


        // ID CARD TABLE HIN DHOKATU

        renderCardIds();

    }


    // =========================================
    // WAITING
    // =========================================

    else{

        gameStatus.innerText =
            "⏳ WAITING FOR GAME";

        buy10Btn.disabled =
            true;

        buy20Btn.disabled =
            true;


        // ID CARD TABLE HIN DHOKATU

        renderCardIds();

    }


    // =========================================
    // CURRENT NUMBER
    // =========================================

    if(

        data.current_number !== null &&

        data.current_number !== undefined

    ){

        currentNumber.innerText =
            formatCall(

                data.current_number

            );

    }

    else{

        currentNumber.innerText =
            "--";

    }


    // =========================================
    // CALLED NUMBERS
    // =========================================

    renderCalledNumbers(

        data.called_numbers || []

    );

}


// =====================================================
// CARD ID 1 - 500
// =====================================================

function renderCardIds(){

    cardIdGrid.innerHTML =
        "";


    for(

        let i = 1;

        i <= 500;

        i++

    ){

        const div =
            document.createElement(
                "div"
            );


        div.className =
            "card-id";


        div.innerText =
            i;


        div.id =
            "card-id-"
            + i;


        // CARD ID USER FILATE

        if(

            Number(myCardNumber)
            === i

        ){

            div.classList.add(
                "selected"
            );

        }


        // CARD ID USER BITATE

        if(

            Number(myCardNumber)
            === i &&

            myCardType

        ){

            div.classList.add(
                "my-card"
            );

        }


        // CARD ID CLICK

        div.onclick =
            function(){


                // GAME BUYING YEROO FILATU

                if(

                    gameState &&

                    gameState.card_buying

                ){

                    myCardNumber =
                        i;


                    document
                        .querySelectorAll(
                            ".card-id"
                        )
                        .forEach(

                            function(item){

                                item.classList
                                    .remove(
                                        "selected"
                                    );

                            }

                        );


                    div.classList.add(
                        "selected"
                    );


                    showMessage(

                        buyMessage,

                        "🎫 Card #"
                        + i
                        + " filatameera. "
                        + "Amma Card 10 ykn Card 20 bitadhu.",

                        "success"

                    );

                }

            };


        cardIdGrid.appendChild(
            div
        );

    }

}


// =====================================================
// FORMAT NUMBER
// =====================================================

function formatCall(number){

    if(

        number >= 1 &&

        number <= 15

    ){

        return "B-" + number;

    }

    if(

        number >= 16 &&

        number <= 30

    ){

        return "I-" + number;

    }

    if(

        number >= 31 &&

        number <= 45

    ){

        return "N-" + number;

    }

    if(

        number >= 46 &&

        number <= 60

    ){

        return "G-" + number;

    }

    if(

        number >= 61 &&

        number <= 75

    ){

        return "O-" + number;

    }

    return number;

}


// =====================================================
// CALLED NUMBERS
// =====================================================

function renderCalledNumbers(

    numbers

){

    calledNumbers.innerHTML =
        "";


    for(

        let i = 1;

        i <= 75;

        i++

    ){

        const div =
            document.createElement(
                "div"
            );


        div.className =
            "called-number";


        div.innerText =
            formatCall(
                i
            );


        if(

            numbers.includes(
                i
            )

        ){

            div.classList.add(
                "active"
            );

        }


        calledNumbers.appendChild(
            div
        );

    }

}


// =====================================================
// BUY CARD
// =====================================================

async function buyCard(

    type

){

    if(

        !userId

    ){

        showMessage(

            buyMessage,

            "⚠️ Telegram User ID hin argamne.",

            "error"

        );

        return;

    }


    if(

        !myCardNumber

    ){

        showMessage(

            buyMessage,

            "⚠️ Dura Card ID 1 hanga 500 keessaa tokko filadhu.",

            "error"

        );

        return;

    }


    if(

        !gameState ||

        !gameState.card_buying

    ){

        showMessage(

            buyMessage,

            "⚠️ Yeroon Card bitachuu xumurame.",

            "error"

        );

        return;

    }


    buy10Btn.disabled =
        true;

    buy20Btn.disabled =
        true;


    try{

        const response =
            await fetch(

                "/api/buy-card",

                {

                    method:
                        "POST",

                    headers:
                    {

                        "Content-Type":
                            "application/json"

                    },

                    body:
                        JSON.stringify({

                            user_id:
                                userId,

                            card_type:
                                type,

                            card_number:
                                myCardNumber

                        })

                }

            );


        const data =
            await response.json();


        if(

            !data.success

        ){

            showMessage(

                buyMessage,

                data.message ||

                "Card bitachuu hin dandeenye.",

                "error"

            );

            return;

        }


        // SERVER irraa CARD BINGO DHUGAA

        myCardNumber =
            data.card_number;

        myCardType =
            data.card_type;

        myCard =
            data.card;

        currentGameId =
            data.game_id;


        // CARD BINGO MUL'ISIISI

        showMyCard();


        // ID TABLE UPDATE GODHI

        renderCardIds();


        showMessage(

            buyMessage,

            "✅ Card #"
            + myCardNumber
            + " milkaa'inaan bitame!",

            "success"

        );

    }


    catch(error){

        console.error(
            error
        );

        showMessage(

            buyMessage,

            "❌ Server error.",

            "error"

        );

    }


    finally{

        if(

            gameState &&

            gameState.card_buying

        ){

            buy10Btn.disabled =
                false;

            buy20Btn.disabled =
                false;

        }

    }

}


// =====================================================
// SHOW MY CARD
// =====================================================

function showMyCard(){

    myCardBox.style.display =
        "block";


    cardNumber.innerText =
        myCardNumber;


    cardType.innerText =
        myCardType;


    renderCard();

}


// =====================================================
// RENDER BINGO CARD
// =====================================================

function renderCard(){

    bingoTable.innerHTML =
        "";


    markedCells =
        [];


    for(

        let row = 0;

        row < 5;

        row++

    ){

        const tr =
            document.createElement(
                "tr"
            );


        for(

            let col = 0;

            col < 5;

            col++

        ){

            const td =
                document.createElement(
                    "td"
                );


            const value =
                myCard[row][col];


            td.innerText =
                value;


            td.dataset.row =
                row;


            td.dataset.col =
                col;


            if(

                value === "FREE"

            ){

                td.classList.add(
                    "free"
                );

                td.classList.add(
                    "marked"
                );


                markedCells.push(

                    row
                    + "-"
                    + col

                );

            }


            td.onclick =
                function(){

                    toggleCell(

                        td,

                        value,

                        row,

                        col

                    );

                };


            tr.appendChild(
                td
            );

        }


        bingoTable.appendChild(
            tr
        );

    }

}


// =====================================================
// MARK CARD
// =====================================================

function toggleCell(

    cell,

    value,

    row,

    col

){

    if(

        value === "FREE"

    ){

        return;

    }


    if(

        !gameState ||

        !gameState.called_numbers

    ){

        return;

    }


    if(

        !gameState.called_numbers.includes(

            value

        )

    ){

        showMessage(

            bingoMessage,

            "⚠️ Lakkoofsi kun hin waamamin.",

            "error"

        );

        return;

    }


    cell.classList.toggle(
        "marked"
    );


    const key =
        row
        + "-"
        + col;


    if(

        cell.classList.contains(
            "marked"
        )

    ){

        if(

            !markedCells.includes(
                key
            )

        ){

            markedCells.push(
                key
            );

        }

    }


    else{

        markedCells =
            markedCells.filter(

                function(item){

                    return item !== key;

                }

            );

    }

}


// =====================================================
// CLAIM BINGO
// =====================================================

async function claimBingo(){

    if(

        !userId

    ){

        showMessage(

            bingoMessage,

            "⚠️ User ID hin argamne.",

            "error"

        );

        return;

    }


    if(

        !myCardNumber ||

        !myCardType

    ){

        showMessage(

            bingoMessage,

            "⚠️ Dura card bitadhu.",

            "error"

        );

        return;

    }


    bingoBtn.disabled =
        true;


    try{

        const response =
            await fetch(

                "/api/check-bingo",

                {

                    method:
                        "POST",

                    headers:
                    {

                        "Content-Type":
                            "application/json"

                    },

                    body:
                        JSON.stringify({

                            user_id:
                                userId,

                            card_number:
                                myCardNumber,

                            card_type:
                                myCardType

                        })

                }

            );


        const data =
            await response.json();


        if(

            data.success

        ){

            showMessage(

                bingoMessage,

                "🏆 BINGO! Ati mo'atteetta! Prize: "
                + data.prize
                + " Birr",

                "success"

            );

        }


        else{

            showMessage(

                bingoMessage,

                data.message ||

                "Bingo hin mirkanoofne.",

                "error"

            );

        }

    }


    catch(error){

        console.error(
            error
        );

        showMessage(

            bingoMessage,

            "❌ Server error.",

            "error"

        );

    }


    finally{

        bingoBtn.disabled =
            false;

    }

}


// =====================================================
// LEAVE GAME
// =====================================================

function leaveGame(){

    myCardBox.style.display =
        "none";

}


// =====================================================
// AUTO REFRESH
// =====================================================

setInterval(

    function(){

        loadGameState();

    },

    1000

);


// =====================================================
// TIMER UPDATE
// =====================================================

setInterval(

    function(){

        if(

            gameState

        ){

            updateGameUI(
                gameState
            );

        }

    },

    500

);


// =====================================================
// START
// =====================================================

loadGameState();


</script>
