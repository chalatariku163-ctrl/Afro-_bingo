<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gadaa Bingo</title>

<!-- Telegram WebApp API -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

* {
    box-sizing: border-box;
}

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #bba4cf;

    color: #222;

}


/* =========================
   TOP
========================= */

.top {

    background: #202b39;

    color: white;

    padding: 12px;

    text-align: center;

}

.top h1 {

    margin: 5px;

}

button {

    padding: 11px 15px;

    margin: 4px;

    border: none;

    border-radius: 8px;

    font-size: 15px;

    font-weight: bold;

    cursor: pointer;

}

button:disabled {

    opacity: 0.5;

    cursor: not-allowed;

}


/* ADMIN BUTTON */

#callBtn {

    background: #f5a000;

    color: white;

}

#callBtn.admin-only {

    display: none;

}


/* =========================
   MAIN LAYOUT
========================= */

.main {

    display: grid;

    grid-template-columns: 270px 260px 1fr;

    gap: 10px;

    padding: 10px;

    align-items: start;

}


/* =========================
   CALLED BOARD
========================= */

.called-board {

    padding: 5px;

}

.letters {

    display: grid;

    grid-template-columns:
    repeat(5, 1fr);

    gap: 5px;

    margin-bottom: 6px;

}

.letters div {

    padding: 9px 0;

    color: white;

    font-size: 20px;

    font-weight: bold;

    text-align: center;

    border-radius: 7px;

}

.b {
    background: #f5a000;
}

.i {
    background: green;
}

.n {
    background: blue;
}

.g {
    background: red;
}

.o {
    background: purple;
}


.number-board {

    display: flex;

    flex-direction: column;

    gap: 5px;

}

.number-row {

    display: grid;

    grid-template-columns:
    repeat(5, 1fr);

    gap: 5px;

}

.number-row span {

    height: 45px;

    display: flex;

    align-items: center;

    justify-content: center;

    background: #c2c4df;

    border: 2px solid #eeeeee;

    border-radius: 10px;

    color: white;

    font-size: 17px;

    font-weight: bold;

}

.number-row span.active {

    background: green;

}


/* =========================
   CURRENT NUMBER
========================= */

.current-area {

    text-align: center;

}

.current-title {

    background: purple;

    color: white;

    border-radius: 35px;

    padding: 20px 10px;

    font-size: 25px;

    font-weight: bold;

    margin-bottom: 20px;

}

.current-number {

    display: inline-flex;

    width: 110px;

    height: 110px;

    align-items: center;

    justify-content: center;

    background: blue;

    color: white;

    border-radius: 50%;

    font-size: 32px;

    font-weight: bold;

}

#status {

    font-size: 18px;

    font-weight: bold;

    margin: 15px;

}


/* =========================
   CARD AREA
========================= */

.card-area {

    background: white;

    padding: 12px;

    border-radius: 12px;

    min-height: 300px;

}

.card-area h2 {

    margin-top: 0;

    text-align: center;

}

.card-number-title {

    font-size: 18px;

    font-weight: bold;

    margin-bottom: 10px;

    text-align: center;

}


/* =========================
   BINGO CARD
========================= */

.bingo-card {

    width: 100%;

    max-width: 520px;

    margin: auto;

    display: grid;

    grid-template-columns:
    repeat(5, 1fr);

    gap: 5px;

}

.card-cell {

    min-height: 65px;

    display: flex;

    align-items: center;

    justify-content: center;

    background: #eeeeee;

    border: 2px solid #555;

    border-radius: 8px;

    font-size: 20px;

    font-weight: bold;

}

.card-header {

    background: #202b39;

    color: white;

}

.card-cell.marked {

    background: green;

    color: white;

}

.free {

    background: gold !important;

    color: black !important;

}


/* =========================
   BINGO BUTTON
========================= */

#bingoBtn {

    display: block;

    margin: 15px auto 5px auto;

    background: purple;

    color: white;

    font-size: 18px;

}

#message {

    min-height: 30px;

    font-size: 20px;

    font-weight: bold;

    text-align: center;

}


/* =========================
   MOBILE
========================= */

@media (max-width: 900px) {

    .main {

        grid-template-columns: 1fr;

    }

    .called-board,

    .current-area,

    .card-area {

        width: 100%;

        max-width: 600px;

        margin: auto;

    }

}

</style>

</head>


<body>


<!-- =========================
     TOP
========================= -->

<div class="top">

    <h1>🎯 GADAA BINGO</h1>

    <button
        id="callBtn"
        onclick="callNumber()">

        📢 CALL NUMBER

    </button>

</div>


<!-- =========================
     MAIN
========================= -->

<div class="main">


    <!-- LEFT -->

    <div class="called-board">

        <div class="letters">

            <div class="b">B</div>

            <div class="i">I</div>

            <div class="n">N</div>

            <div class="g">G</div>

            <div class="o">O</div>

        </div>


        <div
            id="numberBoard"
            class="number-board">

        </div>

    </div>


    <!-- CENTER -->

    <div class="current-area">

        <div class="current-title">

            CURRENT CALL

        </div>


        <div
            id="currentNumber"
            class="current-number">

            -

        </div>


        <div
            id="status">

            Game loading...

        </div>

    </div>


    <!-- RIGHT -->

    <div class="card-area">

        <h2>

            🎫 YOUR BINGO CARD

        </h2>


        <div
            id="cardNumberTitle"
            class="card-number-title">

            Card: Loading...

        </div>


        <div
            id="bingoCard"
            class="bingo-card">

        </div>


        <button
            id="bingoBtn"
            onclick="checkBingo()">

            🏆 BINGO

        </button>


        <div
            id="message">

        </div>

    </div>

</div>


<script>


/* ==================================================
   TELEGRAM WEB APP
================================================== */

let tg = null;


if (

    window.Telegram &&

    window.Telegram.WebApp

) {

    tg =
        window.Telegram.WebApp;

    tg.ready();

    tg.expand();

}


/* ==================================================
   GAME VARIABLES
================================================== */

let calledNumbers = [];

let gameStarted = false;

let playerId = null;

let playerCardNumber = null;

let cardNumbers = [];

let pollingTimer = null;


/* ==================================================
   GET TELEGRAM USER ID
================================================== */

function getUserId() {

    if (

        tg &&

        tg.initDataUnsafe &&

        tg.initDataUnsafe.user

    ) {

        return String(

            tg.initDataUnsafe.user.id

        );

    }


    return null;

}


/* ==================================================
   ADMIN CHECK
================================================== */

function isAdmin() {

    return (

        playerId ===
        "6376605934"

    );

}


/* ==================================================
   JOIN GAME
================================================== */

async function joinGame() {

    playerId =
        getUserId();


    if (!playerId) {

        document.getElementById(

            "status"

        ).innerText =

            "Telegram keessatti banuu qabda.";

        return false;

    }


    try {

        const response =

            await fetch(

                "/api/join-game",

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json"

                    },

                    body: JSON.stringify({

                        user_id:
                        playerId

                    })

                }

            );


        const data =

            await response.json();


        if (!response.ok || !data.success) {

            document.getElementById(

                "status"

            ).innerText =

                data.message ||

                "Game seenuun hin danda'amne.";

            return false;

        }


        playerCardNumber =
            data.card_number;


        document.getElementById(

            "cardNumberTitle"

        ).innerText =

            "🎫 Card Number: "

            + playerCardNumber;


        document.getElementById(

            "status"

        ).innerText =

            "Game keessa seente.";


        return true;


    } catch (error) {

        console.log(

            "JOIN ERROR:",

            error

        );


        document.getElementById(

            "status"

        ).innerText =

            "Server waliin wal qunnamuun hin danda'amne.";

        return false;

    }

}


/* ==================================================
   LOAD GAME STATE
================================================== */

async function loadGameState() {

    try {

        const response =

            await fetch(

                "/api/game-state",

                {

                    cache: "no-store"

                }

            );


        const data =

            await response.json();


        calledNumbers =

            data.called_numbers || [];


        gameStarted =

            data.started;


        updateCalledBoard();


        updateCardMarks();


        if (

            data.current_number

        ) {

            document.getElementById(

                "currentNumber"

            ).innerText =

                getLetter(

                    data.current_number

                )

                + "-"

                + data.current_number;

        }


        if (!data.started) {

            document.getElementById(

                "status"

            ).innerText =

                "Game amma cufaa dha.";

        }


        if (

            data.winner

        ) {

            document.getElementById(

                "message"

            ).innerText =

                "🏆 Winner jira!";

        }


    } catch (error) {

        console.log(

            "STATE ERROR:",

            error

        );

    }

}


/* ==================================================
   CREATE NUMBER BOARD
================================================== */

function createNumberBoard() {

    const board =

        document.getElementById(

            "numberBoard"

        );


    board.innerHTML = "";


    for (

        let start = 1;

        start <= 75;

        start += 5

    ) {


        const row =

            document.createElement(

                "div"

            );


        row.className =

            "number-row";


        for (

            let number = start;

            number < start + 5 &&

            number <= 75;

            number++

        ) {


            const span =

                document.createElement(

                    "span"

                );


            span.id =

                "number-" + number;


            span.innerText =

                number;


            row.appendChild(

                span

            );

        }


        board.appendChild(

            row

        );

    }

}


/* ==================================================
   UPDATE CALLED BOARD
================================================== */

function updateCalledBoard() {

    for (

        let number = 1;

        number <= 75;

        number++

    ) {


        const box =

            document.getElementById(

                "number-" + number

            );


        if (!box) {

            continue;

        }


        if (

            calledNumbers.includes(

                number

            )

        ) {

            box.classList.add(

                "active"

            );

        } else {

            box.classList.remove(

                "active"

            );

        }

    }

}


/* ==================================================
   BINGO LETTER
================================================== */

function getLetter(number) {

    if (number <= 15)

        return "B";


    if (number <= 30)

        return "I";


    if (number <= 45)

        return "N";


    if (number <= 60)

        return "G";


    return "O";

}


/* ==================================================
   CREATE CARD FROM CARD NUMBER
================================================== */

function generateCardFromCardNumber() {

    if (

        playerCardNumber === null

    ) {

        return;

    }


    const card =

        document.getElementById(

            "bingoCard"

        );


    card.innerHTML = "";


    cardNumbers = [];


    const headers = [

        "B",

        "I",

        "N",

        "G",

        "O"

    ];


    headers.forEach(

        letter => {


            const cell =

                document.createElement(

                    "div"

                );


            cell.className =

                "card-cell card-header";


            cell.innerText =

                letter;


            card.appendChild(

                cell

            );

        }

    );


    let seed =

        Number(

            playerCardNumber

        );


    function seededRandom(

        min,

        max

    ) {


        seed = (

            seed * 9301

            + 49297

        ) % 233280;


        const rnd =

            seed / 233280;


        return Math.floor(

            min +

            rnd *

            (

                max -

                min +

                1

            )

        );

    }


    function generateSeeded(

        min,

        max,

        count

    ) {


        const numbers = [];


        while (

            numbers.length < count

        ) {


            const number =

                seededRandom(

                    min,

                    max

                );


            if (

                !numbers.includes(

                    number

                )

            ) {


                numbers.push(

                    number

                );

            }

        }


        return numbers;

    }


    const columns = [

        generateSeeded(

            1,

            15,

            5

        ),

        generateSeeded(

            16,

            30,

            5

        ),

        generateSeeded(

            31,

            45,

            5

        ),

        generateSeeded(

            46,

            60,

            5

        ),

        generateSeeded(

            61,

            75,

            5

        )

    ];


    for (

        let row = 0;

        row < 5;

        row++

    ) {


        for (

            let col = 0;

            col < 5;

            col++

        ) {


            const cell =

                document.createElement(

                    "div"

                );


            cell.className =

                "card-cell";


            if (

                row === 2 &&

                col === 2

            ) {


                cell.innerText =

                    "FREE";


                cell.classList.add(

                    "marked"

                );


                cell.classList.add(

                    "free"

                );


                cardNumbers.push(

                    "FREE"

                );


            } else {


                const number =

                    columns[col][row];


                cell.innerText =

                    number;


                cardNumbers.push(

                    number

                );

            }


            card.appendChild(

                cell

            );

        }

    }


    updateCardMarks();

}


/* ==================================================
   UPDATE CARD MARKS
================================================== */

function updateCardMarks() {

    const cells =

        document.querySelectorAll(

            ".bingo-card .card-cell"

        );


    if (!cells.length) {

        return;

    }


    for (

        let i = 0;

        i < cardNumbers.length;

        i++

    ) {


        const value =

            cardNumbers[i];


        if (

            value === "FREE"

        ) {

            continue;

        }


        if (

            calledNumbers.includes(

                Number(value)

            )

        ) {


            cells[i].classList.add(

                "marked"

            );

        } else {


            cells[i].classList.remove(

                "marked"

            );

        }

    }

}


/* ==================================================
   CALL NUMBER - ADMIN ONLY
================================================== */

async function callNumber() {

    if (!isAdmin()) {

        document.getElementById(

            "message"

        ).innerText =

            "❌ Admin qofa.";

        return;

    }


    try {

        const response =

            await fetch(

                "/api/admin/call-number",

                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json"

                    },

                    body: JSON.stringify({

                        admin_id:
                        playerId

                    })

                }

            );


        const data =

            await response.json();


        if (!data.success) {

            document.getElementById(

                "message"

            ).innerText =

                data.message ||

                "Lakkoofsa waamuu hin dandeenye.";

            return;

        }


        calledNumbers =

            data.called_numbers;


        document.getElementById(

            "currentNumber"

        ).innerText =

            getLetter(

                data.number

            )

            + "-"

            + data.number;


        updateCalledBoard();


        updateCardMarks();


    } catch (error) {

        console.log(

            "CALL ERROR:",

            error

        );

    }

}

   BINGO CHECK
================================================== */
