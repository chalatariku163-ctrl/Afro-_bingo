<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>GADAA BINGO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:Arial,sans-serif;

    background:#101827;

    color:white;

    padding:12px;

}

.container{

    max-width:1100px;

    margin:auto;

}

h1{

    text-align:center;

    color:#00e5ff;

    margin:8px 0 15px;

}


/* =============================== */
/* GAME INFORMATION */
/* =============================== */

.game-info{

    display:grid;

    grid-template-columns:
        repeat(5,1fr);

    gap:6px;

    background:#1b2638;

    border-radius:12px;

    padding:8px;

    margin-bottom:12px;

    text-align:center;

}

.game-info-item{

    background:#27364d;

    border-radius:8px;

    padding:8px 4px;

}

.game-info-label{

    display:block;

    color:#9aa8bb;

    font-size:10px;

    margin-bottom:4px;

}

.game-info-value{

    display:block;

    color:#00e5ff;

    font-size:13px;

    font-weight:bold;

    overflow:hidden;

    text-overflow:ellipsis;

    white-space:nowrap;

}


/* =============================== */
/* STATUS */
/* =============================== */

.status-box{

    background:#1b2638;

    border-radius:12px;

    padding:15px;

    margin-bottom:12px;

    text-align:center;

}

#gameStatus{

    font-size:18px;

    font-weight:bold;

    margin-bottom:8px;

}

#timer{

    color:#ffd54a;

    font-size:16px;

}


/* =============================== */
/* PLAY GAME */
/* =============================== */

#playGameBox{

    background:#1b2638;

    border-radius:15px;

    padding:18px;

    margin-bottom:15px;

    text-align:center;

}

#playGameBtn{

    width:100%;

    background:#00a8ff;

    color:white;

    font-size:20px;

    padding:15px;

}

#buyChoiceBox{

    display:none;

    margin-top:12px;

}

#buyChoiceBox button{

    width:100%;

    margin-top:8px;

}

#choose10Btn{

    background:#16c784;

    color:white;

}

#choose20Btn{

    background:#ff9800;

    color:white;

}


/* =============================== */
/* CURRENT NUMBER */
/* =============================== */

.current-number{

    background:#0b1220;

    border:2px solid #00e5ff;

    border-radius:15px;

    padding:15px;

    text-align:center;

    margin-bottom:12px;

}

.current-number h3{

    margin:0 0 8px;

    color:#aaa;

}

#currentNumber{

    font-size:42px;

    font-weight:bold;

    color:#00e5ff;

}


/* =============================== */
/* BUY BUTTONS */
/* =============================== */

.buttons{

    display:none;

    gap:10px;

    margin-bottom:12px;

}

button{

    border:none;

    border-radius:10px;

    padding:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}

button:disabled{

    opacity:.5;

    cursor:not-allowed;

}

#buy10Btn{

    flex:1;

    background:#16c784;

    color:white;

}

#buy20Btn{

    flex:1;

    background:#ff9800;

    color:white;

}


/* =============================== */
/* MESSAGE */
/* =============================== */

.message{

    min-height:20px;

    margin:8px 0;

    padding:8px;

    border-radius:8px;

    text-align:center;

}

.message.success{

    background:#123d29;

    color:#4cff9b;

}

.message.error{

    background:#481b1b;

    color:#ff7777;

}


/* =============================== */
/* CARD ID */
/* =============================== */

#cardIdPanel{

    display:none;

    background:#1b2638;

    border-radius:12px;

    padding:12px;

    margin-bottom:15px;

}

#cardIdPanel h3{

    text-align:center;

    margin-top:0;

}

#cardIdGrid{

    display:grid;

    grid-template-columns:
        repeat(auto-fill,minmax(45px,1fr));

    gap:6px;

    max-height:350px;

    overflow-y:auto;

}

.card-id{

    background:#27364d;

    padding:10px 3px;

    text-align:center;

    border-radius:7px;

    cursor:pointer;

    font-weight:bold;

}

.card-id.selected{

    background:#00a8ff;

}

.card-id.my-card{

    background:#e53935;

    border:2px solid #ffb3b3;

}


/* =============================== */
/* GAME LAYOUT */
/* =============================== */

.game-layout{

    display:grid;

    grid-template-columns:
        minmax(0,1fr)
        minmax(0,1fr);

    gap:15px;

    align-items:start;

}

.called-box{

    background:#1b2638;

    border-radius:12px;

    padding:12px;

    margin-bottom:15px;

}

.called-box h3{

    text-align:center;

    margin-top:0;

}

#calledNumbers{

    display:grid;

    grid-template-columns:
        repeat(5,1fr);

    gap:5px;

}

.called-number{

    background:#27364d;

    padding:8px 2px;

    text-align:center;

    border-radius:6px;

    font-size:12px;

    min-height:30px;

    display:flex;

    align-items:center;

    justify-content:center;

}

.called-number.header{

    background:#00a8ff;

    font-weight:bold;

    font-size:15px;

}

.called-number.active{

    background:#16c784;

    color:white;

    font-weight:bold;

    box-shadow:
        0 0 8px #16c784;

}


/* =============================== */
/* USER CARD */
/* =============================== */

#myCardBox{

    display:none;

}

.user-card-panel{

    background:#1b2638;

    border-radius:15px;

    padding:12px;

    margin-bottom:15px;

}

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:10px;

    padding:10px;

    background:#0b1220;

    border-radius:10px;

}

.card-number{

    color:#00e5ff;

    font-size:18px;

    font-weight:bold;

}

.card-type{

    color:#ffd54a;

    font-weight:bold;

}

.bingo-card{

    width:100%;

    border-collapse:collapse;

    table-layout:fixed;

}

.bingo-card th{

    background:#00a8ff;

    padding:10px;

    font-size:18px;

}

.bingo-card td{

    background:#27364d;

    border:2px solid #101827;

    text-align:center;

    height:52px;

    font-size:17px;

    font-weight:bold;

}

.bingo-card td.marked{

    background:#16c784;

    box-shadow:0 0 8px #16c784;

}

.bingo-card td.free{

    background:#9c27b0;

}

.btn-bingo{

    width:100%;

    margin-top:10px;

    background:#e91e63;

    color:white;

}


/* =============================== */
/* MOBILE */
/* =============================== */

@media(max-width:700px){

    .game-layout{

        gap:8px;

    }

    .called-box{

        padding:6px;

    }

    .called-box h3{

        font-size:12px;

    }

    .called-number{

        font-size:10px;

        min-height:27px;

    }

    .user-card-panel{

        padding:6px;

    }

    .card-header{

        display:block;

        text-align:center;

    }

    .card-number{

        font-size:13px;

    }

    .card-type{

        font-size:11px;

        margin-top:5px;

    }

    .bingo-card th{

        padding:5px;

        font-size:13px;

    }

    .bingo-card td{

        height:38px;

        font-size:11px;

    }

}

@media(max-width:600px){

    body{

        padding:8px;

    }

    .game-info{

        gap:3px;

        padding:5px;

    }

    .game-info-label{

        font-size:8px;

    }

    .game-info-value{

        font-size:10px;

    }

    #currentNumber{

        font-size:35px;

    }

}

</style>

</head>


<body>


<div class="container">


<h1>🎱 GADAA BINGO</h1>


<!-- GAME INFO -->

<div class="game-info">

    <div class="game-info-item">

        <span class="game-info-label">
            GAME ID
        </span>

        <span
            class="game-info-value"
            id="gameIdValue">

            --

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            DERASH
        </span>

        <span
            class="game-info-value"
            id="derashValue">

            --

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            PLAYER
        </span>

        <span
            class="game-info-value"
            id="playerValue">

            0

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            STAKE
        </span>

        <span
            class="game-info-value"
            id="stakeValue">

            0 Birr

        </span>

    </div>


    <div class="game-info-item">

        <span class="game-info-label">
            CALLED
        </span>

        <span
            class="game-info-value"
            id="calledValue">

            0

        </span>

    </div>

</div>


<!-- STATUS -->

<div class="status-box">

    <div id="gameStatus">

        ⏳ WAITING FOR GAME

    </div>

    <div id="timer">

        --

    </div>

</div>


<!-- PLAY GAME -->

<div id="playGameBox">

    <button id="playGameBtn">

        🎮 PLAY GAME

    </button>


    <div id="buyChoiceBox">

        <button id="choose10Btn">

            🎫 BUY CARD 10 BIRR

        </button>


        <button id="choose20Btn">

            🎫 BUY CARD 20 BIRR

        </button>

    </div>

</div>


<!-- CURRENT NUMBER -->

<div class="current-number">

    <h3>🎱 CURRENT NUMBER</h3>

    <div id="currentNumber">

        --

    </div>

</div>


<!-- BUY CARD -->

<div class="buttons">

    <button id="buy10Btn">

        🎫 BUY 10 BIRR

    </button>


    <button id="buy20Btn">

        🎫 BUY 20 BIRR

    </button>

</div>


<div id="buyMessage"
     class="message">

</div>


<!-- CARD ID -->

<div id="cardIdPanel">

    <h3>

        🎫 SELECT CARD ID 1 - 500

    </h3>


    <div id="cardIdGrid">

    </div>

</div>


<!-- GAME -->

<div class="game-layout">


    <div class="left-side">

        <div class="called-box">

            <h3>📢 CALLED NUMBERS</h3>

            <div id="calledNumbers">

            </div>

        </div>

    </div>


    <div class="right-side">

        <div id="bingoMessage"
             class="message">

        </div>


        <div id="myCardBox">

        </div>

    </div>

</div>


</div>


<script>


// =====================================================
// TELEGRAM
// =====================================================

const tg =
    window.Telegram.WebApp;

tg.ready();

tg.expand();


// =====================================================
// USER
// =====================================================

let userId =
    null;

if(

    tg.initDataUnsafe &&

    tg.initDataUnsafe.user

){

    userId =
        tg.initDataUnsafe.user.id;

}


// =====================================================
// VARIABLES
// =====================================================

let currentGameId =
    null;

let gameState =
    null;

let myCards =
    [];

let selectedCardNumber =
    null;

let userEnteredGame =
    false;

let selectedBuyType =
    null;


// =====================================================
// ELEMENTS
// =====================================================

const gameStatus =
    document.getElementById(
        "gameStatus"
    );

const timer =
    document.getElementById(
        "timer"
    );

const currentNumber =
    document.getElementById(
        "currentNumber"
    );

const buy10Btn =
    document.getElementById(
        "buy10Btn"
    );

const buy20Btn =
    document.getElementById(
        "buy20Btn"
    );

const choose10Btn =
    document.getElementById(
        "choose10Btn"
    );

const choose20Btn =
    document.getElementById(
        "choose20Btn"
    );

const playGameBtn =
    document.getElementById(
        "playGameBtn"
    );

const buyChoiceBox =
    document.getElementById(
        "buyChoiceBox"
    );

const playGameBox =
    document.getElementById(
        "playGameBox"
    );

const cardIdPanel =
    document.getElementById(
        "cardIdPanel"
    );

const cardIdGrid =
    document.getElementById(
        "cardIdGrid"
    );

const calledNumbers =
    document.getElementById(
        "calledNumbers"
    );

const myCardBox =
    document.getElementById(
        "myCardBox"
    );

const buyMessage =
    document.getElementById(
        "buyMessage"
    );

const bingoMessage =
    document.getElementById(
        "bingoMessage"
    );

const gameIdValue =
    document.getElementById(
        "gameIdValue"
    );

const derashValue =
    document.getElementById(
        "derashValue"
    );

const playerValue =
    document.getElementById(
        "playerValue"
    );

const stakeValue =
    document.getElementById(
        "stakeValue"
    );

const calledValue =
    document.getElementById(
        "calledValue"
    );


// =====================================================
// PLAY GAME
// =====================================================

playGameBtn.onclick =
    function(){

        userEnteredGame =
            true;

        playGameBtn.style.display =
            "none";

        buyChoiceBox.style.display =
            "block";

    };


// =====================================================
// BUY CHOICE
// =====================================================

choose10Btn.onclick =
    function(){

        selectedBuyType =
            10;

        enterGame();

    };


choose20Btn.onclick =
    function(){

        selectedBuyType =
            20;

        enterGame();

    };


// =====================================================
// ENTER GAME
// =====================================================

function enterGame(){

    userEnteredGame =
        true;

    buyChoiceBox.style.display =
        "none";

    playGameBox.style.display =
        "none";

    if(

        gameState &&

        gameState.card_buying

    ){

        document

            .querySelector(".buttons")

            .style.display =
                "flex";

        cardIdPanel.style.display =
            "block";

        renderCardIds();

    }

}


// =====================================================
// MESSAGE
// =====================================================

function showMessage(

    element,

    text,

    type

){

    element.innerText =
        text;

    element.className =
        "message " + type;

    setTimeout(

        function(){

            element.innerText =
                "";

            element.className =
                "message";

        },

        5000

    );

}


// =====================================================
// LOAD GAME
// =====================================================

async function loadGameState(){

    try{

        const response =
            await fetch(
                "/api/game-state"
            );

        const data =
            await response.json();

        if(

            !data.success

        ){

            return;

        }

        updateGameUI(data);

    }

    catch(error){

        console.error(error);

    }

}


// =====================================================
// UPDATE UI
// =====================================================

function updateGameUI(data){

    const now =
        Date.now() / 1000;


    if(

        currentGameId !== null &&

        currentGameId !== data.game_id

    ){

        selectedCardNumber =
            null;

    }


    currentGameId =
        data.game_id;

    gameState =
        data;


    // GAME INFO

    gameIdValue.innerText =
        data.game_id || "--";


    const calledCount =
        Array.isArray(
            data.called_numbers
        )

        ?

        data.called_numbers.length

        :

        0;


    calledValue.innerText =
        calledCount;


    let players =
        data.player_count ||

        data.players_count ||

        (

            Array.isArray(
                data.players
            )

            ?

            data.players.length

            :

            0

        );


    let stake =
        data.total_stake ||

        data.stake ||

        0;


    playerValue.innerText =
        players;


    stakeValue.innerText =
        stake + " Birr";


    derashValue.innerText =
        data.derash ||

        data.draw ||

        "BINGO";


    // CARD BUYING

    if(

        data.card_buying

    ){

        gameStatus.innerText =
            "🟢 CARD BUYING IS OPEN";


        const remaining =
            Math.max(

                0,

                Math.ceil(

                    data.card_buying_end_time
                    - now

                )

            );


        timer.innerText =
            "⏱️ CARD BUYING: "

            + remaining

            + " SEC";


        if(

            userEnteredGame

        ){

            document

                .querySelector(".buttons")

                .style.display =
                    "flex";


            cardIdPanel.style.display =
                "block";

            renderCardIds();

        }

        else{

            document

                .querySelector(".buttons")

                .style.display =
                    "none";

            cardIdPanel.style.display =
                "none";

        }


        buy10Btn.disabled =
            false;

        buy20Btn.disabled =
            false;

    }


    // GAME STARTED

    else if(

        data.started

    ){

        gameStatus.innerText =
            "🎮 GAME IS RUNNING";


        timer.innerText =
            "🎱 NUMBERS ARE BEING CALLED";


        document

            .querySelector(".buttons")

            .style.display =
                "none";


        cardIdPanel.style.display =
            "none";


        if(

            myCards.length > 0

        ){

            myCardBox.style.display =
                "block";

        }

    }


    // WINNER

    else if(

        data.winner

    ){

        gameStatus.innerText =
            "🏆 GAME FINISHED";


        timer.innerText =
            "🏆 WINNER FOUND";


        document

            .querySelector(".buttons")

            .style.display =
                "none";


        cardIdPanel.style.display =
            "none";

    }


    // WAITING

    else{

        gameStatus.innerText =
            "⏳ WAITING FOR GAME";


        timer.innerText =
            "--";

    }


    // CURRENT NUMBER

    if(

        data.current_number !== null &&

        data.current_number !== undefined

    ){

        currentNumber.innerText =
            formatCall(
                data.current_number
            );

    }

    else{

        currentNumber.innerText =
            "--";

    }


    renderCalledNumbers(

        data.called_numbers || []

    );


    myCards.forEach(

        function(card){

            autoMarkCalledNumbers(
                card
            );

        }

    );


    renderMyCards();

}


// =====================================================
// CARD IDS
// =====================================================

function renderCardIds(){

    cardIdGrid.innerHTML =
        "";

    for(

        let i = 1;

        i <= 500;

        i++

    ){

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "card-id";

        div.innerText =
            i;


        const alreadyBought =
            myCards.some(

                function(card){

                    return Number(

                        card.card_number

                    ) === i;

                }

            );


        if(

            alreadyBought

        ){

            div.classList.add(
                "my-card"
            );

        }


        if(

            selectedCardNumber === i

        ){

            div.classList.add(
                "selected"
            );

        }


        div.onclick =
            function(){

                if(

                    alreadyBought

                ){

                    showMessage(

                        buyMessage,

                        "⚠️ CARD #"
                        + i
                        + " DURSEE BITAMEERA.",

                        "error"

                    );

                    return;

                }


                document

                    .querySelectorAll(
                        ".card-id"
                    )

                    .forEach(

                        function(item){

                            item.classList

                                .remove(
                                    "selected"
                                );

                        }

                    );


                div.classList.add(
                    "selected"
                );


                selectedCardNumber =
                    i;


                showMessage(

                    buyMessage,

                    "🎫 CARD #"
                    + i
                    + " FILATAMEERA.",

                    "success"

                );

            };


        cardIdGrid.appendChild(
            div
        );

    }

}


// =====================================================
// FORMAT NUMBER
// =====================================================

function formatCall(number){

    if(number <= 15){

        return "B-" + number;

    }

    if(number <= 30){

        return "I-" + number;

    }

    if(number <= 45){

        return "N-" + number;

    }

    if(number <= 60){

        return "G-" + number;

    }

    if(number <= 75){

        return "O-" + number;

    }

    return number;

}


// =====================================================
// CALLED NUMBERS
// =====================================================

function renderCalledNumbers(numbers){

    calledNumbers.innerHTML =
        "";

    const calledSet =
        new Set(

            numbers.map(
                Number
            )

        );


    const columns = [

        ["B",1],

        ["I",16],

        ["N",31],

        ["G",46],

        ["O",61]

    ];


    columns.forEach(

        function(column){

            const div =
                document.createElement(
                    "div"
                );

            div.className =
                "called-number header";

            div.innerText =
                column[0];

            calledNumbers.appendChild(
                div
            );

        }

    );


    for(

        let row = 0;

        row < 15;

        row++

    ){

        columns.forEach(

            function(column){

                const number =
                    column[1] + row;

                const div =
                    document.createElement(
                        "div"
                    );

                div.className =
                    "called-number";

                div.innerText =
                    number;


                if(

                    calledSet.has(
                        number
                    )

                ){

                    div.classList.add(
                        "active"
                    );

                }


                calledNumbers.appendChild(
                    div
                );

            }

        );

    }

}


// =====================================================
// BUY CARD
// =====================================================

async function buyCard(type){

    if(!userId){

        showMessage(

            buyMessage,

            "⚠️ TELEGRAM USER ID HIN ARGAMNE.",

            "error"

        );

        return;

    }


    if(!selectedCardNumber){

        showMessage(

            buyMessage,

            "⚠️ DURA CARD ID FILADHU.",

            "error"

        );

        return;

    }


    if(

        !gameState ||

        !gameState.card_buying

    ){

        showMessage(

            buyMessage,

            "⚠️ CARD BUYING XUMURAMEERA.",

            "error"

        );

        return;

    }


    buy10Btn.disabled =
        true;

    buy20Btn.disabled =
        true;


    try{

        const response =
            await fetch(

                "/api/buy-card",

                {

                    method:
                        "POST",

                    headers:{

                        "Content-Type":
                            "application/json"

                    },

                    body:

                        JSON.stringify({

                            user_id:
                                userId,

                            card_type:
                                type,

                            card_number:
                                selectedCardNumber

                        })

                }

            );


        const data =
            await response.json();


        if(

            !data.success

        ){

            showMessage(

                buyMessage,

                data.message ||

                "❌ CARD BITACHUU HIN DANDEEMNE.",

                "error"

            );

            return;

        }


        myCards.push({

            game_id:
                data.game_id,

            card_number:
                data.card_number,

            card_type:
                data.card_type,

            card:
                data.card,

            markedCells:

                [

                    "2-2"

                ]

        });


        showMessage(

            buyMessage,

            "✅ CARD #"
            + data.card_number
            + " BITAME!",

            "success"

        );


        selectedCardNumber =
            null;


        renderCardIds();

        renderMyCards();

    }


    catch(error){

        console.error(error);


        showMessage(

            buyMessage,

            "❌ SERVER ERROR.",

            "error"

        );

    }


    finally{

        if(

            gameState &&

            gameState.card_buying

        ){

            buy10Btn.disabled =
                false;

            buy20Btn.disabled =
                false;

        }

    }

}


// =====================================================
// AUTO MARK
// =====================================================

function autoMarkCalledNumbers(userCard){

    if(

        !userCard ||

        !Array.isArray(
            userCard.card
        )

    ){

        return;

    }


    if(

        !Array.isArray(
            userCard.markedCells
        )

    ){

        userCard.markedCells =
            [];

    }


    if(

        !userCard.markedCells.includes(
            "2-2"
        )

    ){

        userCard.markedCells.push(
            "2-2"
        );

    }


    if(

        !gameState ||

        !Array.isArray(
            gameState.called_numbers
        )

    ){

        return;

    }


    const called =
        new Set(

            gameState.called_numbers.map(
                Number
            )

        );


    for(

        let row = 0;

        row < 5;

        row++

    ){

        for(

            let col = 0;

        col < 5;

        col++

        ){

            const value =
                userCard.card[row][col];


            if(

                value === "FREE"

            ){

                continue;

            }


            if(

                called.has(
                    Number(value)
                )

            ){

                const key =
                    row + "-" + col;


                if(

                    !userCard.markedCells.includes(
                        key
                    )

                ){

                    userCard.markedCells.push(
                        key
                    );

                }

            }

        }

    }

}


// =====================================================
// RENDER MY CARD
// =====================================================

function renderMyCards(){

    if(

        myCards.length === 0

    ){

        myCardBox.style.display =
            "none";

        return;

    }


    myCardBox.style.display =
        "block";

    myCardBox.innerHTML =
        "";


    myCards.forEach(

        function(userCard){

            autoMarkCalledNumbers(
                userCard
            );


            const panel =
                document.createElement(
                    "div"
                );


            panel.className =
                "user-card-panel";


            panel.innerHTML = `

                <div class="card-header">

                    <div class="card-number">

                        🎫 CARD #

                        ${userCard.card_number}

                    </div>


                    <div class="card-type">

                        ${userCard.card_type}

                        BIRR

                    </div>

                </div>


                <table class="bingo-card">

                    <thead>

                        <tr>

                            <th>B</th>

                            <th>I</th>

                            <th>N</th>

                            <th>G</th>

                            <th>O</th>

                        </tr>

                    </thead>

                    <tbody></tbody>

                </table>


                <button class="btn-bingo">

                    🏆 BINGO CARD #

                    ${userCard.card_number}

                </button>

            `;


            const tbody =
                panel.querySelector(
                    "tbody"
                );


            for(

                let row = 0;

                row < 5;

                row++

            ){

                const tr =
                    document.createElement(
                        "tr"
                    );


                for(

                    let col = 0;

                    col < 5;

                    col++

                ){

                    const td =
                        document.createElement(
                            "td"
                        );


                    const value =
                        userCard.card[row][col];


                    td.innerText =
                        value;


                    const key =
                        row + "-" + col;


                    if(

                        value === "FREE"

                    ){

                        td.classList.add(
                            "free"
                        );

                        td.classList.add(
                            "marked"
                        );

                    }


                    if(

                        userCard.markedCells.includes(
                            key
                        )

                    ){

                        td.classList.add(
                            "marked"
                        );

                    }


                    tr.appendChild(
                        td
                    );

                }


                tbody.appendChild(
                    tr
                );

            }


            panel

                .querySelector(
                    ".btn-bingo"
                )

                .onclick =

                function(){

                    claimBingo(
                        userCard,
                        panel
                    );

                };


            myCardBox.appendChild(
                panel
            );

        }

    );

}


// =====================================================
// CHECK BINGO
// =====================================================

function checkLocalBingo(card){

    const marked =
        card.markedCells || [];


    function m(r,c){

        return marked.includes(
            r + "-" + c
        );

    }


    for(

        let r = 0;

        r < 5;

        r++

    ){

        if(

            [0,1,2,3,4]

                .every(

                    c => m(r,c)

                )

        ){

            return true;

        }

    }


    for(

        let c = 0;

        c < 5;

        c++

    ){

        if(

            [0,1,2,3,4]

                .every(

                    r => m(r,c)

                )

        ){

            return true;

        }

    }


    if(

        [0,1,2,3,4]

            .every(

                i => m(i,i)

            )

    ){

        return true;

    }


    if(

        [0,1,2,3,4]

            .every(

                i => m(i,4-i)

            )

    ){

        return true;

    }


    return (

        m(0,0) &&

        m(0,4) &&

        m(4,0) &&

        m(4,4)

    );

}


// =====================================================
// CLAIM BINGO
// =====================================================

async function claimBingo(

    userCard,

    panel

){

    if(

        !checkLocalBingo(
            userCard
        )

    ){

        showMessage(

            bingoMessage,

            "⚠️ BINGO HIN GUUTAMNE.",

            "error"

        );

        return;

    }


    try{

        const response =
            await fetch(

                "/api/check-bingo",

                {

                    method:
                        "POST",

                    headers:{

                        "Content-Type":
                            "application/json"

                    },

                    body:

                        JSON.stringify({

                            user_id:
                                userId,

                            card_number:
                                userCard.card_number,

                            card_type:
                                userCard.card_type

                        })

                }

            );


        const data =
            await response.json();


        if(

            data.success

        ){

            showMessage(

                panel,

                "🏆 BINGO! PRIZE: "

                + data.prize

                + " BIRR",

                "success"

            );

        }

        else{

            showMessage(

                bingoMessage,

                data.message ||

                "BINGO HIN MIRKANOOfNE.",

                "error"

            );

        }

    }

    catch(error){

        showMessage(

            bingoMessage,

            "❌ SERVER ERROR.",

            "error"

        );

    }

}
