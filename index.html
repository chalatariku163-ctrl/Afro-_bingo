<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gadaa Bingo</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e9e9e9;
    color: #222;
}

/* =========================
   TOP BAR
========================= */

.top-bar {
    background: #202b39;
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.info-box {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.info {
    background: #364657;
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    text-align: center;
}

.info b {
    display: block;
    color: #ffd000;
    font-size: 15px;
}

/* =========================
   MAIN
========================= */

.main {
    display: grid;
    grid-template-columns: 260px 1fr 420px;
    gap: 10px;
    padding: 10px;
}

/* =========================
   LEFT NUMBER BOARD
========================= */

.left-panel {
    background: white;
    border-radius: 8px;
    padding: 8px;
}

.bingo-title {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 6px;
}

.bingo-title div {
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    padding: 8px 0;
    border-radius: 5px;
}

.b {
    background: #e99b00;
}

.i {
    background: #159447;
}

.n {
    background: #3264d9;
}

.g {
    background: #e03333;
}

.o {
    background: #9a39a8;
}

.number-board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
}

.number {
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eeeeee;
    border-radius: 5px;
    font-weight: bold;
    font-size: 15px;
}

.number.called {
    background: #28a745;
    color: white;
    box-shadow: 0 0 0 2px #146c2e inset;
}

/* =========================
   CENTER
========================= */

.center-panel {
    text-align: center;
    background: white;
    border-radius: 8px;
    padding: 15px;
}

.current-title {
    background: #6334a5;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 20px;
    font-weight: bold;
}

.current-call {
    margin: 20px auto;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: #3468d4;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 42px;
    font-weight: bold;
}

.status {
    font-size: 17px;
    font-weight: bold;
    margin: 15px;
}

#callBtn {
    display: none;
    background: #f0a000;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px 20px;
    font-size: 16px;
    font-weight: bold;
}

#message {
    min-height: 35px;
    font-weight: bold;
    font-size: 17px;
}

/* =========================
   RIGHT CARD
========================= */

.right-panel {
    background: white;
    border-radius: 8px;
    padding: 12px;
}

.card-title {
    text-align: center;
    font-size: 21px;
    font-weight: bold;
    margin-bottom: 10px;
}

.card-number {
    text-align: center;
    font-weight: bold;
    margin-bottom: 8px;
}

.bingo-card {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
}

.card-cell {
    min-height: 65px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eeeeee;
    border: 2px solid #555;
    border-radius: 7px;
    font-size: 20px;
    font-weight: bold;
}

.card-header {
    background: #202b39;
    color: white;
}

.card-cell.marked {
    background: #27a844;
    color: white;
}

.card-cell.free {
    background: #f5c400;
    color: black;
}

#bingoBtn {
    display: block;
    margin: 15px auto 5px;
    background: #6334a5;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px 28px;
    font-size: 18px;
    font-weight: bold;
}

/* =========================
   MOBILE
========================= */

@media (max-width: 1000px) {

    .main {
        grid-template-columns: 1fr;
    }

    .left-panel,
    .center-panel,
    .right-panel {
        width: 100%;
    }

    .current-call {
        width: 130px;
        height: 130px;
        font-size: 34px;
    }

}

</style>
</head>

<body>

<!-- =========================
     TOP
========================= -->

<div class="top-bar">

    <div class="logo">
        🎯 GADAA BINGO
    </div>

    <div class="info-box">

        <div class="info">
            GAME ID
            <b id="gameId">---</b>
        </div>

        <div class="info">
            PLAYERS
            <b id="players">0</b>
        </div>

        <div class="info">
            STAKE
            <b id="stake">10</b>
        </div>

        <div class="info">
            CALLED
            <b id="calledCount">0</b>
        </div>

    </div>

</div>


<!-- =========================
     MAIN
========================= -->

<div class="main">

    <!-- LEFT NUMBER BOARD -->

    <div class="left-panel">

        <div class="bingo-title">

            <div class="b">B</div>
            <div class="i">I</div>
            <div class="n">N</div>
            <div class="g">G</div>
            <div class="o">O</div>

        </div>

        <div
            id="numberBoard"
            class="number-board">
        </div>

    </div>


    <!-- CENTER -->

    <div class="center-panel">

        <div class="current-title">
            CURRENT CALL
        </div>

        <div
            id="currentCall"
            class="current-call">
            -
        </div>

        <div
            id="status"
            class="status">
            Game loading...
        </div>

        <button
            id="callBtn"
            onclick="callNumber()">

            📢 CALL NUMBER

        </button>

        <div
            id="message">
        </div>

    </div>


    <!-- RIGHT CARD -->

    <div class="right-panel">

        <div class="card-title">
            🎫 YOUR BINGO CARD
        </div>

        <div
            id="cardNumber"
            class="card-number">

            Card: Loading...

        </div>

        <div
            id="bingoCard"
            class="bingo-card">
        </div>

        <button
            id="bingoBtn"
            onclick="checkBingo()">

            🏆 BINGO!

        </button>

    </div>

</div>


<script>

/* =========================
   TELEGRAM
========================= */

let tg = null;

if (
    window.Telegram &&
    window.Telegram.WebApp
) {

    tg = window.Telegram.WebApp;

    tg.ready();

    tg.expand();

}


/* =========================
   VARIABLES
========================= */

let playerId = null;

let calledNumbers = [];

let gameStarted = false;

let playerCardNumber = null;

let cardNumbers = [];

let pollingTimer = null;

const ADMIN_ID = "6376605934";


/* =========================
   USER ID
========================= */

function getUserId() {

    if (
        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user
    ) {

        return String(
            tg.initDataUnsafe.user.id
        );

    }

    return null;

}


/* =========================
   ADMIN
========================= */

function isAdmin() {

    return playerId === ADMIN_ID;

}


/* =========================
   CREATE 1-75 BOARD
========================= */

function createNumberBoard() {

    const board =
        document.getElementById(
            "numberBoard"
        );

    board.innerHTML = "";

    for (
        let number = 1;
        number <= 75;
        number++
    ) {

        const box =
            document.createElement(
                "div"
            );

        box.className = "number";

        box.id =
            "number-" + number;

        box.innerText =
            number;

        board.appendChild(box);

    }

}


/* =========================
   BINGO LETTER
========================= */

function getLetter(number) {

    if (number <= 15) return "B";

    if (number <= 30) return "I";

    if (number <= 45) return "N";

    if (number <= 60) return "G";

    return "O";

}


/* =========================
   LOAD GAME
========================= */

async function loadGameState() {

    try {

        const response =
            await fetch(
                "/api/game",
                {
                    cache: "no-store"
                }
            );

        const data =
            await response.json();

        calledNumbers =
            data.called_numbers || [];

        gameStarted =
            Boolean(
                data.started
            );

        updateNumberBoard();

        updateCardMarks();

        document.getElementById(
            "calledCount"
        ).innerText =
            calledNumbers.length;

        if (
            data.current_number
        ) {

            document.getElementById(
                "currentCall"
            ).innerText =

                getLetter(
                    data.current_number
                )
                + "-"
                +
                data.current_number;

        }

        else {

            document.getElementById(
                "currentCall"
            ).innerText =
                "-";

        }

        if (gameStarted) {

            document.getElementById(
                "status"
            ).innerText =
                "🎮 GAME STARTED";

        }

        else {

            document.getElementById(
                "status"
            ).innerText =
                "⏳ WAITING FOR GAME";

        }

    }

    catch (error) {

        console.log(
            "GAME ERROR:",
            error
        );

        document.getElementById(
            "status"
        ).innerText =
            "Server connection error.";

    }

}


/* =========================
   UPDATE NUMBER BOARD
========================= */

function updateNumberBoard() {

    for (
        let number = 1;
        number <= 75;
        number++
    ) {

        const box =
            document.getElementById(
                "number-" + number
            );

        if (!box) continue;

        if (
            calledNumbers.includes(
                number
            )
        ) {

            box.classList.add(
                "called"
            );

        }

        else {

            box.classList.remove(
                "called"
            );

        }

    }

}


/* =========================
   CARD GENERATOR
========================= */

function generateCard() {

    if (
        playerCardNumber === null
    ) {

        return;

    }

    const card =
        document.getElementById(
            "bingoCard"
        );

    card.innerHTML = "";

    cardNumbers = [];

    const headers = [
        "B",
        "I",
        "N",
        "G",
        "O"
    ];

    headers.forEach(

        letter => {

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell card-header";

            cell.innerText =
                letter;

            card.appendChild(
                cell
            );

        }

    );


    let seed =
        Number(
            playerCardNumber
        );


    function seededRandom(
        minimum,
        maximum
    ) {

        seed =
            (
                seed * 9301
                + 49297
            )
            % 233280;

        const randomValue =
            seed / 233280;

        return Math.floor(

            minimum
            +
            randomValue
            *
            (
                maximum
                -
                minimum
                +
                1
            )

        );

    }


    function generateColumn(
        minimum,
        maximum
    ) {

        const numbers = [];

        while (
            numbers.length < 5
        ) {

            const number =
                seededRandom(
                    minimum,
                    maximum
                );

            if (
                !numbers.includes(
                    number
                )
            ) {

                numbers.push(
                    number
                );

            }

        }

        return numbers;

    }


    const columns = [

        generateColumn(1, 15),

        generateColumn(16, 30),

        generateColumn(31, 45),

        generateColumn(46, 60),

        generateColumn(61, 75)

    ];


    for (
        let row = 0;
        row < 5;
        row++
    ) {

        for (
            let col = 0;
            col < 5;
            col++
        ) {

            const cell =
                document.createElement(
                    "div"
                );

            cell.className =
                "card-cell";


            if (
                row === 2 &&
                col === 2
            ) {

                cell.innerText =
                    "FREE";

                cell.classList.add(
                    "marked"
                );

                cell.classList.add(
                    "free"
                );

                cardNumbers.push(
                    "FREE"
                );

            }

            else {

                const number =
                    columns[col][row];

                cell.innerText =
                    number;

                cardNumbers.push(
                    number
                );

            }

            card.appendChild(
                cell
            );

        }

    }

    updateCardMarks();

}


/* =========================
   CARD MARKING
========================= */

function updateCardMarks() {

    const cells =
        document.querySelectorAll(
            ".bingo-card .card-cell"
        );

    if (
        cells.length < 30
    ) {

        return;

    }

    for (
        let i = 0;
        i < cardNumbers.length;
        i++
    ) {

        const value =
            cardNumbers[i];

        const cell =
            cells[i + 5];

        if (
            value === "FREE"
        ) {

            continue;

        }

        if (
            calledNumbers.includes(
                Number(value)
            )
        ) {

            cell.classList.add(
                "marked"
            );

        }

        else {

            cell.classList.remove(
                "marked"
            );

        }

    }

}


/* =========================
   CALL NUMBER
========================= */

async function callNumber() {

    if (!isAdmin()) {

        document.getElementById(
            "message"
        ).innerText =
            "⛔ Admin only.";

        return;

    }

    try {

        const response =
            await fetch(
                "/api/call",
                {
                    method: "POST"
                }
            );

        const data =
            await response.json();

        if (!response.ok) {

            document.getElementById(
                "message"
            ).innerText =
                data.error ||
                "Cannot call number.";

            return;

        }

        calledNumbers =
            data.called_numbers;

        document.getElementById(
            "currentCall"
        ).innerText =

            getLetter(
                data.number
            )
            + "-"
            +
            data.number;

        updateNumberBoard();

        updateCardMarks();

        document.getElementById(
            "calledCount"
        ).innerText =
            calledNumbers.length;

        document.getElementById(
            "message"
        ).innerText =
            "📢 "
            +
            getLetter(
                data.number
            )
            + "-"
            +
            data.number
            +
            " called.";

    }

    catch (error) {

        document.getElementById(
            "message"
        ).innerText =
            "Server error.";

    }

}


/* =========================
   CHECK BINGO
========================= */

function checkBingo() {

    if (!gameStarted) {

        document.getElementById(
            "message"
        ).innerText =
            "⏳ Game has not started.";

        return;

    }

    if (
        cardNumbers.length !== 25
    ) {

        document.getElementById(
            "message"
        ).innerText =
            "🎫 Card not loaded.";

        return;

    }


    const marked = [];

    for (
        let i = 0;
        i < cardNumbers.length;
        i++
    ) {

        if (
            cardNumbers[i] === "FREE"
        ) {

            marked.push(
                true
            );

        }

        else {

            marked.push(

                calledNumbers.includes(

                    Number(
                        cardNumbers[i]
                    )

                )

            );

        }

    }


    let bingo = false;


    /* HORIZONTAL */

    for (
        let row = 0;
        row < 5;
        row++
    ) {

        if (

            marked
            .slice(
                row * 5,
                row * 5 + 5
            )
            .every(
                Boolean
            )

        ) {

            bingo = true;

        }

    }


    /* VERTICAL */

    for (
        let col = 0;
        col < 5;
        col++
    ) {

        let complete = true;

        for (
            let row = 0;
            row < 5;
            row++
        ) {

            if (
                !marked[
                    row * 5 + col
                ]
            ) {

                complete = false;

            }

        }

        if (complete) {

            bingo = true;

        }

    }


    /* DIAGONAL 1 */

    if (

        [0, 6, 12, 18, 24]
        .every(
            index =>
            marked[index]
        )

    ) {

        bingo = true;

    }


    /* DIAGONAL 2 */

    if (

        [4, 8, 12, 16, 20]
        .every(
            index =>
            marked[index]
        )

    ) {

        bingo = true;

    }


    if (bingo) {

        document.getElementById(
            "message"
        ).innerText =
            "🏆 BINGO!";

        if (tg) {

            tg.showAlert(
                "🏆 BINGO!"
            );

        }

    }

    else {

        document.getElementById(
            "message"
        ).innerText =
            "❌ Bingo is not complete.";

    }

}


/* =========================
   START
========================= */

async function startGame() {

    createNumberBoard();

    playerId =
        getUserId();


    if (isAdmin()) {

        document.getElementById(
            "callBtn"
        ).style.display =
            "inline-block";

    }


    /*
       CARD NUMBER
       Yeroo ammaa:
       Admin card number isaa
       URL keessa yoo jiraate
       fakkeenya:
       ?card=25
    */

    const params =
        new URLSearchParams(
            window.location.search
        );

    const card =
        params.get(
            "card"
        );

    if (card) {

        playerCardNumber =
            Number(card);

        document.getElementById(
            "cardNumber"
        ).innerText =
            "🎫 Card: "
            +
            playerCardNumber;

        generateCard();

    }

    else {

        document.getElementById(
            "cardNumber"
        ).innerText =
            "🎫 Card: Not selected";

    }


    await loadGameState();


    if (pollingTimer) {

        clearInterval(
            pollingTimer
        );

    }

    pollingTimer =
        setInterval(
            loadGameState,
            2000
        );

}


window.addEventListener(
    "load",
    startGame
);

</script>

</body>
</html>
