}

.called-area,
.card-area{

    0 0 7px
    rgba(255,0,0,.8);

}

.called-cell.current{

    background:#ffd700;

    color:#111;

    box-shadow:
    0 0 10px
    #ffd700;

    display:grid;

    grid-template-columns:
    repeat(5,1fr);

    gap:3px;

}

.card-cell{

    aspect-ratio:1;

    display:flex;

    justify-content:center;

    align-items:center;

    background:#f5f5f5;

    border-radius:4px;

    font-size:12px;

    font-weight:bold;

}

.card-cell.called{

    background:#00c853;

    color:white;

    box-shadow:
    0 0 7px
    #00ff88;

}

.card-cell.free{

    background:#ffd700;

    color:#111;

}

.card-title{

    text-align:center;

    color:#ffd700;

}

.control-row{

    display:flex;

    gap:6px;

    margin-top:10px;

}

.control-btn{

    flex:1;

    background:#455a64;

    color:white;

    font-size:12px;

    padding:9px 5px;

}

.control-btn.active{

    background:#00c853;

}

.bingo-btn{

    width:100%;

    background:#ffd700;

    color:#111;

    font-size:18px;

}

.bingo-btn:disabled{

    opacity:.5;

    cursor:not-allowed;

}

.bottom-row{

    display:flex;

    gap:6px;

}

.bottom-btn{

}

.message{

    text-align:center;

    margin-top:10px;

    padding:9px;

    border-radius:8px;

    background:
    rgba(0,0,0,.3);

}

.success{

    color:#00ff88;

}

    color:#ff5252;

}

}

@media(max-width:500px){

    .container{

    }

    }

    }

        font-size:11px;

    }

    }

    .called-area,

    }

    }

    }

    }

    .current-call{

    }

    .call-history span{

        font-size:9px;

        padding:3px 5px;

    }

    button{

        font-size:12px;

        padding:9px 5px;

    }

}

</button></div><div id="message" class="message"></div></div></div><script>

const tg =
window.Telegram.WebApp;

tg.ready();

tg.expand();

const API_BASE =
window.location.origin;

let selectedCard = null;

let selectedCardType = null;

let currentGameId = 0;

let calledNumbers = [];

let gameStarted = false;

let cardBuying = false;

let cardBuyingEndTime = 0;

let cardData = [];

let lastCurrentNumber = null;

let soundEnabled = true;

let autoEnabled = true;

let lastCalledCount = 0;

function getUserId(){

    if(

        tg &&
        tg.initDataUnsafe &&
        tg.initDataUnsafe.user

    ){

        return String(

            tg.initDataUnsafe.user.id

        );

    }

    return localStorage.getItem(

        "user_id"

    );

}

function showMessage(

    text,

    type="info"

){

    const message =

        document.getElementById(

            "message"

        );

    message.innerHTML = text;

    message.className =

        "message " + type;

}

function getLetter(number){

    if(number >= 1 && number <= 15)

        return "B";

    if(number >= 16 && number <= 30)

        return "I";

    if(number >= 31 && number <= 45)

        return "N";

    if(number >= 46 && number <= 60)

        return "G";

    if(number >= 61 && number <= 75)

        return "O";

    return "";

}

function getCallName(number){

    return getLetter(number) + "-" + number;

}

function updateGameInfo(data){

    document.getElementById(

        "gameId"

    ).innerText =

        data.game_id || "-";

    document.getElementById(

        "prize"

    ).innerText =

        (data.prize || 0) + " Birr";

    document.getElementById(

        "stake"

    ).innerText =

        selectedCardType ?

        selectedCardType + " Birr" :

        "-";

    document.getElementById(

        "calledCount"

    ).innerText =

        calledNumbers.length;

}

async function loadGameState(){

    try{

        const response =

            await fetch(

                API_BASE +

                "/api/game-state"

            );

        const data =

            await response.json();

        if(!data.success){

            showMessage(

                "Game state error.",

                "error"

            );

            return;

        }

        const oldCalledNumbers =

            [...calledNumbers];

        currentGameId =

            data.game_id;

        calledNumbers =

            data.called_numbers || [];

        gameStarted =

            data.started;

        cardBuying =

            data.card_buying;

        cardBuyingEndTime =

            data.card_buying_end_time || 0;

        updateStatus(data);

        updateGameInfo(data);

        updateCardBuyingUI();

        updateCalledBoard(

            data.current_number

        );

        updateCurrentCall(

            data.current_number

        );

        if(

            calledNumbers.length >

            oldCalledNumbers.length

        ){

            if(soundEnabled){

                playSound();

            }

            if(navigator.vibrate){

                navigator.vibrate(200);

            }

        }

        if(

            selectedCard &&

            selectedCardType

        ){

            document.getElementById(

                "gameArea"

            ).style.display =

                "block";

            renderCard();

            document.getElementById(

                "bingoButton"

            ).disabled =

                !gameStarted;

        }

        lastCalledCount =

            calledNumbers.length;

    }

    catch(error){

        console.error(error);

        showMessage(

            "❌ Server waliin qunnamtiin hin jiru.",

            "error"

        );

    }

}

function updateStatus(data){

    const status =

        document.getElementById(

            "status"

        );

    const timer =

        document.getElementById(

            "timer"

        );

    if(data.winner){

        status.innerHTML =

            "🏆 WINNER FOUND";

        timer.innerHTML =

            "Game xumurame.";

        return;

    }

    if(data.card_buying){

        status.innerHTML =

            "🎫 CARD BUYING OPEN";

        const remaining =

            Math.max(

                0,

                Math.ceil(

                    data.card_buying_end_time -

                    Date.now() / 1000

                )

            );

        timer.innerHTML =

            "⏳ Card bitachuuf: " +

            remaining +

            " seconds";

        return;

    }

    if(data.started){

        status.innerHTML =

            "🎮 GAME IS RUNNING";

        timer.innerHTML =

            "📢 Number waamamaa jira";

        return;

    }

    status.innerHTML =

        "⏸ WAITING FOR NEXT GAME";

    timer.innerHTML =

        "Game itti aanu eegi.";

}

function updateCardBuyingUI(){

    const box =

        document.getElementById(

            "cardBuyingBox"

        );

    const buy10 =

        document.getElementById(

            "buy10Button"

        );

    const buy20 =

        document.getElementById(

            "buy20Button"

        );

    const buyTimer =

        document.getElementById(

            "buyTimer"

        );

    if(cardBuying){

        box.style.display =

            "block";

        const remaining =

            Math.max(

                0,

                Math.ceil(

                    cardBuyingEndTime -

                    Date.now() / 1000

                )

            );

        buyTimer.innerHTML =

            "⏳ Yeroo hafe: " +

            remaining +

            " seconds";

        buy10.disabled = false;

        buy20.disabled = false;

    }

    else{

        box.style.display =

            "none";

        buy10.disabled = true;

        buy20.disabled = true;

    }

}

async function buyCard(cardType){

    const userId =

        getUserId();

    if(!userId){

        showMessage(

            "⚠️ Telegram keessatti qofa bani.",

            "error"

        );

        return;

    }

    if(!cardBuying){

        showMessage(

            "⏳ Yeroon card bitachuu xumurame.",

            "error"

        );

        return;

    }

    document.getElementById(

        "buy10Button"

    ).disabled = true;

    document.getElementById(

        "buy20Button"

    ).disabled = true;

    showMessage(

        "⏳ Card siif bitamaa jira...",

        "warning"

    );

    try{

        const response =

            await fetch(

                API_BASE +

                "/api/buy-card",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":

                        "application/json"

                    },

                    body:

                    JSON.stringify({

                        user_id:userId,

                        card_type:cardType

                    })

                }

            );

        const data =

            await response.json();

        if(!data.success){

            showMessage(

                "❌ " +

                (

                    data.message ||

                    "Card bituun hin milkoofne."

                ),

                "error"

            );

            document.getElementById(

                "buy10Button"

            ).disabled = false;

            document.getElementById(

                "buy20Button"

            ).disabled = false;

            return;

        }

        selectedCard =

            data.card_number;

        selectedCardType =

            data.card_type;

        cardData =

            data.card || [];

        localStorage.setItem(

            "selected_card",

            selectedCard

        );

        localStorage.setItem(

            "selected_card_type",

            selectedCardType

        );

        document.getElementById(

            "gameArea"

        ).style.display =

            "block";

        document.getElementById(

            "cardTitle"

        ).innerHTML =

            "🎫 CARD " +

            selectedCard +

            " — " +

            selectedCardType +

            " BIRR";

        renderCard();

        showMessage(

            "✅ Card " +

            selectedCard +

            " bitatte.",

            "success"

        );

        await loadGameState();

    }

    catch(error){

        console.error(error);

        showMessage(

            "❌ Server error.",

            "error"

        );

        document.getElementById(

            "buy10Button"

        ).disabled = false;

        document.getElementById(

            "buy20Button"

        ).disabled = false;

    }

}

function generateCard(){

    if(!selectedCard){

        return;

    }

    let seed =

        parseInt(selectedCard);

    function seededRandom(

        min,

        max

    ){

        seed =

            (

                seed *

                9301 +

                49297

            ) % 233280;

        const rnd =

            seed / 233280;

        return Math.floor(

            min +

            rnd *

            (

                max -

                min +

                1

            )

        );

    }

    function generateColumn(

        min,

        max

    ){

        const numbers = [];

        while(

            numbers.length < 5

        ){

            const number =

                seededRandom(

                    min,

                    max

                );

            if(

                !numbers.includes(

                    number

                )

            ){

                numbers.push(

                    number

                );

            }

        }

        return numbers;

    }

    const columns = [

        generateColumn(1,15),

        generateColumn(16,30),

        generateColumn(31,45),

        generateColumn(46,60),

        generateColumn(61,75)

    ];

    cardData = [];

    for(

        let row = 0;

        row < 5;

        row++

    ){

        const rowData = [];

        for(

            let col = 0;

            col < 5;

            col++

        ){

            if(

                row === 2 &&

                col === 2

            ){

                rowData.push(

                    "FREE"

                );

            }

            else{

                rowData.push(

                    columns[col][row]

                );

            }

        }

        cardData.push(

            rowData

        );

    }

}

function renderCard(){

    const container =

        document.getElementById(

            "bingoCard"

        );

    container.innerHTML = "";

    if(!cardData.length){

        return;

    }

    cardData.forEach(

        row => {

            row.forEach(

                value => {

                    const cell =

                        document.createElement(

                            "div"

                        );

                    cell.className =

                        "card-cell";

                    cell.innerText =

                        value;

                    if(

                        value === "FREE"

                    ){

                        cell.classList.add(

                            "free"

                        );

                    }

                    else if(

                        calledNumbers.includes(

                            value

                        )

                    ){

                        cell.classList.add(

                            "called"

                        );

                    }

                    container.appendChild(

                        cell

                    );

                }

            );

        }

    );

}

function updateCurrentCall(number){

    const currentCall =

        document.getElementById(

            "currentCall"

        );

    if(

        number === null ||

        number === undefined

    ){

        currentCall.innerText =

            "-";

        return;

    }

    currentCall.innerText =

        getCallName(number);

    if(

        number !==

        lastCurrentNumber

    ){

        lastCurrentNumber =

            number;

    }

}

function updateCalledBoard(

    currentNumber

){

    const board =

        document.getElementById(

            "calledBoard"

        );

    board.innerHTML = "";

    const letters = [

        "B",

        "I",

        "N",

        "G",

        "O"

    ];

    letters.forEach(

        letter => {

            const cell =

                document.createElement(

                    "div"

                );

            cell.className =

                "called-cell header-cell";

            cell.innerText =

                letter;

            board.appendChild(

                cell

            );

        }

    );

    for(

        let row = 0;

        row < 15;

        row++

    ){

        for(

            let col = 0;

            col < 5;

            col++

        ){

            const number =

                row +

                1 +

                col *

                15;

            const cell =

                document.createElement(

                    "div"

                );

            cell.className =

                "called-cell";

            cell.innerText =

                number;

            if(

                calledNumbers.includes(

                    number

                )

            ){

                cell.classList.add(

                    "called"

                );

            }

            if(

                number ===

                currentNumber

            ){

                cell.classList.add(

                    "current"

                );

            }

            board.appendChild(

                cell

            );

        }

    }

    updateCallHistory();

    renderCard();

}

function updateCallHistory(){

    const history =

        document.getElementById(

            "callHistory"

        );

    history.innerHTML = "";

    calledNumbers

    .slice()

    .reverse()

    .slice(0,8)

    .forEach(

        number => {

            const item =

                document.createElement(

                    "span"

                );

            item.innerText =

                getCallName(number);

            history.appendChild(

                item

            );

        }

    );

}

function toggleSound(){

    soundEnabled =

        !soundEnabled;

    const button =

        document.getElementById(

            "soundButton"

        );

    button.innerText =

        soundEnabled ?

        "🔊 SOUND: ON" :

        "🔇 SOUND: OFF";

}

function toggleAuto(){

    autoEnabled =

        !autoEnabled;

    const button =

        document.getElementById(

            "autoButton"

        );

    button.innerText =

        autoEnabled ?

        "⚙ AUTO: ON" :

        "⚙ AUTO: OFF";

}

function playSound(){

    try{

        const audioContext =

            new (

                window.AudioContext ||

                window.webkitAudioContext

            )();

        const oscillator =

            audioContext.createOscillator();

        const gainNode =

            audioContext.createGain();

        oscillator.connect(

            gainNode

        );

        gainNode.connect(

            audioContext.destination

        );

        oscillator.frequency.value =

            700;

        gainNode.gain.value =

            .08;

        oscillator.start();

        oscillator.stop(

            audioContext.currentTime +

            .15

        );

    }

    catch(error){

        console.log(

            "Sound unavailable"

        );

    }

}

async function claimBingo(){

    if(!selectedCard){

        showMessage(

            "Card hin filatam.",

            "error"

        );

        return;

    }

    const userId =

        getUserId();

    if(!userId){

        showMessage(

            "Telegram user ID hin argamne.",

            "error"

        );

        return;

    }

    const button =

        document.getElementById(

            "bingoButton"

        );

    button.disabled = true;

    showMessage(

        "⏳ Bingo mirkaneessaa jira...",

        "warning"

    );

    try{

        const response =

            await fetch(

                API_BASE +

                "/api/check-bingo",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":

                        "application/json"

                    },

                    body:

                    JSON.stringify({

                        user_id:userId,

                        card_number:selectedCard,

                        card_type:selectedCardType

                    })

                }

            );

        const data =

            await response.json();

        if(data.success){

            showMessage(

                "🏆 BINGO! ATI MO'ATTE!<br>" +

                "💰 Prize: " +

                data.prize +

                " Birr",

                "success"

            );

            if(

                tg.showPopup

            ){

                tg.showPopup({

                    title:"🏆 BINGO!",

                    message:

                    "Ati mo'atte! Prize: " +

                    data.prize +

                    " Birr",

                    buttons:[

                        {

                            type:"ok"

                        }

                    ]

                });

            }

            return;

        }

        showMessage(

            "❌ " +

            (

                data.message ||

                "Bingo hin guunne."

            ),

            "error"

        );

        button.disabled = false;

    }

    catch(error){

        console.error(error);

        showMessage(

            "❌ Server error.",

            "error"

        );

        button.disabled = false;

    }

}

function leaveGame(){

    document.getElementById(

        "gameArea"

    ).style.display =

        "none";

    showMessage(

        "Game keessaa baate.",

        "warning"

    );

}

window.addEventListener(

    "load",

    () => {

        const savedCard =

            localStorage.getItem(

                "selected_card"

            );

        const savedCardType =

            localStorage.getItem(

                "selected_card_type"

            );

        if(savedCard){

            selectedCard =

                parseInt(

                    savedCard

                );

            selectedCardType =

                savedCardType ||

                "10";

            generateCard();

            document.getElementById(

                "gameArea"

            ).style.display =

                "block";

        }

        loadGameState();

    }

);

setInterval(

    loadGameState,

    1000

);

</script></body></html>
