<!DOCTYPE html><html lang="en">  <head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Afro Bingo</title><style>  
* {  
    box-sizing: border-box;  
}  body {
margin: 0;
font-family: Arial, sans-serif;
background: #bba4cf;
text-align: center;
color: #222;
}

.top {
background: #202b39;
color: white;
padding: 12px;
}

h1 {
margin: 5px;
}

button {
padding: 11px 15px;
margin: 4px;
border: none;
border-radius: 8px;
font-size: 15px;
font-weight: bold;
cursor: pointer;
}

button:hover {
opacity: 0.85;
}

#startBtn {
background: #00a651;
color: white;
}

#callBtn {
background: #f5a000;
color: white;
}

#resetBtn {
background: #d32f2f;
color: white;
}

.main {
display: grid;
grid-template-columns: 270px 260px 1fr;
gap: 10px;
padding: 10px;
align-items: start;
}

/* CALLED BOARD */

.called-board {
padding: 5px;
}

.letters {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 5px;
margin-bottom: 6px;
}

.letters div {
padding: 9px 0;
color: white;
font-size: 20px;
font-weight: bold;
border-radius: 7px;
}

.b { background: #f5a000; }
.i { background: green; }
.n { background: blue; }
.g { background: red; }
.o { background: purple; }

.number-board {
display: flex;
flex-direction: column;
gap: 5px;
}

.number-row {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 5px;
}

.number-row span {
height: 45px;
display: flex;
align-items: center;
justify-content: center;
background: #c2c4df;
border: 2px solid #eeeeee;
border-radius: 10px;
color: white;
font-size: 17px;
font-weight: bold;
}

.number-row span.active {
background: green;
}

/* CURRENT CALL */

.current-area {
text-align: center;
}

.current-title {
background: purple;
color: white;
border-radius: 35px;
padding: 20px 10px;
font-size: 25px;
font-weight: bold;
margin-bottom: 20px;
}

.current-number {
display: inline-flex;
width: 110px;
height: 110px;
align-items: center;
justify-content: center;
background: blue;
color: white;
border-radius: 50%;
font-size: 32px;
font-weight: bold;
}

#status {
font-size: 18px;
font-weight: bold;
margin: 15px;
}

/* BINGO CARD */

.card-area {
background: white;
padding: 12px;
border-radius: 12px;
}

.card-area h2 {
margin-top: 0;
}

.bingo-card {
width: 100%;
max-width: 520px;
margin: auto;
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 5px;
}

.card-cell {
min-height: 65px;
display: flex;
align-items: center;
justify-content: center;
background: #eeeeee;
border: 2px solid #555;
border-radius: 8px;
font-size: 20px;
font-weight: bold;
cursor: pointer;
}

.card-header {
background: #202b39;
color: white;
cursor: default;
}

.card-cell.marked {
background: green;
color: white;
}

.free {
background: gold !important;
color: black !important;
}

#bingoBtn {
background: purple;
color: white;
font-size: 18px;
}

#message {
min-height: 30px;
font-size: 20px;
font-weight: bold;
margin-top: 10px;
}

@media (max-width: 900px) {
.main {
grid-template-columns: 1fr;
}

.called-board,  
.current-area,  
.card-area {  
    width: 100%;  
    max-width: 600px;  
    margin: auto;  
}  

.number-row span {  
    height: 40px;  
    font-size: 15px;  
}

}
</style></head><body><div class="top">
<h1>🎯 AFRO BINGO</h1><button id="startBtn" onclick="startGame()">
▶ PLAY GAME
</button>

<button id="callBtn" onclick="callNumber()" disabled>  
    📢 CALL NUMBER  
</button>  <button id="resetBtn" onclick="resetGame()">  
    🔄 NEW GAME  
</button>  </div><div class="main"><!-- CALLED NUMBERS -->  
<div class="called-board">  <div class="letters">  
    <div class="b">B</div>  
    <div class="i">I</div>  
    <div class="n">N</div>  
    <div class="g">G</div>  
    <div class="o">O</div>  
</div>  

<div class="number-board" id="numberBoard"></div>

</div>  <!-- CURRENT NUMBER -->  <div class="current-area">  <div class="current-title">  
    CURRENT CALL  
</div>  

<div class="current-number" id="currentNumber">  
    -  
</div>  

<div id="status">  
    Press PLAY GAME to start  
</div>

</div>  <!-- BINGO CARD -->  <div class="card-area">  <h2>🎫 YOUR BINGO CARD</h2>  

<div class="bingo-card" id="bingoCard"></div>  

<button id="bingoBtn" onclick="checkBingo()">  
    🏆 BINGO  
</button>  

<div id="message"></div>

</div>  </div><script>  let calledNumbers = [];
let cardNumbers = [];
let gameStarted = false;

/* CREATE CALLED NUMBER BOARD */

function createNumberBoard() {

const board = document.getElementById("numberBoard");  

board.innerHTML = "";  

for (let start = 1; start <= 75; start += 5) {  

    const row = document.createElement("div");  

    row.className = "number-row";  

    for (let number = start; number < start + 5 && number <= 75; number++) {  

        const span = document.createElement("span");  

        span.id = "number-" + number;  

        span.innerText = number;  

        row.appendChild(span);  
    }  

    board.appendChild(row);  
}

}

/* RANDOM NUMBER */

function randomNumber(min, max) {

return Math.floor(Math.random() * (max - min + 1)) + min;

}

/* CREATE BINGO CARD */

function createCard() {

const card = document.getElementById("bingoCard");  

card.innerHTML = "";  

const headers = ["B", "I", "N", "G", "O"];  

headers.forEach(letter => {  

    const cell = document.createElement("div");  

    cell.className = "card-cell card-header";  

    cell.innerText = letter;  

    card.appendChild(cell);  
});  

let columns = [];  

columns.push(generateNumbers(1, 15, 5));  
columns.push(generateNumbers(16, 30, 5));  
columns.push(generateNumbers(31, 45, 5));  
columns.push(generateNumbers(46, 60, 5));  
columns.push(generateNumbers(61, 75, 5));  

cardNumbers = [];  

for (let row = 0; row < 5; row++) {  

    for (let col = 0; col < 5; col++) {  

        const cell = document.createElement("div");  

        cell.className = "card-cell";  

        if (row === 2 && col === 2) {  

            cell.innerText = "FREE";  

            cell.classList.add("marked");  
            cell.classList.add("free");  

            cardNumbers.push("FREE");  

        } else {  

            const number = columns[col][row];  

            cell.innerText = number;  

            cardNumbers.push(number);  

            cell.onclick = function() {  

                if (!gameStarted) {  

                    alert("First press PLAY GAME!");  

                    return;  
                }  

                if (calledNumbers.includes(number)) {  

                    cell.classList.toggle("marked");  

                } else {  

                    alert("This number has not been called yet!");  

                }  
            };  
        }  

        card.appendChild(cell);  
    }  
}

}

/* GENERATE UNIQUE NUMBERS */

function generateNumbers(min, max, count) {

let numbers = [];  

while (numbers.length < count) {  

    let number = randomNumber(min, max);  

    if (!numbers.includes(number)) {  

        numbers.push(number);  
    }  
}  

return numbers;

}

/* START GAME */

function startGame() {

gameStarted = true;  

calledNumbers = [];  

document.getElementById("callBtn").disabled = false;  

document.getElementById("startBtn").disabled = true;  

document.getElementById("status").innerText =  
    "Game started. Call a number!";  

document.getElementById("message").innerText = "";  

createNumberBoard();  

createCard();  

document.getElementById("currentNumber").innerText = "-";

}

/* CALL NUMBER */

function callNumber() {

if (!gameStarted) {  

    return;  
}  

if (calledNumbers.length >= 75) {  

    alert("All numbers have been called!");  

    return;  
}  

let number;  

do {  

    number = randomNumber(1, 75);  

} while (calledNumbers.includes(number));  

calledNumbers.push(number);  

const numberBox =  
    document.getElementById("number-" + number);  

numberBox.classList.add("active");  

const letter = getLetter(number);  

document.getElementById("currentNumber").innerText =  
    letter + "-" + number;  

document.getElementById("status").innerText =  
    "Called: " + calledNumbers.length + " numbers";  

// Automatically mark matching card number  

const cells =  
    document.querySelectorAll(".card-cell");  

cells.forEach(cell => {  

    if (cell.innerText == number) {  

        cell.classList.add("marked");  
    }  
});

}

/* BINGO LETTER */

function getLetter(number) {

if (number <= 15) return "B";  

if (number <= 30) return "I";  

if (number <= 45) return "N";  

if (number <= 60) return "G";  

return "O";

}

/* CHECK BINGO */

function checkBingo() {

if (!gameStarted) {  

    alert("First press PLAY GAME!");  

    return;  
}  

const cells =  
    document.querySelectorAll(".bingo-card .card-cell");  

let marked = [];  

for (let i = 0; i < 25; i++) {  

    marked.push(  
        cells[i + 5].classList.contains("marked")  
    );  
}  

let win = false;  

// ROWS  

for (let row = 0; row < 5; row++) {  

    let complete = true;  

    for (let col = 0; col < 5; col++) {  

        if (!marked[row * 5 + col]) {  

            complete = false;  
        }  
    }  

    if (complete) win = true;  
}  

// COLUMNS  

for (let col = 0; col < 5; col++) {  

    let complete = true;  

    for (let row = 0; row < 5; row++) {  

        if (!marked[row * 5 + col]) {  

            complete = false;  
        }  
    }  

    if (complete) win = true;  
}  

// DIAGONAL 1  

let diagonal1 = true;  

for (let i = 0; i < 5; i++) {  

    if (!marked[i * 5 + i]) {  

        diagonal1 = false;  
    }  
}  

if (diagonal1) win = true;  

// DIAGONAL 2  

let diagonal2 = true;  

for (let i = 0; i < 5; i++) {  

    if (!marked[i * 5 + (4 - i)]) {  

        diagonal2 = false;  
    }  
}  

if (diagonal2) win = true;  

if (win) {  

    document.getElementById("message").innerText =  
        "🎉 BINGO! YOU WIN! 🎉";  

} else {  

    document.getElementById("message").innerText =  
        "❌ Not Bingo yet. Keep playing!";  
}

}

/* RESET GAME */

function resetGame() {

calledNumbers = [];  

cardNumbers = [];  

gameStarted = false;  

document.getElementById("callBtn").disabled = true;  

document.getElementById("startBtn").disabled = false;  

document.getElementById("currentNumber").innerText = "-";  

document.getElementById("status").innerText =  
    "Press PLAY GAME to start";  

document.getElementById("message").innerText = "";  

createNumberBoard();  

document.getElementById("bingoCard").innerHTML = "";

}

/* LOAD BOARD */

createNumberBoard();

</script></body>

  </html>
